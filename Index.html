<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYZION AI - Super App</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#050a14;
    color:#00ffff;
    overflow:hidden;
}

.grid{
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

.center{
    position:absolute;
    top:35%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.core{
    width:200px;
    height:200px;
    border-radius:50%;
    border:3px solid #00ffff;
    box-shadow:0 0 40px #00ffff;
    animation:rotate 8s linear infinite;
    transition:0.3s;
}

.listening{
    border-color:lime;
    box-shadow:0 0 60px lime;
}

.speaking{
    border-color:orange;
    box-shadow:0 0 60px orange;
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.panel{
    position:absolute;
    bottom:0;
    width:100%;
    height:40%;
    background:#0a111f;
    overflow-y:auto;
    padding:15px;
}

input{
    width:75%;
    padding:10px;
    background:#111a2e;
    border:none;
    color:#00ffff;
}

button{
    padding:10px;
    background:#00ffff;
    border:none;
    cursor:pointer;
}

h1{
    letter-spacing:5px;
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="center">
    <h1>MYZION AI</h1>
    <div id="core" class="core"></div>
    <br><br>
    <button onclick="activarVoz()">Activar Voz</button>
</div>

<div class="panel" id="panel">
    <p>🚀 Sistema MYZION iniciado...</p>
    <input type="text" id="input" placeholder="Escribe un comando...">
    <button onclick="enviar()">Enviar</button>
</div>

<script>

const core = document.getElementById("core");
const panel = document.getElementById("panel");

function hablar(texto){
    core.classList.remove("listening");
    core.classList.add("speaking");

    const speech = new SpeechSynthesisUtterance(texto);
    speech.lang="es-ES";
    speech.rate=0.9;
    speech.pitch=0.7;

    speech.onend = () => {
        core.classList.remove("speaking");
    };

    speechSynthesis.speak(speech);
}

function respuestaLocal(texto){

    texto = texto.toLowerCase();

    if(texto.includes("hora")){
        return "La hora actual es " + new Date().toLocaleTimeString();
    }

    if(texto.includes("fecha")){
        return "Hoy es " + new Date().toLocaleDateString();
    }

    if(texto.includes("quien eres")){
        return "Soy MYZION AI, tu sistema inteligente avanzado.";
    }

    if(texto.includes("abrir google")){
        window.open("https://www.google.com");
        return "Abriendo Google.";
    }

    return "Comando recibido. Próximamente conectado a inteligencia artificial avanzada.";
}

function enviar(){

    const input = document.getElementById("input");
    const texto = input.value;

    if(!texto) return;

    panel.innerHTML += "<p><b>Tú:</b> "+texto+"</p>";

    const respuesta = respuestaLocal(texto);

    panel.innerHTML += "<p><b>MYZION:</b> "+respuesta+"</p>";
    panel.scrollTop = panel.scrollHeight;

    hablar(respuesta);

    input.value="";
}

function activarVoz(){

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang="es-ES";

    recognition.onstart = () => {
        core.classList.add("listening");
    };

    recognition.onresult = (event) => {
        const texto = event.results[0][0].transcript;
        panel.innerHTML += "<p><b>Tú:</b> "+texto+"</p>";

        const respuesta = respuestaLocal(texto);

        panel.innerHTML += "<p><b>MYZION:</b> "+respuesta+"</p>";
        panel.scrollTop = panel.scrollHeight;

        hablar(respuesta);
    };

    recognition.onend = () => {
        core.classList.remove("listening");
    };

    recognition.start();
}

</script>

</body>
</html>
