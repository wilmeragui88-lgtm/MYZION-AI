<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | OMNI-WRITER v42.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a; --glass: rgba(15, 17, 21, 0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* PANTALLA DE INICIALIZACIÓN */
        #boot-layer { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .pulse-btn { background: none; border: 2px solid var(--green); color: var(--green); padding: 25px 50px; font-family: 'Orbitron'; font-size: 1.2rem; cursor: pointer; transition: 0.4s; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 255, 157, 0.2); }
        .pulse-btn:hover { background: var(--green); color: #000; box-shadow: 0 0 50px var(--green); }

        header { padding: 12px 20px; background: #000; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        
        /* BARRA DE HERRAMIENTAS (WORD STYLE) */
        .toolbar { background: #1a1d23; padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #333; overflow-x: auto; position: sticky; top: 0; z-index: 500; }
        .tool-group { display: flex; gap: 5px; border-right: 1px solid #444; padding-right: 10px; align-items: center; }
        .t-btn { background: #222; border: 1px solid #444; color: #fff; padding: 6px 10px; font-size: 0.65rem; cursor: pointer; border-radius: 3px; font-family: 'Orbitron'; }
        .t-btn:hover { background: var(--purple); border-color: var(--cyan); }
        select { background: #222; color: #fff; border: 1px solid #444; font-size: 0.7rem; border-radius: 3px; padding: 2px; }

        /* AREA DE TRABAJO */
        .workspace { flex: 1; overflow-y: auto; padding: 40px 15px; display: flex; flex-direction: column; align-items: center; gap: 50px; background: #111; scroll-behavior: smooth; }
        .page-sheet { background: #fff; color: #000; width: 98%; max-width: 850px; min-height: 1100px; padding: 60px; border-radius: 2px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; outline: none; font-family: 'Arial', sans-serif; line-height: 1.6; }
        .page-marker { position: absolute; top: 20px; left: 25px; font-size: 0.6rem; color: #aaa; font-family: 'Orbitron'; pointer-events: none; }

        /* TABLAS Y FIGURAS */
        .table-box { width: 100%; margin: 25px 0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; border: 2px solid #444; background: #fff; }
        th, td { border: 1px solid #ccc; padding: 12px; min-width: 100px; }
        .active-cell { background: rgba(0, 242, 255, 0.15) !important; border: 2px solid var(--cyan) !important; }
        .shape { display: inline-block; border: 2px solid #000; margin: 10px; vertical-align: middle; }
        img { max-width: 100%; border-radius: 4px; }

        /* CONTROLES */
        .control-panel { background: #000; border-top: 2px solid var(--cyan); padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        #hub-sidebar { position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: var(--glass); border-left: 2px solid var(--cyan); z-index: 2000; transition: 0.5s; padding: 25px; }
        #hub-sidebar.active { right: 0; }
        #voice-hud { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 6px 30px; border-radius: 30px; font-size: 0.65rem; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; }
    </style>
</head>
<body>

<div id="boot-layer">
    <h1 style="color:var(--cyan); font-family:'Orbitron';">MYZION MASTER v42</h1>
    <p style="color:#666; margin-bottom:30px;">SUITE PROFESIONAL CON INTELIGENCIA VOCAL</p>
    <button class="pulse-btn" onclick="initializeOracle()">CONECTAR RED NEURONAL</button>
</div>

<div id="voice-hud">IA: ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.85rem; color:var(--cyan)">MYZION <span style="color:var(--purple)">MASTER PRO</span></div>
    <button class="t-btn" style="border-color:var(--cyan)" onclick="toggleHub()">MIS ARCHIVOS ☰</button>
</header>

<div class="toolbar">
    <div class="tool-group">
        <select onchange="execCommand('fontName', this.value)">
            <option value="Arial">Arial</option>
            <option value="Courier New">Courier</option>
            <option value="Georgia">Georgia</option>
            <option value="Verdana">Verdana</option>
        </select>
        <select onchange="execCommand('fontSize', this.value)">
            <option value="3">Normal</option>
            <option value="1">Pequeño</option>
            <option value="5">Grande</option>
            <option value="7">Título</option>
        </select>
    </div>
    <div class="tool-group">
        <button class="t-btn" onclick="execCommand('bold')"><b>B</b></button>
        <button class="t-btn" onclick="execCommand('italic')"><i>I</i></button>
        <button class="t-btn" onclick="execCommand('underline')"><u>U</u></button>
        <input type="color" onchange="execCommand('foreColor', this.value)" style="width:25px; height:25px; border:none;">
    </div>
    <div class="tool-group">
        <button class="t-btn" onclick="insertFigure('rect')">Rect</button>
        <button class="t-btn" onclick="document.getElementById('img-up').click()">Imagen</button>
        <input type="file" id="img-up" hidden accept="image/*" onchange="uploadImg(this)">
    </div>
    <div class="tool-group">
        <button class="t-btn" style="color:var(--green)" onclick="readFullDocument()">LEER TODO</button>
    </div>
</div>

<div id="hub-sidebar">
    <h3 style="color:var(--cyan); font-family:'Orbitron'; font-size:0.7rem; border-bottom: 1px solid #333; padding-bottom:10px;">REPOSITORIO</h3>
    <div id="file-index" style="margin-top:20px; overflow-y:auto; flex:1;"></div>
    <button class="t-btn" style="width:100%; margin-top:20px;" onclick="toggleHub()">CERRAR</button>
</div>

<main class="workspace" id="main-canvas">
    <div class="page-sheet" contenteditable="true" id="p1" onfocus="activePage='p1'">
        <div class="page-marker">PÁGINA 1</div>
        <h1 style="text-align:center; font-family:'Orbitron'; margin-top:50px;">DOCUMENTO DE REDACCIÓN</h1>
        <p>Inicie su proceso creativo...</p>
    </div>
</main>

<div class="control-panel">
    <button class="t-btn" style="color:var(--green)" onclick="createNewPage()">+ PÁGINA</button>
    <button class="t-btn" style="color:var(--green)" onclick="insertSmartTable()">+ TABLA IA</button>
    <button class="t-btn" onclick="initOCR()">OCR</button>
    <button class="t-btn" style="background:var(--purple)" onclick="shareDoc()">COMPARTIR</button>
    <button id="mic-trigger" class="t-btn" style="grid-column: span 4; border-color: var(--green); margin-top:5px;" onclick="toggleDictation()">ACTIVAR RECONOCIMIENTO VOCAL</button>
</div>

<div style="background:#000; padding:12px; display:flex; gap:10px; border-top:1px solid #222;">
    <button class="t-btn" style="flex:1" onclick="saveToHub()">GUARDAR</button>
    <button class="t-btn" style="flex:1" onclick="exportPDF()">PDF</button>
    <button class="t-btn" style="flex:1" onclick="exportWord()">WORD</button>
</div>

<div id="ocr-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:5000;">
    <video id="camera-stream" autoplay playsinline style="width:100%; height:80%; object-fit:cover;"></video>
    <div style="height:20%; display:flex; justify-content:space-around; align-items:center;">
        <button class="t-btn" onclick="closeOCR()">VOLVER</button>
        <button class="t-btn" style="background:var(--purple); padding:15px;" onclick="captureText()">CAPTURAR</button>
    </div>
</div>

<script>
    let activePage = 'p1';
    let isListening = false;
    let selectedCell = null;
    let fileHistory = [];
    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES'; recognition.continuous = true;

    function hablar(texto, callback) {
        synth.cancel();
        const m = new SpeechSynthesisUtterance(texto);
        m.lang = 'es-ES'; m.rate = 1.0;
        m.onend = () => { if(callback) callback(); };
        synth.speak(m);
    }

    function initializeOracle() {
        document.getElementById('boot-layer').style.display = 'none';
        const guia = "Bienvenido a Myzion Master v42. Soy su inteligencia artificial de redacción profesional. " +
        "He activado la barra superior estilo Word para que pueda cambiar fuentes, colores e insertar imágenes o figuras. " +
        "Sigo manteniendo sus tablas elásticas, su escáner O C R y el repositorio de archivos. " +
        "Además, ahora puede pedirme que lea su documento completo o compartirlo con el botón púrpura. ¿Por dónde desea comenzar?";
        hablar(guia);
    }

    // --- FUNCIONES WORD & EDICIÓN ---
    function execCommand(cmd, val = null) {
        document.execCommand(cmd, false, val);
        hablar("Estilo aplicado.");
    }

    function insertFigure(type) {
        const fig = document.createElement('div');
        fig.className = 'shape'; fig.contentEditable = "false";
        if(type==='rect') fig.style = "width:120px; height:60px; background:#444; border:2px solid var(--cyan);";
        document.getElementById(activePage).appendChild(fig);
        hablar("Figura insertada.");
    }

    function uploadImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                document.getElementById(activePage).appendChild(img);
                hablar("Imagen integrada.");
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function readFullDocument() {
        const text = document.getElementById(activePage).innerText;
        hablar("Leyendo documento: " + text);
    }

    async function shareDoc() {
        const text = document.getElementById(activePage).innerText;
        if(navigator.share) {
            try {
                await navigator.share({ title: 'Myzion Document', text: text });
                hablar("Abriendo menú de compartición.");
            } catch(e) { hablar("Compartición cancelada."); }
        } else { hablar("Función no compatible en este dispositivo."); }
    }

    // --- CORE ANTERIOR (TABLAS, PÁGINAS, OCR) ---
    function createNewPage() {
        const id = 'p' + (document.querySelectorAll('.page-sheet').length + 1);
        const p = document.createElement('div');
        p.className = 'page-sheet'; p.contentEditable = "true"; p.id = id;
        p.onfocus = () => activePage = id;
        p.innerHTML = `<div class="page-marker">PÁGINA ${id.substring(1)}</div>`;
        document.getElementById('main-canvas').appendChild(p);
        p.focus(); hablar("Página " + id.substring(1) + " lista.");
    }

    function insertSmartTable() {
        const tid = "tab_" + Date.now();
        const html = `<div id="${tid}_wrap" class="table-box"><table id="${tid}"><thead><tr><th contenteditable="true">A</th><th contenteditable="true">B</th></tr></thead><tbody><tr><td contenteditable="true">...</td><td contenteditable="true">...</td></tr></tbody></table><button class="t-btn" onclick="addRow('${tid}')">+ FILA</button></div><br>`;
        document.getElementById(activePage).innerHTML += html;
        hablar("Tabla insertada.");
    }

    function addRow(id) {
        const t = document.getElementById(id);
        const r = t.insertRow(-1);
        for(let i=0; i<t.rows[0].cells.length; i++) r.insertCell(i).contentEditable = "true";
    }

    document.addEventListener('click', (e) => {
        if(e.target.tagName === 'TD' || e.target.tagName === 'TH') {
            if(selectedCell) selectedCell.classList.remove('active-cell');
            selectedCell = e.target;
            selectedCell.classList.add('active-cell');
            hablar("Celda activa.");
        }
    });

    function toggleDictation() {
        const btn = document.getElementById('mic-trigger');
        const hud = document.getElementById('voice-hud');
        if(!isListening) {
            recognition.start(); isListening = true;
            btn.style.background = "var(--green)"; btn.style.color = "#000";
            hud.style.display = 'block'; hablar("Le escucho.");
        } else {
            recognition.stop(); isListening = false;
            btn.style.background = "#111"; btn.style.color = "#fff";
            hud.style.display = 'none'; hablar("Escucha detenida.");
        }
    }

    recognition.onresult = (e) => {
        const t = e.results[e.results.length - 1][0].transcript;
        if(selectedCell) { selectedCell.innerText = t; hablar("Dato: " + t); }
        else { document.execCommand('insertText', false, t); }
    };

    function saveToHub() {
        const n = "DOC-" + new Date().toLocaleTimeString();
        fileHistory.push({ name: n, data: document.getElementById('main-canvas').innerHTML });
        updateFileList(); hablar("Guardado como " + n);
    }

    function updateFileList() {
        const list = document.getElementById('file-index');
        list.innerHTML = "";
        fileHistory.forEach(f => {
            const d = document.createElement('div');
            d.style = "padding:10px; border-bottom:1px solid #333; color:var(--cyan); cursor:pointer; font-size:0.6rem;";
            d.innerText = "📄 " + f.name;
            d.onclick = () => { document.getElementById('main-canvas').innerHTML = f.data; toggleHub(); hablar("Cargado."); };
            list.appendChild(d);
        });
    }

    function toggleHub() { document.getElementById('hub-sidebar').classList.toggle('active'); }

    async function initOCR() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('camera-stream').srcObject = s;
        document.getElementById('ocr-overlay').style.display = 'block';
        hablar("Cámara lista.");
    }

    function closeOCR() {
        document.getElementById('camera-stream').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-overlay').style.display = 'none';
    }

    async function captureText() {
        hablar("Analizando...");
        const v = document.getElementById('camera-stream');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(activePage).innerText += "\n" + res.data.text;
        closeOCR(); hablar("Texto extraído.");
    }

    function exportPDF() { 
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(document.getElementById(activePage).innerText, 10, 10);
        doc.save("Myzion.pdf");
        hablar("Generando P D F.");
    }
    
    function exportWord() {
        const blob = new Blob(['\ufeff' + document.getElementById('main-canvas').innerText], { type: 'application/msword' });
        saveAs(blob, "Myzion.doc");
        hablar("Generando Word.");
    }
</script>
</body>
</html>
