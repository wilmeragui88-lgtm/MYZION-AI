<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | NEURAL-CORE v24.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --blue: #0072ff; --purple: #bc13fe;
            --bg: #02050a; --glass: rgba(10, 25, 41, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; font-family: 'JetBrains Mono', monospace;
            background: var(--bg); color: var(--cyan); height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* CAPA NEURAL (VOZ VISUAL) */
        .neural-indicator {
            height: 3px; width: 0%; background: var(--green);
            transition: width 0.3s; position: fixed; top: 0; z-index: 10000;
            box-shadow: 0 0 15px var(--green);
        }

        header { padding: 12px; background: #000; border-bottom: 2px solid var(--blue); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .brand { font-family: 'Orbitron'; font-size: 0.8rem; }

        /* HUB DE ARCHIVOS INTELIGENTE */
        #file-hub {
            position: absolute; top: 60px; right: 10px; width: 280px;
            background: var(--glass); border: 1px solid var(--purple);
            display: none; flex-direction: column; z-index: 3000; border-radius: 8px;
            max-height: 400px; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .file-item { padding: 15px; font-size: 0.65rem; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .file-item:hover { background: var(--purple); color: #fff; }

        /* ÁREA DE TRABAJO IA */
        .viewport { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 150px; }
        .panel { background: var(--glass); border: 1px solid rgba(0,242,255,0.2); padding: 15px; border-radius: 8px; }
        
        #paper {
            background: #fff; color: #111; padding: 35px; min-height: 500px;
            border-radius: 4px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-transform: none; box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        #editable-content { outline: none; font-size: 1.1rem; line-height: 1.7; }

        /* TABLAS Y FORMATO */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f8f8f8; color: var(--blue); }

        /* CONTROLES */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            background: rgba(0,114,255,0.1); border: 1px solid var(--blue);
            color: #fff; padding: 15px; font-family: 'Orbitron'; font-size: 0.6rem;
            cursor: pointer; border-radius: 4px; transition: 0.3s;
        }
        .btn-neural { background: var(--purple); border: none; font-weight: bold; }
        .active-voice { background: var(--green) !important; color: #000 !important; box-shadow: 0 0 20px var(--green); }

        footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid var(--blue); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 1000; }
        
        #cam-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; flex-direction: column; }
        #video { width: 100%; height: 75%; object-fit: cover; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const config = {
            apiKey: "AIzaSyAVuB6irppG-_9VbKSVY93P1dG6ZmC1KCY",
            authDomain: "myzion-os-master.firebaseapp.com",
            projectId: "myzion-os-master",
            appId: "1:262714217017:web:fae14ece4afb7cd16cb3e8"
        };
        const app = initializeApp(config);
        window.db = getDatabase(app);
        window.fb = { ref, push };
    </script>
</head>
<body>

<div id="neural-bar" class="neural-indicator"></div>

<header>
    <div class="brand">MYZION <span style="color:var(--green)">NEURAL-CORE</span></div>
    <button class="btn" style="padding:5px 15px; border-color:var(--purple)" onclick="toggleHub()">MIS ARCHIVOS ▾</button>
</header>

<div id="file-hub">
    <div style="padding:15px; background:var(--purple); font-size:0.7rem; font-weight:bold;">HISTORIAL DE ESCRIBAS</div>
    <div id="file-list"></div>
</div>

<main class="viewport">
    <section class="panel">
        <div id="paper">
            <div id="editable-content" contenteditable="true">
                <b>SISTEMA LISTO.</b> Diga "Empezar" para dictar o "Crear reporte" para que la IA estructure su documento.
            </div>
        </div>
    </section>

    <section class="panel">
        <div class="grid">
            <button class="btn btn-neural" onclick="generateReport()">IA: GENERAR REPORTE</button>
            <button class="btn btn-neural" onclick="generateTable()">IA: INSERTAR TABLA</button>
            <button class="btn" onclick="openCam()">ESCANEAR (OCR)</button>
            <button class="btn" onclick="saveToHub()">GUARDAR EN HUB</button>
        </div>
    </section>
</main>

<div id="cam-overlay">
    <video id="video" autoplay playsinline></video>
    <div style="flex:1; display:flex; justify-content:space-around; align-items:center; background:#000;">
        <button class="btn" onclick="closeCam()">SALIR</button>
        <button onclick="captureOCR()" style="width:70px; height:70px; border-radius:50%; background:var(--green); border:none;"></button>
    </div>
</div>

<footer>
    <button id="master-voice" class="btn" style="grid-column: span 2; font-size:0.8rem;" onclick="toggleNeuralVoice()">ACTIVAR CEREBRO IA (VOZ)</button>
    <button class="btn" onclick="savePDF()">DESCARGAR PDF</button>
    <button class="btn" onclick="saveCloud()">NUBE FIREBASE</button>
</footer>

<script>
    let isNeuralActive = false;
    let savedDocs = [];
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'es-ES'; rec.continuous = true; rec.interimResults = true;

    function speak(t) {
        window.speechSynthesis.cancel();
        const s = new SpeechSynthesisUtterance(t);
        s.lang = 'es-ES'; s.pitch = 1.1; s.rate = 1;
        window.speechSynthesis.speak(s);
    }

    // --- CEREBRO NEURAL DE VOZ ---
    function toggleNeuralVoice() {
        const btn = document.getElementById('master-voice');
        if(!isNeuralActive) {
            rec.start();
            btn.classList.add('active-voice');
            btn.innerText = "IA ESCUCHANDO... (HABLA)";
            document.getElementById('neural-bar').style.width = "100%";
            speak("Cerebro neural activo. ¿En qué puedo ayudarte, maestro?");
            isNeuralActive = true;
        } else {
            rec.stop();
            btn.classList.remove('active-voice');
            btn.innerText = "ACTIVAR CEREBRO IA (VOZ)";
            document.getElementById('neural-bar').style.width = "0%";
            isNeuralActive = false;
        }
    }

    rec.onresult = (e) => {
        const transcript = Array.from(e.results).map(r => r[0].transcript).join('').toLowerCase();
        const paper = document.getElementById('editable-content');

        // COMANDOS INTELIGENTES
        if(transcript.includes("crear reporte")) { generateReport(); speak("Generando reporte estructurado."); rec.stop(); toggleNeuralVoice(); }
        else if(transcript.includes("insertar tabla")) { generateTable(); speak("Insertando tabla de datos."); rec.stop(); toggleNeuralVoice(); }
        else if(transcript.includes("abrir cámara")) { openCam(); speak("Iniciando escáner."); }
        else if(transcript.includes("guardar documento")) { saveToHub(); speak("Guardado en tu historial."); }
        else if(transcript.includes("leer todo")) { speak(paper.innerText); }
        else {
            // MODO ESCRIBA
            if(paper.innerText.includes("SISTEMA LISTO")) paper.innerHTML = "";
            paper.innerText = transcript;
        }
    };

    // --- FUNCIONES IA DOCUMENTOS ---
    function generateReport() {
        const html = `<h2>REPORTE DE INTELIGENCIA OPERATIVA</h2>
        <p><b>Origen:</b> Myzion Core v24</p>
        <p><b>Análisis:</b> Se ha digitalizado la sesión con éxito. La IA ha detectado patrones de trabajo óptimos.</p>
        <ul><li>Integridad de datos: 100%</li><li>Reconstrucción OCR: Activa</li></ul>`;
        document.getElementById('editable-content').innerHTML = html;
    }

    function generateTable() {
        const table = `<table><tr><th>MÓDULO</th><th>ESTADO</th></tr><tr><td>Voz Neural</td><td>Online</td></tr><tr><td>Hub Cloud</td><td>Sincronizado</td></tr></table>`;
        document.getElementById('editable-content').innerHTML += table;
    }

    // --- HUB Y STORAGE ---
    function toggleHub() {
        const h = document.getElementById('file-hub');
        h.style.display = h.style.display === 'flex' ? 'none' : 'flex';
    }

    function saveToHub() {
        const content = document.getElementById('editable-content').innerHTML;
        const name = "DOC_" + new Date().toLocaleTimeString();
        savedDocs.push({ name, content });
        const list = document.getElementById('file-list');
        list.innerHTML = "";
        savedDocs.forEach(d => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerText = d.name;
            div.onclick = () => { document.getElementById('editable-content').innerHTML = d.content; toggleHub(); };
            list.appendChild(div);
        });
        alert("Guardado en el Hub Local.");
    }

    // --- CÁMARA OCR ---
    async function openCam() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = s;
        document.getElementById('cam-overlay').style.display = 'flex';
    }

    function closeCam() {
        const v = document.getElementById('video');
        if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('cam-overlay').style.display = 'none';
    }

    async function captureOCR() {
        const v = document.getElementById('video');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById('editable-content').innerText += "\n" + res.data.text;
        speak("Texto reconstruido y añadido al papel.");
        closeCam();
    }

    function savePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.html(document.getElementById('paper'), { callback: (d) => d.save("Myzion_Neural.pdf"), x: 10, y: 10, width: 180, windowWidth: 800 });
    }

    function saveCloud() {
        window.fb.push(window.fb.ref(window.db, 'neural_docs/'), {
            data: document.getElementById('editable-content').innerHTML,
            time: new Date().toLocaleString()
        });
        speak("Sincronizado con Firebase Cloud.");
    }
</script>
</body>
</html>
