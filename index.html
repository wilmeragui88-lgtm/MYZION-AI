<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | TOTAL OMNI-SYNCH v39.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a; --glass: rgba(15, 17, 21, 0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* PANTALLA DE INICIALIZACIÓN VOCAL */
        #boot-layer { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .pulse-btn { background: none; border: 2px solid var(--green); color: var(--green); padding: 25px 50px; font-family: 'Orbitron'; font-size: 1.2rem; cursor: pointer; transition: 0.4s; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 255, 157, 0.2); }
        .pulse-btn:hover { background: var(--green); color: #000; box-shadow: 0 0 50px var(--green); }

        /* HEADER & HUB */
        header { padding: 12px 20px; background: #000; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        
        #hub-sidebar { position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: var(--glass); border-left: 2px solid var(--cyan); z-index: 2000; transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); padding: 25px; box-shadow: -10px 0 30px #000; }
        #hub-sidebar.active { right: 0; }

        /* AREA DE TRABAJO MULTI-PÁGINA */
        .workspace { flex: 1; overflow-y: auto; padding: 40px 15px; display: flex; flex-direction: column; align-items: center; gap: 50px; background: #111; scroll-behavior: smooth; }
        
        .page-sheet { background: #fff; color: #000; width: 98%; max-width: 850px; min-height: 1100px; padding: 60px; border-radius: 2px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; outline: none; font-family: 'Arial', sans-serif; line-height: 1.6; }
        .page-marker { position: absolute; top: 20px; left: 25px; font-size: 0.6rem; color: #aaa; font-family: 'Orbitron'; pointer-events: none; }

        /* TABLAS ELASTICAS */
        .table-box { width: 100%; margin: 25px 0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; border: 2px solid #444; background: #fff; table-layout: auto; }
        th, td { border: 1px solid #ccc; padding: 12px; min-width: 100px; word-wrap: break-word; }
        .active-cell { background: rgba(0, 242, 255, 0.15) !important; border: 2px solid var(--cyan) !important; }

        /* PANEL DE CONTROL */
        .control-panel { background: #000; border-top: 2px solid var(--cyan); padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-core { background: #111; border: 1px solid #333; color: #fff; padding: 14px 5px; font-family: 'Orbitron'; font-size: 0.55rem; cursor: pointer; text-transform: uppercase; }
        .btn-active { background: var(--green) !important; color: #000 !important; font-weight: bold; }

        /* HUD & OCR */
        #voice-hud { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 6px 30px; border-radius: 30px; font-size: 0.65rem; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; }
        #ocr-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }
        video { width: 100%; height: 80%; object-fit: cover; }
    </style>
</head>
<body>

<div id="boot-layer">
    <h1 style="color:var(--cyan); font-family:'Orbitron';">MYZION OS v39</h1>
    <p style="color:#666; margin-bottom:30px;">SISTEMA OPERATIVO CON INTELIGENCIA VOCAL</p>
    <button class="pulse-btn" onclick="initializeOracle()">CONECTAR RED NEURONAL</button>
</div>

<div id="voice-hud">IA: ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.85rem; color:var(--cyan)">MYZION <span style="color:var(--purple)">MASTER</span></div>
    <button class="btn-core" style="border-color:var(--cyan); padding: 5px 15px;" onclick="toggleHub()">MIS ARCHIVOS ☰</button>
</header>

<div id="hub-sidebar">
    <h3 style="color:var(--cyan); font-family:'Orbitron'; font-size:0.7rem; border-bottom: 1px solid #333; padding-bottom:10px;">REPOSITORIO</h3>
    <div id="file-index" style="margin-top:20px; overflow-y:auto; flex:1;"></div>
    <button class="btn-core" style="width:100%; margin-top:20px;" onclick="toggleHub()">CERRAR</button>
</div>

<main class="workspace" id="main-canvas">
    <div class="page-sheet" contenteditable="true" id="p1" onfocus="setFocus('p1')">
        <div class="page-marker">PÁGINA 1</div>
        <h1 style="text-align:center; font-family:'Orbitron'; margin-top:50px;">DOCUMENTO DE REDACCIÓN</h1>
        <p>Inicie su proceso creativo o dictado vocal...</p>
    </div>
</main>

<div class="control-panel">
    <button class="btn-core" style="color:var(--green)" onclick="createNewPage()">+ PÁGINA</button>
    <button class="btn-core" style="color:var(--green)" onclick="insertSmartTable()">+ TABLA IA</button>
    <button class="btn-core" onclick="initOCR()">SCAN OCR</button>
    <button id="mic-trigger" class="btn-core" style="grid-column: span 3; border-color: var(--green); font-size:0.75rem;" onclick="toggleDictation()">ACTIVAR RECONOCIMIENTO VOCAL</button>
</div>

<div style="background:#000; padding:12px; display:flex; gap:10px; border-top:1px solid #222;">
    <button class="btn-core" style="flex:1" onclick="saveToHub()">GUARDAR</button>
    <button class="btn-core" style="flex:1" onclick="exportPDF()">PDF</button>
    <button class="btn-core" style="flex:1" onclick="exportWord()">WORD</button>
</div>

<div id="ocr-overlay">
    <video id="camera-stream" autoplay playsinline></video>
    <div style="height:20%; display:flex; justify-content:space-around; align-items:center; background:#000;">
        <button class="btn-core" onclick="closeOCR()">VOLVER</button>
        <button class="btn-core" style="background:var(--purple); padding:15px 30px;" onclick="captureText()">CAPTURAR</button>
    </div>
</div>

<script>
    let activePage = 'p1';
    let isListening = false;
    let selectedCell = null;
    let fileHistory = [];
    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    // --- MOTOR DE VOZ IA ---
    function hablar(texto, callback) {
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        utterance.rate = 1.0;
        utterance.onend = () => { if(callback) callback(); };
        synth.speak(utterance);
    }

    // --- PROTOCOLO DE BIENVENIDA Y GUÍA ---
    function initializeOracle() {
        document.getElementById('boot-layer').style.display = 'none';
        
        const guia = "Bienvenido a Myzion Master versión 39. Soy su asistente de inteligencia artificial. " +
        "He configurado su entorno de trabajo con las siguientes funciones: " +
        "Primero: Puede crear páginas infinitas con el botón verde abajo a la izquierda. " +
        "Segundo: Las tablas inteligentes se auto-ajustan al documento; toque cualquier celda y yo registraré lo que me dicte. " +
        "Tercero: El Hub a su derecha guarda y carga sus archivos locales. " +
        "Y cuarto: El escáner O C R le permite importar texto de fotos reales. " +
        "Para comenzar, puede dictarme un texto directamente o crear una tabla para organizar datos. ¿Qué desea hacer?";
        
        hablar(guia);
    }

    // --- GESTIÓN DE PÁGINAS ---
    function createNewPage() {
        const id = 'p' + (document.querySelectorAll('.page-sheet').length + 1);
        const p = document.createElement('div');
        p.className = 'page-sheet';
        p.contentEditable = "true";
        p.id = id;
        p.onfocus = () => activePage = id;
        p.innerHTML = `<div class="page-marker">PÁGINA ${id.substring(1)}</div>`;
        document.getElementById('main-canvas').appendChild(p);
        p.focus();
        hablar("He generado la página número " + id.substring(1));
    }

    function setFocus(id) { activePage = id; }

    // --- TABLAS INTELIGENTES ---
    function insertSmartTable() {
        const tid = "tab_" + Date.now();
        const html = `
            <div id="${tid}_wrap" class="table-box">
                <table id="${tid}">
                    <thead><tr><th contenteditable="true">CABECERA A</th><th contenteditable="true">CABECERA B</th></tr></thead>
                    <tbody><tr><td contenteditable="true">...</td><td contenteditable="true">...</td></tr></tbody>
                </table>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn-core" onclick="addRow('${tid}')">+ FILA</button>
                    <button class="btn-core" onclick="addCol('${tid}')">+ COL</button>
                    <button class="btn-core" style="color:red; border-color:red" onclick="document.getElementById('${tid}_wrap').remove()">ELIMINAR</button>
                </div>
            </div><br>`;
        document.getElementById(activePage).innerHTML += html;
        hablar("Tabla elástica integrada. Toque una celda para dictarme datos.");
    }

    function addRow(id) {
        const t = document.getElementById(id);
        const r = t.insertRow(-1);
        for(let i=0; i<t.rows[0].cells.length; i++) r.insertCell(i).contentEditable = "true";
        hablar("Fila añadida.");
    }

    function addCol(id) {
        const t = document.getElementById(id);
        for(let i=0; i<t.rows.length; i++) {
            let c = t.rows[i].insertCell(-1);
            c.contentEditable = "true";
            if(i===0) c.outerHTML = `<th contenteditable="true">NUEVO</th>`;
        }
        hablar("Columna integrada.");
    }

    // --- SELECCIÓN TÁCTIL ---
    document.addEventListener('click', (e) => {
        if(e.target.tagName === 'TD' || e.target.tagName === 'TH') {
            if(selectedCell) selectedCell.classList.remove('active-cell');
            selectedCell = e.target;
            selectedCell.classList.add('active-cell');
            const colName = selectedCell.closest('table').rows[0].cells[selectedCell.cellIndex].innerText;
            hablar("Foco en " + colName);
        }
    });

    // --- RECONOCIMIENTO VOCAL ---
    function toggleDictation() {
        const btn = document.getElementById('mic-trigger');
        const hud = document.getElementById('voice-hud');
        if(!isListening) {
            recognition.start();
            isListening = true;
            btn.classList.add('btn-active');
            hud.style.display = 'block';
            hablar("Sistema de escucha activo.");
        } else {
            recognition.stop();
            isListening = false;
            btn.classList.remove('btn-active');
            hud.style.display = 'none';
            hablar("Sistema de escucha desactivado.");
        }
    }

    recognition.onresult = (e) => {
        const text = e.results[e.results.length - 1][0].transcript.toLowerCase();
        if(selectedCell) {
            selectedCell.innerText = text;
            hablar("Dato registrado: " + text);
            moveNext();
        } else {
            document.getElementById(activePage).innerHTML += " " + text;
        }
    };

    function moveNext() {
        let n = selectedCell.nextElementSibling;
        if(!n && selectedCell.parentElement.nextElementSibling) n = selectedCell.parentElement.nextElementSibling.cells[0];
        if(n) {
            selectedCell.classList.remove('active-cell');
            selectedCell = n;
            selectedCell.classList.add('active-cell');
            hablar("Siguiente casilla.");
        }
    }

    // --- HUB DE ARCHIVOS ---
    function toggleHub() { 
        document.getElementById('hub-sidebar').classList.toggle('active'); 
        hablar("Accediendo al repositorio de documentos.");
    }

    function saveToHub() {
        const name = "ARCH-" + new Date().toLocaleTimeString();
        fileHistory.push({ name, data: document.getElementById('main-canvas').innerHTML });
        hablar("Documento guardado como " + name);
        updateFileList();
    }

    function updateFileList() {
        const list = document.getElementById('file-index');
        list.innerHTML = "";
        fileHistory.forEach(f => {
            const div = document.createElement('div');
            div.style = "padding:12px; border-bottom:1px solid #333; color:var(--cyan); cursor:pointer; font-size:0.65rem;";
            div.innerText = "📄 " + f.name;
            div.onclick = () => { document.getElementById('main-canvas').innerHTML = f.data; hablar("Documento cargado."); toggleHub(); };
            list.appendChild(div);
        });
    }

    // --- OCR SCANNER ---
    async function initOCR() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('camera-stream').srcObject = stream;
        document.getElementById('ocr-overlay').style.display = 'block';
        hablar("Cámara activada para escaneo visual.");
    }

    function closeOCR() {
        document.getElementById('camera-stream').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-overlay').style.display = 'none';
    }

    async function captureText() {
        hablar("Analizando imagen...");
        const v = document.getElementById('camera-stream');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(activePage).innerText += "\n" + res.data.text.trim();
        closeOCR();
        hablar("Texto digitalizado con éxito.");
    }

    // --- EXPORTACIÓN ---
    function exportPDF() {
        hablar("Generando archivo P D F.");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pgs = document.getElementsByClassName('page-sheet');
        for(let i=0; i<pgs.length; i++) {
            if(i>0) doc.addPage();
            doc.text(doc.splitTextToSize(pgs[i].innerText, 180), 10, 20);
        }
        doc.save("Zion_Export.pdf");
    }

    function exportWord() {
        hablar("Generando archivo de Word.");
        const blob = new Blob(['\ufeff' + document.getElementById('main-canvas').innerText], { type: 'application/msword' });
        saveAs(blob, "Zion_Export.doc");
    }
</script>
</body>
</html>
