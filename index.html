<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | MASTER FINAL v35.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a; --panel: rgba(10, 12, 16, 0.98);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'JetBrains Mono', monospace; 
            background: var(--bg); color: #fff; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER & NAVIGATION */
        header { 
            padding: 12px 20px; background: #000; border-bottom: 2px solid var(--purple);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }

        #hub-sidebar {
            position: fixed; top: 0; right: -320px; width: 320px; height: 100%;
            background: var(--panel); border-left: 2px solid var(--purple);
            z-index: 2000; transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1);
            padding: 25px; box-shadow: -15px 0 40px rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
        }
        #hub-sidebar.active { right: 0; }

        /* MULTI-PAGE WORKSPACE */
        .viewport { 
            flex: 1; overflow-y: auto; padding: 40px 15px; 
            display: flex; flex-direction: column; align-items: center; gap: 45px;
            background: #14171c; scroll-behavior: smooth;
        }

        .page-sheet {
            background: #fff; color: #000; width: 98%; max-width: 850px;
            min-height: 1100px; padding: 60px; border-radius: 4px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6); position: relative;
            outline: none; font-family: 'Arial', sans-serif;
        }
        .page-info {
            position: absolute; top: 20px; left: 25px; 
            font-size: 0.6rem; color: #bbb; font-family: 'Orbitron';
        }

        /* TABLAS ELASTICAS CORREGIDAS */
        .table-wrapper { width: 100%; margin: 25px 0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #fff; border: 2px solid #222; table-layout: auto; }
        th, td { border: 1px solid #ccc; padding: 12px; word-wrap: break-word; min-width: 80px; }
        .cell-focus { background: rgba(0, 242, 255, 0.12) !important; border: 2px solid var(--cyan) !important; box-shadow: inset 0 0 8px rgba(0, 242, 255, 0.3); }

        /* CONTROL CENTER */
        .control-panel { 
            background: #000; border-top: 2px solid var(--cyan);
            padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .btn-action {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 14px 5px; font-family: 'Orbitron'; font-size: 0.55rem; cursor: pointer;
            transition: 0.2s; text-transform: uppercase;
        }
        .btn-active { background: var(--green) !important; color: #000 !important; font-weight: bold; border-color: var(--green); }
        .btn-save { border-color: var(--purple); color: var(--purple); }

        #hud-voice { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 6px 25px; border-radius: 30px; font-size: 0.65rem; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; }
    </style>
</head>
<body onload="initFinalSystem()">

<div id="hud-voice">SISTEMA ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.85rem; color:var(--cyan); letter-spacing:1px;">MYZION <span style="color:var(--purple)">SUPREME</span> v35</div>
    <button class="btn-action" style="border-color:var(--cyan); padding: 5px 15px;" onclick="toggleHub()">HUB ARCHIVOS ☰</button>
</header>

<div id="hub-sidebar">
    <h3 style="color:var(--purple); font-family:'Orbitron'; font-size:0.8rem; margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:10px;">REPOSITORIO LOCAL</h3>
    <div id="archive-list" style="flex:1; overflow-y:auto;"></div>
    <button class="btn-action" style="width:100%" onclick="toggleHub()">CERRAR</button>
</div>

<main class="viewport" id="main-canvas">
    <div class="page-sheet" contenteditable="true" id="p1" onfocus="activePageId='p1'">
        <div class="page-info">PÁGINA 1</div>
        <h1 style="text-align:center; font-family:'Orbitron'; letter-spacing:2px; margin-top:40px;">DOCUMENTO DE INTELIGENCIA</h1>
        <hr style="border:0.5px solid #eee; margin:20px 0;">
        <p>Inicie el dictado o importe datos externos...</p>
    </div>
</main>

<div class="control-panel">
    <button class="btn-action" style="color:var(--green)" onclick="createNewPage()">+ PÁGINA</button>
    <button class="btn-action" style="color:var(--green)" onclick="insertSupremeTable()">+ TABLA IA</button>
    <button class="btn-action" onclick="openScanner()">SCAN OCR</button>
    <button id="voice-trigger" class="btn-action" style="grid-column: span 3; border-color: var(--green); font-size:0.75rem; margin-top:5px;" onclick="toggleVoice()">ACTIVAR INTERFAZ DE VOZ MAESTRA</button>
</div>

<div style="background:#000; padding:12px; display:flex; gap:10px; border-top:1px solid #222;">
    <button class="btn-action btn-save" style="flex:1" onclick="saveToArchive()">GUARDAR</button>
    <button class="btn-action" style="flex:1" onclick="exportPDF()">PDF</button>
    <button class="btn-action" style="flex:1" onclick="exportWord()">WORD</button>
</div>

<div id="ocr-layer" style="display:none; position:fixed; inset:0; background:#000; z-index:5000;">
    <video id="cam-feed" style="width:100%; height:82%; object-fit:cover;" autoplay playsinline></video>
    <div style="height:18%; display:flex; justify-content:space-around; align-items:center; background:#000;">
        <button class="btn-action" onclick="closeScanner()">VOLVER</button>
        <button class="btn-action" style="background:var(--purple); padding:15px 30px;" onclick="executeOCR()">CAPTURAR TEXTO</button>
    </div>
</div>

<script>
    let pageCount = 1;
    let activePageId = 'p1';
    let isListening = false;
    let focusedCell = null;
    let savedArchives = [];

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'es-ES'; u.rate = 1.05;
        window.speechSynthesis.speak(u);
    }

    // --- INICIALIZACIÓN ---
    function initFinalSystem() {
        setTimeout(() => {
            speak("Sistemas Myzion Supreme v35 operativos. Le doy la bienvenida a su centro de mando final. " + 
                  "Utilice el Hub lateral para sus archivos y el control inferior para gestionar páginas y tablas. " +
                  "He habilitado el sistema de corrección elástica para sus documentos.");
        }, 800);
    }

    // --- PÁGINAS ---
    function createNewPage() {
        pageCount++;
        const p = document.createElement('div');
        p.className = 'page-sheet';
        p.contentEditable = "true";
        p.id = 'p' + pageCount;
        p.onfocus = () => activePageId = p.id;
        p.innerHTML = `<div class="page-info">PÁGINA ${pageCount}</div>`;
        document.getElementById('main-canvas').appendChild(p);
        p.focus();
        speak("Página " + pageCount + " lista.");
    }

    // --- TABLAS SUPREMAS ---
    function insertSupremeTable() {
        const id = "tbl_" + Date.now();
        const html = `
            <div id="${id}_container" class="table-wrapper">
                <table id="${id}">
                    <thead><tr><th contenteditable="true">CABECERA A</th><th contenteditable="true">CABECERA B</th></tr></thead>
                    <tbody><tr><td contenteditable="true">...</td><td contenteditable="true">...</td></tr></tbody>
                </table>
                <div style="display:flex; gap:8px; margin-top:8px;">
                    <button class="btn-action" style="padding:4px 10px; font-size:0.5rem;" onclick="addTableRow('${id}')">+ FILA</button>
                    <button class="btn-action" style="padding:4px 10px; font-size:0.5rem;" onclick="addTableCol('${id}')">+ COL</button>
                    <button class="btn-action" style="padding:4px 10px; font-size:0.5rem; color:red; border-color:red" onclick="document.getElementById('${id}_container').remove()">X</button>
                </div>
            </div><br>`;
        document.getElementById(activePageId).innerHTML += html;
        speak("Tabla elástica integrada.");
    }

    function addTableRow(id) {
        const t = document.getElementById(id);
        const r = t.insertRow(-1);
        for(let i=0; i<t.rows[0].cells.length; i++) {
            r.insertCell(i).contentEditable = "true";
            r.cells[i].innerText = "...";
        }
    }

    function addTableCol(id) {
        const t = document.getElementById(id);
        for(let i=0; i<t.rows.length; i++) {
            let c = t.rows[i].insertCell(-1);
            c.contentEditable = "true";
            if(i===0) c.outerHTML = `<th contenteditable="true">NUEVO</th>`;
            else c.innerText = "...";
        }
    }

    // --- INTERACCIÓN ---
    document.addEventListener('click', (e) => {
        if (e.target.tagName === 'TD' || e.target.tagName === 'TH') {
            if (focusedCell) focusedCell.classList.remove('cell-focus');
            focusedCell = e.target;
            focusedCell.classList.add('cell-focus');
            const col = focusedCell.closest('table').rows[0].cells[focusedCell.cellIndex].innerText;
            speak("Foco en " + col);
        }
    });

    // --- VOZ ---
    function toggleVoice() {
        const btn = document.getElementById('voice-trigger');
        const hud = document.getElementById('hud-voice');
        if(!isListening) {
            recognition.start();
            isListening = true;
            btn.classList.add('btn-active');
            hud.style.display = 'block';
            speak("Escuchando comandos.");
        } else {
            recognition.stop();
            isListening = false;
            btn.classList.remove('btn-active');
            hud.style.display = 'none';
        }
    }

    recognition.onresult = (e) => {
        const msg = e.results[e.results.length - 1][0].transcript.toLowerCase();
        if(msg.includes("nueva página")) createNewPage();
        else if(msg.includes("nueva tabla")) insertSupremeTable();
        else if(msg.includes("guardar")) saveToArchive();
        else {
            if(focusedCell) {
                focusedCell.innerText = msg;
                moveToNext();
            } else {
                document.getElementById(activePageId).innerHTML += " " + msg;
            }
        }
    };

    function moveToNext() {
        let n = focusedCell.nextElementSibling;
        if(!n) {
            let nr = focusedCell.parentElement.nextElementSibling;
            if(nr) n = nr.cells[0];
        }
        if(n) {
            focusedCell.classList.remove('cell-focus');
            focusedCell = n;
            focusedCell.classList.add('cell-focus');
        }
    }

    // --- ARCHIVOS HUB ---
    function toggleHub() { document.getElementById('hub-sidebar').classList.toggle('active'); }
    function saveToArchive() {
        const content = document.getElementById('main-canvas').innerHTML;
        const name = "DOC-" + new Date().toLocaleTimeString();
        savedArchives.push({ name, content });
        renderArchive();
        speak("Guardado en repositorio local.");
    }
    function renderArchive() {
        const list = document.getElementById('archive-list');
        list.innerHTML = "";
        savedArchives.forEach((doc) => {
            const div = document.createElement('div');
            div.style = "padding:12px; border-bottom:1px solid #222; font-size:0.65rem; cursor:pointer; color:var(--cyan);";
            div.innerText = "📄 " + doc.name;
            div.onclick = () => { document.getElementById('main-canvas').innerHTML = doc.content; toggleHub(); };
            list.appendChild(div);
        });
    }

    // --- OCR & EXPORT ---
    async function openScanner() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('cam-feed').srcObject = s;
        document.getElementById('ocr-layer').style.display = 'block';
    }
    function closeScanner() {
        document.getElementById('cam-feed').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-layer').style.display = 'none';
    }
    async function executeOCR() {
        speak("Procesando visión OCR.");
        const v = document.getElementById('cam-feed');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(activePageId).innerText += "\n" + res.data.text.trim();
        closeScanner();
        speak("Texto integrado correctamente.");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pgs = document.getElementsByClassName('page-sheet');
        for(let i=0; i<pgs.length; i++) {
            if(i>0) doc.addPage();
            doc.text(doc.splitTextToSize(pgs[i].innerText, 180), 10, 20);
        }
        doc.save("Zion_Report_v35.pdf");
    }

    function exportWord() {
        const content = document.getElementById('main-canvas').innerText;
        const blob = new Blob(['\ufeff' + content], { type: 'application/msword' });
        saveAs(blob, "Zion_Archive.doc");
    }
</script>
</body>
</html>
