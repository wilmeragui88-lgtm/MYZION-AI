<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYZION AI ULTRA</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050a14;
    color:#00ffff;
    overflow:hidden;
    transition:0.5s;
}

.grid{
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

.center{
    position:absolute;
    top:30%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.core{
    width:200px;
    height:200px;
    border-radius:50%;
    border:3px solid #00ffff;
    box-shadow:0 0 40px #00ffff;
    animation:rotate 8s linear infinite;
    transition:0.3s;
}

.listening{
    border-color:lime;
    box-shadow:0 0 60px lime;
}

.speaking{
    border-color:orange;
    box-shadow:0 0 60px orange;
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.panel{
    position:absolute;
    bottom:0;
    width:100%;
    height:45%;
    background:#0a111f;
    overflow-y:auto;
    padding:15px;
}

input{
    width:70%;
    padding:10px;
    background:#111a2e;
    border:none;
    color:#00ffff;
}

button{
    padding:10px;
    background:#00ffff;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="center">
    <h1>MYZION AI</h1>
    <div id="core" class="core"></div>
    <br><br>
    <button onclick="activarEscucha()">Escucha Continua</button>
</div>

<div class="panel" id="panel">
    <p>🚀 MYZION AI ULTRA inicializado...</p>
    <input type="text" id="input" placeholder="Escribe o di: MYZION ...">
    <button onclick="enviarManual()">Enviar</button>
</div>

<script>
// ===== CONFIGURACIÓN =====
const WAKE_WORD = "myzión";
const core = document.getElementById("core");
const panel = document.getElementById("panel");

// Historial de conversación para IA
let historial = [
{role:"system", content:`
Eres MYZION AI, sistema operativo inteligente futurista.
Responde SIEMPRE en JSON.

Conversación:
{ "tipo":"conversacion", "respuesta":"texto" }

Comando:
{ "tipo":"comando", "accion":"nombre_accion", "parametro":"valor", "respuesta":"texto" }
`}
];

// ===== VOZ =====
window.speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };

function hablar(texto){
    core.classList.remove("listening");
    core.classList.add("speaking");

    const speech = new SpeechSynthesisUtterance(texto);
    speech.lang="es-ES";
    speech.rate=0.9;
    speech.pitch=0.8;

    const voces = speechSynthesis.getVoices();
    const vozEspanol = voces.find(v => v.lang.includes("es"));

    if(vozEspanol){ speech.voice = vozEspanol; }

    speech.onend = () => { core.classList.remove("speaking"); };

    speechSynthesis.speak(speech);
}

// ===== ENVÍO IA =====
// PARA SEGURIDAD: Aquí debes llamar a tu BACKEND que contenga la API KEY de OpenAI
async function enviarIA(texto){
    panel.innerHTML += "<p><b>Tú:</b> "+texto+"</p>";

    // Ejemplo de request a backend seguro
    try{
        const response = await fetch("https://TU_BACKEND.com/api/ai",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({mensaje:texto, historial})
        });

        const data = await response.json();
        let json = data; // Esperamos JSON ya estructurado

        panel.innerHTML += "<p><b>MYZION:</b> "+json.respuesta+"</p>";
        panel.scrollTop = panel.scrollHeight;

        hablar(json.respuesta);

        if(json.tipo==="comando"){
            ejecutarComando(json.accion,json.parametro);
        }

        historial.push({role:"user",content:texto});
        historial.push({role:"assistant",content:json.respuesta});
    }catch(err){
        panel.innerHTML += "<p><b>MYZION:</b> Error al conectar con IA.</p>";
    }
}

// ===== COMANDOS =====
function ejecutarComando(accion,parametro){
    if(accion==="abrir_web"){ window.open(parametro); }
    if(accion==="modo_oscuro"){ document.body.style.background="#000000"; }
    if(accion==="modo_claro"){ document.body.style.background="#050a14"; }
}

// ===== ENVÍO MANUAL =====
function enviarManual(){
    const texto = document.getElementById("input").value;
    if(texto) enviarIA(texto);
    document.getElementById("input").value="";
}

// ===== ACTIVACIÓN POR VOZ =====
function activarEscucha(){
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang="es-ES";
    recognition.continuous=true;

    recognition.onresult = (event) => {
        const texto = event.results[event.results.length-1][0].transcript.toLowerCase();
        if(texto.includes(WAKE_WORD) || texto.includes("myz ion")){
            core.classList.add("listening");
            enviarIA(texto);
        }
    };

    recognition.start();
}
</script>

</body>
</html>
