<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | ELASTIC v34.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'JetBrains Mono', monospace; 
            background: var(--bg); color: #fff; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            padding: 10px 20px; background: #000; border-bottom: 2px solid var(--purple);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }

        /* HUB DE ARCHIVOS */
        #file-hub {
            position: fixed; top: 0; right: -320px; width: 320px; height: 100%;
            background: rgba(0, 0, 0, 0.98); border-left: 2px solid var(--purple);
            z-index: 2000; transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1);
            padding: 25px; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        #file-hub.active { right: 0; }

        /* WORKSPACE MULTI-PÁGINA */
        .workspace-area { 
            flex: 1; overflow-y: auto; padding: 40px 10px; 
            display: flex; flex-direction: column; align-items: center; gap: 40px;
            background: #111; scroll-behavior: smooth;
        }

        .page-sheet {
            background: #fff; color: #000; width: 95%; max-width: 800px;
            min-height: 1000px; padding: 50px; border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative;
            outline: none; font-family: 'Arial', sans-serif; overflow-x: hidden;
        }

        /* TABLAS CORREGIDAS SEGÚN LA PÁGINA */
        .table-container { 
            width: 100%; 
            margin: 20px 0; 
            overflow-x: auto; /* Permite scroll si las columnas exceden mucho, pero intenta ajustar */
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: auto; /* Ajuste inteligente según contenido */
            background: #fff;
            border: 2px solid #333;
        }
        th, td { 
            border: 1px solid #999; 
            padding: 10px; 
            word-wrap: break-word; 
            max-width: 200px; 
        }
        .cell-highlight { background: rgba(0, 242, 255, 0.1) !important; border: 2px solid var(--cyan) !important; }

        /* CONTROLES */
        .control-bar { 
            background: #000; border-top: 2px solid var(--cyan);
            padding: 12px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .btn-zion {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 12px 5px; font-family: 'Orbitron'; font-size: 0.5rem; cursor: pointer;
        }
        .btn-active { background: var(--green) !important; color: #000 !important; font-weight: bold; border: none; }
        
        #status-hud { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: var(--purple); padding: 5px 20px; border-radius: 20px; font-size: 0.6rem; display: none; z-index: 3000; font-family: 'Orbitron'; }
    </style>
</head>
<body onload="initZion()">

<div id="status-hud">ESCUCHANDO COMANDOS</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.8rem; color:var(--cyan)">MYZION <span style="color:var(--purple)">ELASTIC</span> v34</div>
    <button class="btn-zion" style="border-color:var(--cyan)" onclick="toggleHub()">MIS DOCUMENTOS ☰</button>
</header>

<div id="file-hub">
    <h3 style="color:var(--purple); font-family:'Orbitron'; font-size:0.7rem;">HUB DE ARCHIVOS</h3>
    <div id="doc-index" style="flex:1; overflow-y:auto; margin-bottom:15px;"></div>
    <button class="btn-zion" style="width:100%" onclick="toggleHub()">CERRAR</button>
</div>

<main class="workspace-area" id="master-workspace">
    <div class="page-sheet" contenteditable="true" id="p1" onfocus="targetPage='p1'">
        <div style="font-size:0.6rem; color:#ccc; font-family:'Orbitron';">PÁGINA 1</div>
        <h2 style="text-align:center;">NÚCLEO DE DATOS v34</h2>
        <p>Inicie su reporte profesional...</p>
    </div>
</main>

<div class="control-bar">
    <button class="btn-zion" style="color:var(--green)" onclick="addNewPage()">+ PÁGINA</button>
    <button class="btn-zion" style="color:var(--green)" onclick="insertAutoTable()">+ TABLA IA</button>
    <button class="btn-zion" onclick="openOCR()">SCAN OCR</button>
    <button id="mic-master" class="btn-zion" style="grid-column: span 3; border-color: var(--green); font-size:0.7rem;" onclick="toggleVoice()">INICIAR VOZ MAESTRA</button>
</div>

<div style="background:#000; padding:10px; display:flex; gap:10px; border-top:1px solid #222;">
    <button class="btn-zion" style="flex:1" onclick="saveToHub()">GUARDAR</button>
    <button class="btn-zion" style="flex:1" onclick="exportPDF()">PDF</button>
    <button class="btn-zion" style="flex:1" onclick="exportWord()">WORD</button>
</div>

<div id="ocr-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:5000;">
    <video id="v-cam" style="width:100%; height:80%; object-fit:cover;" autoplay playsinline></video>
    <div style="height:20%; display:flex; justify-content:space-around; align-items:center;">
        <button class="btn-zion" onclick="closeOCR()">CERRAR</button>
        <button class="btn-zion" style="background:var(--purple)" onclick="runOCR()">CAPTURAR</button>
    </div>
</div>

<script>
    let pCounter = 1;
    let targetPage = 'p1';
    let isListening = false;
    let selectedCell = null;
    let library = [];

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function speak(m) {
        const u = new SpeechSynthesisUtterance(m);
        u.lang = 'es-ES'; u.rate = 1.1;
        window.speechSynthesis.speak(u);
    }

    function initZion() {
        setTimeout(() => {
            speak("Sistemas v34 activos. Corrección de tablas aplicada. " + 
                  "Las tablas ahora se ajustan perfectamente a los documentos. " +
                  "Hub de archivos y páginas infinitas en línea.");
        }, 800);
    }

    // --- MANEJO DE PÁGINAS ---
    function addNewPage() {
        pCounter++;
        const p = document.createElement('div');
        p.className = 'page-sheet';
        p.contentEditable = "true";
        p.id = 'p' + pCounter;
        p.onfocus = () => targetPage = p.id;
        p.innerHTML = `<div style="font-size:0.6rem; color:#ccc; font-family:'Orbitron';">PÁGINA ${pCounter}</div>`;
        document.getElementById('master-workspace').appendChild(p);
        p.focus();
        speak("Página " + pCounter + " creada.");
    }

    // --- TABLAS DINÁMICAS AUTO-CORREGIDAS ---
    function insertAutoTable() {
        const tid = "tab_" + Date.now();
        const html = `
            <div id="${tid}_wrap" class="table-container">
                <table id="${tid}">
                    <thead><tr><th contenteditable="true">CABECERA 1</th><th contenteditable="true">CABECERA 2</th></tr></thead>
                    <tbody><tr><td contenteditable="true">...</td><td contenteditable="true">...</td></tr></tbody>
                </table>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button class="btn-zion" onclick="addRow('${tid}')">+ FILA</button>
                    <button class="btn-zion" onclick="addCol('${tid}')">+ COL</button>
                    <button class="btn-zion" style="color:red" onclick="document.getElementById('${tid}_wrap').remove()">ELIMINAR</button>
                </div>
            </div><br>`;
        document.getElementById(targetPage).innerHTML += html;
        speak("Tabla elástica insertada.");
    }

    function addRow(id) {
        const t = document.getElementById(id);
        const r = t.insertRow(-1);
        for(let i=0; i<t.rows[0].cells.length; i++) {
            r.insertCell(i).contentEditable = "true";
            r.cells[i].innerText = "...";
        }
    }

    function addCol(id) {
        const t = document.getElementById(id);
        for(let i=0; i<t.rows.length; i++) {
            let c = t.rows[i].insertCell(-1);
            c.contentEditable = "true";
            if(i===0) c.outerHTML = `<th contenteditable="true">NUEVO</th>`;
            else c.innerText = "...";
        }
    }

    // --- INTERACCIÓN Y VOZ ---
    document.addEventListener('click', (e) => {
        if (e.target.tagName === 'TD' || e.target.tagName === 'TH') {
            if (selectedCell) selectedCell.classList.remove('cell-highlight');
            selectedCell = e.target;
            selectedCell.classList.add('cell-highlight');
            speak("Posicionado en casilla.");
        }
    });

    function toggleVoice() {
        const btn = document.getElementById('mic-master');
        const hud = document.getElementById('status-hud');
        if(!isListening) {
            recognition.start();
            isListening = true;
            btn.classList.add('btn-active');
            hud.style.display = 'block';
            speak("Escuchando.");
        } else {
            recognition.stop();
            isListening = false;
            btn.classList.remove('btn-active');
            hud.style.display = 'none';
        }
    }

    recognition.onresult = (e) => {
        const msg = e.results[e.results.length - 1][0].transcript.toLowerCase();
        if(msg.includes("nueva página")) addNewPage();
        else if(msg.includes("insertar tabla")) insertAutoTable();
        else {
            if(selectedCell) {
                selectedCell.innerText = msg;
                autoMove();
            } else {
                document.getElementById(targetPage).innerHTML += " " + msg;
            }
        }
    };

    function autoMove() {
        let n = selectedCell.nextElementSibling;
        if(!n) {
            let nr = selectedCell.parentElement.nextElementSibling;
            if(nr) n = nr.cells[0];
        }
        if(n) {
            selectedCell.classList.remove('cell-highlight');
            selectedCell = n;
            selectedCell.classList.add('cell-highlight');
        }
    }

    // --- HUB Y EXPORT ---
    function toggleHub() { document.getElementById('file-hub').classList.toggle('active'); }
    function saveToHub() {
        const content = document.getElementById('master-workspace').innerHTML;
        const name = "DOC_" + new Date().toLocaleTimeString();
        library.push({ name, content });
        renderHub();
        speak("Guardado en Hub.");
    }
    function renderHub() {
        const list = document.getElementById('doc-index');
        list.innerHTML = "";
        library.forEach((d) => {
            const div = document.createElement('div');
            div.style = "padding:10px; border-bottom:1px solid #222; font-size:0.6rem; cursor:pointer;";
            div.innerText = "📄 " + d.name;
            div.onclick = () => { document.getElementById('master-workspace').innerHTML = d.content; toggleHub(); };
            list.appendChild(div);
        });
    }

    async function openOCR() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('v-cam').srcObject = s;
        document.getElementById('ocr-overlay').style.display = 'block';
    }
    function closeOCR() {
        document.getElementById('v-cam').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-overlay').style.display = 'none';
    }
    async function runOCR() {
        speak("Analizando imagen.");
        const v = document.getElementById('v-cam');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(targetPage).innerText += "\n" + res.data.text.trim();
        closeOCR();
        speak("Texto integrado.");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pgs = document.getElementsByClassName('page-sheet');
        for(let i=0; i<pgs.length; i++) {
            if(i>0) doc.addPage();
            doc.text(doc.splitTextToSize(pgs[i].innerText, 180), 10, 20);
        }
        doc.save("Zion_v34.pdf");
    }

    function exportWord() {
        const content = document.getElementById('master-workspace').innerText;
        const blob = new Blob(['\ufeff' + content], { type: 'application/msword' });
        saveAs(blob, "Zion_v34.doc");
    }
</script>
</body>
</html>
