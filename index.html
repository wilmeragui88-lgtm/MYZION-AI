<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | GENESIS SUPREME v24.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --blue: #0072ff; --purple: #bc13fe;
            --bg: #02050a; --glass: rgba(10, 25, 41, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            margin: 0; font-family: 'JetBrains Mono', monospace;
            background: var(--bg); color: var(--cyan); height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { padding: 12px; background: #000; border-bottom: 2px solid var(--blue); display: flex; justify-content: space-between; align-items: center; z-index: 2000; }
        .brand { font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 1px; color: #fff; }

        /* HUB DE ARCHIVOS */
        #file-hub {
            position: absolute; top: 60px; right: 10px; width: 280px;
            background: var(--glass); border: 2px solid var(--purple);
            display: none; flex-direction: column; z-index: 3000; border-radius: 8px;
            max-height: 400px; overflow-y: auto; box-shadow: 0 0 30px rgba(188, 19, 254, 0.5);
        }
        .file-item { padding: 15px; font-size: 0.7rem; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; color: #fff; }
        .file-item:hover { background: var(--purple); }

        /* EDITOR WORD IA */
        .viewport { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 150px; }
        #paper-container { background: #fff; border-radius: 4px; padding: 40px; min-height: 500px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #paper { outline: none; color: #000; font-family: 'Arial', sans-serif; font-size: 1.1rem; line-height: 1.7; text-transform: none; }
        
        /* ESTILOS DE TABLAS Y REPORTES */
        table { width: 100%; border-collapse: collapse; margin: 20px 0; border: 2px solid #000; }
        th, td { border: 1px solid #444; padding: 12px; text-align: left; }
        th { background: #f2f2f2; font-weight: bold; }

        /* HUD CÁMARA */
        #cam-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; }
        video { width: 100%; height: 80%; object-fit: cover; }

        /* BOTONES FUTURISTAS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            background: rgba(0,114,255,0.1); border: 1px solid var(--blue);
            color: #fff; padding: 15px; font-size: 0.6rem; font-family: 'Orbitron'; cursor: pointer;
            transition: 0.3s;
        }
        .btn-active { background: var(--green) !important; color: #000 !important; box-shadow: 0 0 20px var(--green); }
        .btn-ai { border-color: var(--purple); color: var(--purple); }

        footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 2px solid var(--blue); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; z-index: 1000; }
        
        #ai-listener-hud { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 0.6rem; font-weight: bold; display: none; z-index: 4000; }
    </style>
</head>
<body>

<div id="ai-listener-hud">IA ESCUCHANDO...</div>

<header>
    <div class="brand">MYZION SUPREME <span style="color:var(--purple)">v24.0</span></div>
    <button class="btn" style="padding: 5px 15px;" onclick="toggleHub()">HISTORIAL HUB</button>
</header>

<div id="file-hub">
    <div style="padding:15px; background:var(--purple); font-weight:bold; font-size:0.8rem;">MIS DOCUMENTOS</div>
    <div id="file-list"></div>
</div>

<main class="viewport">
    <div id="paper-container">
        <div id="paper" contenteditable="true">
            <b>MODO GENESIS ACTIVADO.</b><br>Diga "Agregar reporte" o "Crear tabla" para usar la IA, o simplemente hable para dictar sus escribas.
        </div>
    </div>

    <div class="grid">
        <button class="btn btn-ai" onclick="generateTable()">INSERTAR TABLA IA</button>
        <button class="btn btn-ai" onclick="readFullDocument()">AUDITORÍA DE VOZ (LEER)</button>
        <button class="btn" onclick="openCam()">ESCANEAR DOCUMENTO</button>
        <button class="btn" onclick="saveToHub()">GUARDAR EN HUB</button>
    </div>
</main>

<div id="cam-overlay">
    <video id="video" autoplay playsinline></video>
    <div style="height:20%; display:flex; justify-content:space-around; align-items:center; background:#000;">
        <button class="btn" onclick="closeCam()">SALIR</button>
        <button class="btn" style="background:var(--purple)" onclick="captureOCR()">CAPTURAR TEXTO</button>
    </div>
</div>

<footer>
    <button id="main-voice-btn" class="btn" style="grid-column: span 2; font-size: 0.8rem; background: #1a1a1a;" onclick="toggleMasterVoice()">
        INICIAR IA PROACTIVA (VOZ)
    </button>
    <button class="btn" onclick="exportPDF()">EXPORTAR A WORD/PDF</button>
    <button class="btn" onclick="saveCloud()">SINC. NUBE</button>
</footer>

<script>
    let isListening = false;
    let savedDocs = [];
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;
    recognition.interimResults = false;

    // --- MOTOR DE VOZ (LECTURA) ---
    function speak(text) {
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'es-ES';
        utter.rate = 1.1;
        synth.speak(utter);
    }

    // --- IA PROACTIVA (DICTADO + COMANDOS) ---
    function toggleMasterVoice() {
        const btn = document.getElementById('main-voice-btn');
        const hud = document.getElementById('ai-listener-hud');
        if(!isListening) {
            recognition.start();
            isListening = true;
            btn.classList.add('btn-active');
            btn.innerText = "IA ESCUCHANDO... (Diga 'Terminar' para leer)";
            hud.style.display = 'block';
            speak("Sistema Genesis listo. ¿Qué desea integrar en su documento?");
        } else {
            recognition.stop();
            isListening = false;
            btn.classList.remove('btn-active');
            btn.innerText = "INICIAR IA PROACTIVA (VOZ)";
            hud.style.display = 'none';
        }
    }

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
        const paper = document.getElementById('paper');

        // Lógica de Comandos Inteligentes
        if (transcript.includes("crear tabla") || transcript.includes("agrega una tabla")) {
            generateTable();
            speak("He integrado la tabla de datos en el documento.");
        } 
        else if (transcript.includes("agregar reporte") || transcript.includes("crear reporte")) {
            const reportBase = `<h2>REPORTE AUTOMÁTICO IA</h2><p>Documento generado por comando de voz el ${new Date().toLocaleString()}.</p>`;
            paper.innerHTML += reportBase;
            speak("Reporte estructurado añadido.");
        }
        else if (transcript.includes("leer documento") || transcript.includes("terminar")) {
            readFullDocument();
        }
        else if (transcript.includes("limpiar todo")) {
            paper.innerHTML = "";
            speak("Documento vaciado.");
        }
        else {
            // Escriba normal
            paper.innerHTML += " " + transcript;
        }
    };

    // --- FUNCIONES ESTRUCTURALES ---
    function generateTable() {
        const tableHTML = `<table>
            <thead><tr><th>PARÁMETRO</th><th>VALOR</th><th>OBSERVACIÓN</th></tr></thead>
            <tbody>
                <tr><td>Actividad</td><td>Procesada</td><td>Voz activa</td></tr>
                <tr><td>Estado</td><td>Óptimo</td><td>Sin errores</td></tr>
            </tbody>
        </table><br>`;
        document.getElementById('paper').innerHTML += tableHTML;
    }

    function readFullDocument() {
        const text = document.getElementById('paper').innerText;
        speak("Iniciando auditoría de voz del documento completo... " + text);
    }

    // --- HUB Y GESTIÓN ---
    function toggleHub() {
        const hub = document.getElementById('file-hub');
        hub.style.display = hub.style.display === 'flex' ? 'none' : 'flex';
    }

    function saveToHub() {
        const content = document.getElementById('paper').innerHTML;
        const name = "DOC_" + new Date().toLocaleTimeString();
        savedDocs.push({ name, content });
        updateHubUI();
        speak("Documento guardado en el historial local.");
    }

    function updateHubUI() {
        const list = document.getElementById('file-list');
        list.innerHTML = "";
        savedDocs.forEach((doc, i) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerText = doc.name;
            item.onclick = () => { document.getElementById('paper').innerHTML = doc.content; toggleHub(); };
            list.appendChild(item);
        });
    }

    // --- EXPORTACIÓN Y CÁMARA (MANTENIENDO v23) ---
    async function openCam() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = s;
        document.getElementById('cam-overlay').style.display = 'block';
    }

    function closeCam() {
        document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('cam-overlay').style.display = 'none';
    }

    async function captureOCR() {
        speak("Procesando imagen con IA anti-ruido");
        const v = document.getElementById('video');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById('paper').innerText += "\n" + res.data.text.trim();
        closeCam();
        speak("Texto integrado correctamente.");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("REGISTRO MYZION SUPREME", 10, 10);
        doc.text(document.getElementById('paper').innerText.substring(0, 1000), 10, 20);
        doc.save("Myzion_Genesis_Final.pdf");
    }

    function saveCloud() { alert("Sincronizando con Firebase Cloud..."); }
</script>
</body>
</html>
