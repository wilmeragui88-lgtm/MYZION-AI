<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | VOICE-COMMAND v20.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --blue: #0072ff; --purple: #bc13fe;
            --bg: #02050a; --glass: rgba(10, 25, 41, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            margin: 0; font-family: 'JetBrains Mono', monospace;
            background: var(--bg); color: var(--cyan); height: 100vh;
            display: flex; flex-direction: column; overflow: hidden; text-transform: uppercase;
        }

        header { padding: 10px; background: #000; border-bottom: 2px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Orbitron'; font-size: 0.7rem; }

        .viewport { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 120px; }
        .panel { background: var(--glass); border: 1px solid rgba(0,242,255,0.2); padding: 10px; border-radius: 5px; }

        /* HUD DE CÁMARA */
        #cam-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; flex-direction: column; }
        #video { width: 100%; height: 70%; object-fit: cover; border-bottom: 2px solid var(--purple); }

        /* PAPEL DE ESCRIBA */
        #paper {
            background: #fff; color: #111; padding: 20px; min-height: 300px;
            border-radius: 2px; font-family: 'serif'; text-transform: none;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }
        #editable-content { outline: none; font-size: 1rem; line-height: 1.5; min-height: 250px; white-space: pre-wrap; }

        /* INDICADOR DE VOZ */
        .voice-indicator {
            display: inline-block; width: 12px; height: 12px; border-radius: 50%;
            background: #333; margin-right: 5px;
        }
        .voice-active { background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px; border-top: 1px solid var(--blue); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: #081a2d; border: 1px solid var(--blue); color: #fff; padding: 12px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; }
        .btn-voice { background: var(--purple); grid-column: span 2; font-weight: bold; border: none; }
    </style>
</head>
<body>

<div id="cam-overlay">
    <video id="video" autoplay playsinline></video>
    <div style="flex:1; display:flex; justify-content:space-around; align-items:center; background:#000;">
        <button class="btn" onclick="closeCam()">CERRAR</button>
        <button onclick="captureAll()" style="width:70px; height:70px; border-radius:50%; background:var(--green); border:none;"></button>
    </div>
</div>

<header>
    <div class="brand">MYZION VOICE-OS <span style="color:var(--purple)">v20.0</span></div>
    <div style="font-size:0.5rem;"><span id="v-dot" class="voice-indicator"></span> IA VOICE ACTIVE</div>
</header>

<main class="viewport">
    <section class="panel">
        <div id="paper">
            <div style="font-size:0.6rem; color:#888; border-bottom:1px solid #eee; margin-bottom:10px;">ESCRIBAS EN TIEMPO REAL</div>
            <div id="editable-content" contenteditable="true">Diga "Empezar" o use el botón de voz...</div>
        </div>
    </section>

    <section class="panel" class="grid" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
        <button class="btn" onclick="openCam()">CÁMARA IA</button>
        <button class="btn" onclick="readAloud()">LEER TEXTO</button>
        <button class="btn" onclick="savePDF()">EXPORTAR PDF</button>
        <button class="btn" onclick="clearPaper()">LIMPIAR TODO</button>
    </section>
</main>

<footer>
    <button class="btn btn-voice" onclick="toggleVoice()">ACTIVAR IA DE VOZ Y COMANDOS</button>
    <button class="btn" onclick="saveCloud()">NUBE</button>
    <button class="btn" onclick="saveIMG()">IMAGEN</button>
</footer>

<script>
    let isListening = false;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;
    recognition.interimResults = false;

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
    }

    function toggleVoice() {
        if (!isListening) {
            recognition.start();
            document.getElementById('v-dot').classList.add('voice-active');
            speak("IA de voz activada. Escuchando comandos y escribas.");
            isListening = true;
        } else {
            recognition.stop();
            document.getElementById('v-dot').classList.remove('voice-active');
            isListening = false;
        }
    }

    recognition.onresult = (event) => {
        const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
        const paper = document.getElementById('editable-content');

        // LÓGICA DE COMANDOS DE VOZ
        if (command.includes("abrir cámara")) { openCam(); speak("Abriendo cámara"); }
        else if (command.includes("guardar pdf")) { savePDF(); speak("Generando archivo P D F"); }
        else if (command.includes("limpiar papel")) { clearPaper(); speak("Papel limpio"); }
        else if (command.includes("leer texto")) { readAloud(); }
        else {
            // SI NO ES COMANDO, ES ESCRIBA (DICTADO)
            if(paper.innerText.includes("Diga")) paper.innerText = "";
            paper.innerText += " " + command;
        }
    };

    async function openCam() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = s;
        document.getElementById('cam-overlay').style.display = 'flex';
    }

    function closeCam() {
        const v = document.getElementById('video');
        if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('cam-overlay').style.display = 'none';
    }

    async function captureAll() {
        const v = document.getElementById('video');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        const ctx = c.getContext('2d');
        ctx.filter = 'grayscale(1) contrast(2)';
        ctx.drawImage(v, 0, 0);
        
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById('editable-content').innerText += "\n" + res.data.text.trim();
        speak("Escaneo completado con éxito.");
        closeCam();
    }

    function readAloud() {
        const text = document.getElementById('editable-content').innerText;
        speak("Iniciando lectura del documento: " + text);
    }

    function clearPaper() { document.getElementById('editable-content').innerText = ""; }

    function savePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(document.getElementById('editable-content').innerText, 15, 20);
        doc.save("Escriba_Zion.pdf");
    }

    async function saveIMG() {
        const canvas = await html2canvas(document.getElementById('paper'));
        const link = document.createElement('a');
        link.download = 'Myzion_Captura.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>
</body>
</html>
