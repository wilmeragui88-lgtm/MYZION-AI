<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYZION AI - Total Fix</title>
    <style>
        :root { --primary: #00ffff; --bg: #010409; --accent: #ff00ff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .bg-grid { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #0a192f 0%, #010409 100%); z-index: -1; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 0.95rem; border: 1px solid rgba(0,255,255,0.2); }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.05); border-left: 3px solid var(--primary); }
        .user { align-self: flex-end; background: var(--primary); color: #000; font-weight: bold; }
        .controls { background: rgba(0,0,0,0.9); padding: 20px; border-top: 1px solid var(--primary); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .nexus { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 0 15px var(--primary); cursor: pointer; }
        .active { border-color: var(--accent); box-shadow: 0 0 25px var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .input-box { width: 100%; display: flex; gap: 10px; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--primary); color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div id="chat"></div>
    <div class="controls">
        <div id="nexus" class="nexus" onclick="startVoice()"></div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Escribe o pulsa el círculo para hablar...">
            <button onclick="handleAction()">ENVIAR</button>
        </div>
    </div>

<script>
    // USANDO LA LLAVE QUE PROPORCIONASTE
    const GEMINI_KEY = 'AIzaSyBf_shZMc7pa6q9BhX9i2njKW1G_O9Iegg';
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const nexus = document.getElementById('nexus');

    function addMsg(role, text) {
        const d = document.createElement('div');
        d.className = `msg ${role}`;
        d.innerHTML = text.replace(/\n/g, '<br>');
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    async function speak(text) {
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'es-ES';
        window.speechSynthesis.speak(ut);
    }

    async function handleAction() {
        const val = input.value.trim();
        if(!val) return;
        addMsg('user', val);
        input.value = '';
        nexus.classList.add('active');

        try {
            // Petición simplificada para evitar bloqueos
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const aiResp = data.candidates[0].content.parts[0].text;
            addMsg('ai', aiResp);
            speak(aiResp);
        } catch (e) {
            addMsg('ai', "Error detectado. Por favor, asegúrate de que tu API Key no tenga restricciones de 'Sitio web' en Google Cloud Console.");
        } finally {
            nexus.classList.remove('active');
        }
    }

    function startVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-ES';
        rec.onresult = (e) => { input.value = e.results[0][0].transcript; handleAction(); };
        rec.start();
    }

    window.onload = () => {
        const w = "MYZION Iniciada. Estoy lista para escucharte y responder con voz.";
        addMsg('ai', w);
        speak(w);
    };
</script>
</body>
</html>
