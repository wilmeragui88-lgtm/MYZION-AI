<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | SUPREME v30.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #010409; --panel: rgba(13, 17, 23, 0.9);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'JetBrains Mono', monospace; 
            background: var(--bg); color: #fff; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header { 
            padding: 12px 20px; background: #000; border-bottom: 2px solid var(--purple);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .brand { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--cyan); letter-spacing: 2px; }

        /* ÁREA DE TRABAJO (EDITOR PROFESIONAL) */
        .viewport { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 10px; }
        #canvas-word { 
            flex: 1; background: #fff; color: #000; border-radius: 4px;
            padding: 40px; overflow-y: auto; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        #main-editor { outline: none; font-size: 1rem; line-height: 1.6; font-family: 'Arial', sans-serif; min-height: 100%; }

        /* TABLAS EVITABLES Y DINÁMICAS */
        .table-wrapper { margin: 20px 0; border: 1px solid #ddd; padding: 10px; background: #fdfdfd; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; min-width: 50px; }
        th { background: #f0f0f0; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; }
        .cell-active { background: rgba(0, 242, 255, 0.15) !important; border: 2px solid var(--cyan) !important; }
        
        .table-btns { display: flex; gap: 8px; margin-top: 8px; }
        .btn-mini { background: #111; color: var(--cyan); border: 1px solid var(--cyan); padding: 4px 8px; font-size: 0.5rem; cursor: pointer; font-family: 'Orbitron'; }

        /* PANEL DE COMANDOS */
        .command-center { 
            background: var(--panel); border-top: 2px solid var(--purple);
            padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
        }
        .btn-main {
            background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff;
            padding: 15px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-main:hover { border-color: var(--cyan); background: rgba(0, 242, 255, 0.1); }
        .btn-ai { border-color: var(--green); color: var(--green); }
        .btn-voice-active { background: var(--green) !important; color: #000 !important; box-shadow: 0 0 15px var(--green); border: none; }

        /* HUD & OVERLAYS */
        #voice-hud { 
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: var(--purple); color: #fff; padding: 6px 20px; border-radius: 20px;
            font-size: 0.6rem; font-family: 'Orbitron'; display: none; z-index: 2000;
        }
        #scanner-layer { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }

        .export-row { background: #000; padding: 10px; display: flex; justify-content: space-around; gap: 5px; }
    </style>
</head>
<body onload="bootSystem()">

<div id="voice-hud">SISTEMA ESCUCHANDO...</div>

<header>
    <div class="brand">MYZION <span style="color:var(--purple)">OS</span> v30</div>
    <div id="sys-time" style="font-size: 0.7rem; color: var(--cyan);">--:--:--</div>
</header>

<main class="viewport">
    <div id="canvas-word">
        <div id="main-editor" contenteditable="true">
            <h1 style="text-align:center;">NÚCLEO DE TRABAJO v30</h1>
            <p>Inicie la interfaz de voz para procesar datos.</p>
        </div>
    </div>
</main>

<div class="command-center">
    <button class="btn-main btn-ai" onclick="createDynamicTable()">+ TABLA DINÁMICA</button>
    <button class="btn-main btn-ai" onclick="startGuidedFill()">LLENAR TABLA (VOZ)</button>
    <button class="btn-main" onclick="openScanner()">ESCANEAR OCR</button>
    <button class="btn-main" onclick="runAuditory()">AUDITORÍA DE VOZ</button>
    <button id="master-voice-btn" class="btn-main" style="grid-column: span 2; border-color: var(--cyan); color: var(--cyan);" onclick="toggleVoice()">INICIAR INTERFAZ DE VOZ MAESTRA</button>
</div>

<div class="export-row">
    <button class="btn-mini" style="flex:1" onclick="exportToPDF()">PDF</button>
    <button class="btn-mini" style="flex:1" onclick="exportToWord()">WORD</button>
    <button class="btn-mini" style="flex:1" onclick="exportToPNG()">IMAGEN</button>
    <button class="btn-mini" style="flex:1; border-color:red; color:red" onclick="resetCanvas()">RESET</button>
</div>

<div id="scanner-layer">
    <video id="v-feed" style="width:100%; height:80%; object-fit:cover;" autoplay playsinline></video>
    <div style="height:20%; display:flex; justify-content:space-around; align-items:center;">
        <button class="btn-main" onclick="closeScanner()">CERRAR</button>
        <button class="btn-main" style="background:var(--purple)" onclick="captureOCR()">CAPTURAR</button>
    </div>
</div>

<script>
    let isListening = false;
    let isFilling = false;
    let currentCell = null;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function speak(txt) {
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'es-ES'; u.rate = 1.05;
        window.speechSynthesis.speak(u);
    }

    // --- PROTOCOLO DE INICIO ---
    function bootSystem() {
        setInterval(() => { document.getElementById('sys-time').innerText = new Date().toLocaleTimeString(); }, 1000);
        setTimeout(() => {
            speak("Sistemas Myzion Supreme v30 iniciados. Bienvenida maestra. " +
                  "He configurado sus tablas dinámicas, el motor OCR y el sistema de exportación multiformato. " +
                  "Ahora puede agregar filas y columnas a sus tablas con comandos de voz o botones. " +
                  "Estoy lista para recibir su primer dictado.");
        }, 800);
    }

    // --- INTERFAZ DE VOZ ---
    function toggleVoice() {
        const btn = document.getElementById('master-voice-btn');
        const hud = document.getElementById('voice-hud');
        if(!isListening) {
            recognition.start();
            isListening = true;
            btn.classList.add('btn-voice-active');
            btn.innerText = "IA ESCUCHANDO...";
            hud.style.display = 'block';
            speak("Escuchando comandos.");
        } else {
            recognition.stop();
            isListening = false;
            btn.classList.remove('btn-voice-active');
            btn.innerText = "INICIAR INTERFAZ DE VOZ MAESTRA";
            hud.style.display = 'none';
        }
    }

    recognition.onresult = (e) => {
        const msg = e.results[e.results.length - 1][0].transcript.toLowerCase();
        const editor = document.getElementById('main-editor');

        if(msg.includes("crear tabla")) { createDynamicTable(); }
        else if(msg.includes("llenar tabla")) { startGuidedFill(); }
        else if(msg.includes("auditoría")) { runAuditory(); }
        else if(msg.includes("limpiar")) { resetCanvas(); }
        else if(msg.includes("escribir fuera")) { isFilling = false; speak("Dictado libre."); }
        else {
            if(isFilling && currentCell) {
                currentCell.innerText = msg;
                autoNextCell();
            } else {
                editor.innerHTML += " " + msg;
            }
        }
    };

    // --- MOTOR DE TABLAS DINÁMICAS ---
    function createDynamicTable() {
        const tid = "tab_" + Date.now();
        const html = `
            <div id="${tid}_container" class="table-wrapper">
                <table id="${tid}">
                    <thead>
                        <tr><th contenteditable="true">ENCABEZADO 1</th><th contenteditable="true">ENCABEZADO 2</th></tr>
                    </thead>
                    <tbody>
                        <tr><td contenteditable="true">...</td><td contenteditable="true">...</td></tr>
                    </tbody>
                </table>
                <div class="table-btns">
                    <button class="btn-mini" onclick="addRow('${tid}')">+ FILA</button>
                    <button class="btn-mini" onclick="addCol('${tid}')">+ COL</button>
                    <button class="btn-mini" style="color:red; border-color:red" onclick="document.getElementById('${tid}_container').remove()">BORRAR</button>
                </div>
            </div><br>`;
        document.getElementById('main-editor').innerHTML += html;
        speak("Tabla dinámica generada. ¿Desea que la completemos?");
    }

    function addRow(id) {
        const t = document.getElementById(id);
        const r = t.insertRow(-1);
        for(let i=0; i<t.rows[0].cells.length; i++) {
            let c = r.insertCell(i); c.contentEditable = "true"; c.innerText = "...";
        }
    }

    function addCol(id) {
        const t = document.getElementById(id);
        for(let i=0; i<t.rows.length; i++) {
            let c = t.rows[i].insertCell(-1);
            c.contentEditable = "true";
            if(i===0) { c.outerHTML = `<th contenteditable="true">NUEVO</th>`; }
            else { c.innerText = "..."; }
        }
    }

    // --- LLENADO GUIADO IA ---
    function startGuidedFill() {
        const tables = document.getElementsByTagName('table');
        if(tables.length === 0) { speak("No detecto tablas. Creando una nueva."); createDynamicTable(); return; }
        isFilling = true;
        const target = tables[tables.length - 1].rows[1].cells[0];
        focusCell(target);
    }

    function focusCell(cell) {
        if(currentCell) currentCell.classList.remove('cell-active');
        currentCell = cell;
        cell.classList.add('cell-active');
        cell.focus();
        const header = cell.closest('table').rows[0].cells[cell.cellIndex].innerText;
        speak("Dato para " + header);
    }

    function autoNextCell() {
        let next = currentCell.nextElementSibling;
        if(!next) {
            let nextRow = currentCell.parentElement.nextElementSibling;
            if(nextRow) next = nextRow.cells[0];
        }
        if(next) focusCell(next);
        else { isFilling = false; speak("Tabla completada."); currentCell.classList.remove('cell-active'); }
    }

    // --- OCR & EXPORT ---
    async function openScanner() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('v-feed').srcObject = s;
        document.getElementById('scanner-layer').style.display = 'block';
        speak("Escáner listo.");
    }

    function closeScanner() {
        document.getElementById('v-feed').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('scanner-layer').style.display = 'none';
    }

    async function captureOCR() {
        speak("Procesando imagen con motor OCR.");
        const v = document.getElementById('v-feed');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById('main-editor').innerText += "\n" + res.data.text.trim();
        closeScanner();
        speak("Texto integrado al documento.");
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(doc.splitTextToSize(document.getElementById('main-editor').innerText, 180), 10, 20);
        doc.save("Zion_Supreme_v30.pdf");
        speak("Exportación a P D F lista.");
    }

    function exportToWord() {
        const content = document.getElementById('main-editor').innerText;
        const blob = new Blob(['\ufeff' + content], { type: 'application/msword' });
        saveAs(blob, "Zion_Document.doc");
        speak("Archivo Word generado.");
    }

    async function exportToPNG() {
        const canvas = await html2canvas(document.getElementById('canvas-word'));
        const link = document.createElement('a');
        link.download = 'Captura_Supreme.png';
        link.href = canvas.toDataURL();
        link.click();
        speak("Imagen de alta resolución guardada.");
    }

    function runAuditory() { speak("Iniciando auditoría de voz: " + document.getElementById('main-editor').innerText); }
    function resetCanvas() { document.getElementById('main-editor').innerHTML = ""; speak("Documento reiniciado."); }
</script>
</body>
</html>
