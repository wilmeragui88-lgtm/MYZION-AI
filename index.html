<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | OMNI-COMMAND v29.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #010409;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'JetBrains Mono', monospace; 
            background: var(--bg); color: #fff; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER PROFESIONAL */
        header { 
            padding: 10px 20px; background: #000; border-bottom: 2px solid var(--cyan);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .status-light { width: 10px; height: 10px; background: var(--green); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--green); }

        /* CONTENEDOR PRINCIPAL: SPLIT VIEW */
        .master-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* EDITOR DE DOCUMENTOS (WORD-CORE) */
        #work-area { 
            flex: 2; background: #fff; color: #000; margin: 15px; border-radius: 4px;
            padding: 40px; overflow-y: auto; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        #editor { outline: none; font-size: 1rem; line-height: 1.6; font-family: 'Arial', sans-serif; min-height: 100%; }

        /* PANEL DE CONTROL INTEGRADO (DASHBOARD) */
        .control-panel { 
            background: rgba(0,0,0,0.9); border-top: 1px solid #333;
            padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
        }

        /* BOTONES TÉCNICOS */
        .btn-tech {
            background: rgba(255,255,255,0.05); border: 1px solid #444; color: #fff;
            padding: 12px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; border-radius: 2px;
        }
        .btn-tech:hover { border-color: var(--cyan); background: rgba(0, 242, 255, 0.1); }
        .btn-ai { border-color: var(--purple); color: var(--purple); font-weight: bold; }
        .btn-active { background: var(--green) !important; color: #000 !important; border-color: var(--green); }

        /* TABLAS INTERACTIVAS */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 2px solid #000; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .cell-focus { background: rgba(0, 242, 255, 0.1) !important; border: 2px solid var(--cyan) !important; }

        /* MODALES Y OVERLAYS */
        #cam-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }
        #voice-indicator { 
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: var(--purple); color: #fff; padding: 5px 20px; border-radius: 20px;
            font-size: 0.6rem; display: none; z-index: 6000; font-family: 'Orbitron';
        }

        /* BARRA DE EXPORTACIÓN */
        .export-bar { background: #111; padding: 10px; display: flex; justify-content: space-around; border-top: 1px solid #222; }
    </style>
</head>
<body onload="initSystem()">

<div id="voice-indicator">SISTEMA ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.8rem;">
        <span class="status-light"></span>MYZION <span style="color:var(--cyan)">OS v29</span>
    </div>
    <div id="clock" style="font-size:0.7rem; color:var(--cyan)">00:00:00</div>
</header>

<main class="master-container">
    <div id="work-area">
        <div id="editor" contenteditable="true">
            <h2 style="text-align:center;">NÚCLEO DE DOCUMENTACIÓN</h2>
            <p>Esperando instrucciones de voz o manuales...</p>
        </div>
    </div>

    <div class="control-panel">
        <button class="btn-tech btn-ai" onclick="cmdCreateTable()">NUEVA TABLA IA</button>
        <button class="btn-tech btn-ai" onclick="startTableFill()">LLENAR TABLA (VOZ)</button>
        <button class="btn-tech" onclick="openScanner()">ESCANEAR OCR</button>
        <button class="btn-tech" onclick="iaAudit()">AUDITORÍA FINAL</button>
        <button id="voice-master-btn" class="btn-tech" style="grid-column: span 2; border-color: var(--green);" onclick="toggleVoice()">INICIAR INTERFAZ DE VOZ</button>
    </div>
</main>

<div class="export-bar">
    <button class="btn-tech" onclick="exportPDF()" style="color:red">PDF</button>
    <button class="btn-tech" onclick="exportWord()" style="color:blue">WORD</button>
    <button class="btn-tech" onclick="exportPNG()" style="color:green">PNG</button>
    <button class="btn-tech" onclick="clearAll()">RESET</button>
</div>

<div id="cam-overlay">
    <video id="v-feed" style="width:100%; height:85%; object-fit:cover;" autoplay playsinline></video>
    <div style="height:15%; display:flex; justify-content:space-around; align-items:center;">
        <button class="btn-tech" onclick="closeScanner()">CERRAR</button>
        <button class="btn-tech" style="background:var(--purple)" onclick="processOCR()">CAPTURAR TEXTO</button>
    </div>
</div>

<script>
    let isListening = false;
    let isFilling = false;
    let activeCell = null;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'es-ES'; u.rate = 1;
        window.speechSynthesis.speak(u);
    }

    // --- BIENVENIDA E INSTRUCCIONES ---
    function initSystem() {
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        
        setTimeout(() => {
            speak("Sistemas Myzion operativos. Soy su asistente inteligente v29. " +
                  "Mis funciones incluyen: Dictado de escribas, creación de tablas dinámicas, " +
                  "llenado guiado por voz, escáner OCR anti-ruido y exportación a PDF, Word e Imagen. " +
                  "Para comenzar, pulse el botón verde de interfaz de voz o use los controles táctiles inferiores.");
        }, 1000);
    }

    // --- GESTIÓN DE VOZ ---
    function toggleVoice() {
        const btn = document.getElementById('voice-master-btn');
        const ind = document.getElementById('voice-indicator');
        if(!isListening) {
            recognition.start();
            isListening = true;
            btn.classList.add('btn-active');
            ind.style.display = 'block';
            speak("Interfaz de voz activa. ¿En qué puedo ayudarle?");
        } else {
            recognition.stop();
            isListening = false;
            btn.classList.remove('btn-active');
            ind.style.display = 'none';
        }
    }

    recognition.onresult = (e) => {
        const msg = e.results[e.results.length - 1][0].transcript.toLowerCase();
        const editor = document.getElementById('editor');

        if(msg.includes("crear tabla")) { cmdCreateTable(); }
        else if(msg.includes("llenar tabla")) { startTableFill(); }
        else if(msg.includes("limpiar documento")) { clearAll(); }
        else if(msg.includes("auditoría")) { iaAudit(); }
        else if(msg.includes("escribir fuera")) { isFilling = false; speak("Dictado de texto libre activo."); }
        else {
            if(isFilling && activeCell) {
                activeCell.innerText = msg;
                moveToNext();
            } else {
                editor.innerHTML += " " + msg;
            }
        }
    };

    // --- TABLAS DINÁMICAS ---
    function cmdCreateTable() {
        const id = "T_" + Date.now();
        const html = `<div id="${id}_container" style="margin-bottom:20px;">
            <table id="${id}">
                <thead><tr><th contenteditable="true">ITEM</th><th contenteditable="true">ESTADO</th></tr></thead>
                <tbody><tr><td contenteditable="true">...</td><td contenteditable="true">...</td></tr></tbody>
            </table>
            <div style="margin-top:5px; display:flex; gap:10px;">
                <button onclick="addRow('${id}')" style="font-size:0.6rem; cursor:pointer;">+ Fila</button>
                <button onclick="document.getElementById('${id}_container').remove()" style="font-size:0.6rem; color:red; cursor:pointer;">Eliminar</button>
            </div>
        </div>`;
        document.getElementById('editor').innerHTML += html;
        speak("Tabla insertada. ¿Desea que la llenemos juntos?");
    }

    function addRow(tid) {
        const t = document.getElementById(tid);
        const r = t.insertRow(-1);
        for(let i=0; i<t.rows[0].cells.length; i++) {
            let c = r.insertCell(i); c.contentEditable = "true"; c.innerText = "...";
        }
    }

    // --- LLENADO POR VOZ ---
    function startTableFill() {
        const tables = document.getElementsByTagName('table');
        if(tables.length === 0) { speak("No hay tablas. Creando una."); cmdCreateTable(); return; }
        isFilling = true;
        const target = tables[tables.length - 1].rows[1].cells[0];
        focusOn(target);
    }

    function focusOn(cell) {
        if(activeCell) activeCell.classList.remove('cell-focus');
        activeCell = cell;
        cell.classList.add('cell-focus');
        cell.focus();
        const header = cell.closest('table').rows[0].cells[cell.cellIndex].innerText;
        speak("Ingrese dato para: " + header);
    }

    function moveToNext() {
        let next = activeCell.nextElementSibling;
        if(!next) {
            let nextRow = activeCell.parentElement.nextElementSibling;
            if(nextRow) next = nextRow.cells[0];
        }
        if(next) focusOn(next);
        else { isFilling = false; speak("Llenado de tabla finalizado."); activeCell.classList.remove('cell-focus'); }
    }

    // --- OCR & EXPORT ---
    async function openScanner() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('v-feed').srcObject = s;
        document.getElementById('cam-overlay').style.display = 'block';
        speak("Escáner listo.");
    }

    function closeScanner() {
        document.getElementById('v-feed').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('cam-overlay').style.display = 'none';
    }

    async function processOCR() {
        speak("Procesando imagen.");
        const v = document.getElementById('v-feed');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById('editor').innerText += "\n" + res.data.text.trim();
        closeScanner();
        speak("Texto integrado.");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(doc.splitTextToSize(document.getElementById('editor').innerText, 180), 10, 20);
        doc.save("Reporte_Zion.pdf");
    }

    function exportWord() {
        const content = document.getElementById('editor').innerText;
        const blob = new Blob(['\ufeff' + content], { type: 'application/msword' });
        saveAs(blob, "Documento_Zion.doc");
    }

    async function exportPNG() {
        const canvas = await html2canvas(document.getElementById('work-area'));
        const link = document.createElement('a');
        link.download = 'Captura_Zion.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    function iaAudit() { speak("Auditoría completa: " + document.getElementById('editor').innerText); }
    function clearAll() { document.getElementById('editor').innerHTML = ""; speak("Sistema reiniciado."); }
</script>
</body>
</html>
