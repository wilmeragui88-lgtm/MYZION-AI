<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | OMNI-POWER v41</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* INICIALIZACIÓN VOCAL */
        #boot-layer { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pulse-btn { background: none; border: 2px solid var(--green); color: var(--green); padding: 20px 40px; font-family: 'Orbitron'; cursor: pointer; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 255, 157, 0.2); transition: 0.3s; }
        .pulse-btn:hover { background: var(--green); color: #000; }

        header { padding: 10px 20px; background: #000; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        
        /* BARRA DE HERRAMIENTAS WORD-STYLE */
        .toolbar { background: #1a1d23; padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #333; overflow-x: auto; position: sticky; top: 0; z-index: 500; }
        .tool-group { display: flex; gap: 5px; border-right: 1px solid #444; padding-right: 10px; align-items: center; }
        .t-btn { background: #222; border: 1px solid #444; color: #fff; padding: 6px 12px; font-size: 0.7rem; cursor: pointer; border-radius: 3px; font-family: 'Orbitron'; }
        .t-btn:hover { border-color: var(--cyan); background: #333; }
        select { background: #222; color: #fff; border: 1px solid #444; font-size: 0.75rem; padding: 4px; border-radius: 3px; }

        /* ESPACIO DE TRABAJO */
        .workspace { flex: 1; overflow-y: auto; padding: 30px 10px; display: flex; flex-direction: column; align-items: center; gap: 40px; background: #0f1115; scroll-behavior: smooth; }
        .page-sheet { background: #fff; color: #000; width: 100%; max-width: 850px; min-height: 1100px; padding: 60px; border-radius: 2px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); position: relative; outline: none; font-family: 'Arial'; line-height: 1.5; overflow-wrap: break-word; }
        
        /* ELEMENTOS DINÁMICOS */
        .table-box { width: 100%; margin: 20px 0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; border: 2px solid #333; table-layout: auto; }
        th, td { border: 1px solid #999; padding: 10px; min-width: 80px; }
        .shape { display: inline-block; border: 2px solid #000; margin: 10px; }
        img { max-width: 100%; border-radius: 5px; margin: 10px 0; }

        /* CONTROLES INFERIORES */
        .control-panel { background: #000; padding: 12px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; border-top: 2px solid var(--cyan); }
        #sidebar { position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: #05070a; border-left: 2px solid var(--purple); z-index: 2000; transition: 0.4s; padding: 25px; }
        #sidebar.active { right: 0; }
        #voice-hud { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 5px 25px; border-radius: 30px; font-size: 0.6rem; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; }
    </style>
</head>
<body>

<div id="boot-layer">
    <h1 style="color:var(--cyan); font-family:'Orbitron';">MYZION MASTER v41</h1>
    <p style="color:#666; font-size:0.8rem; margin-bottom:25px;">SUITE DE REDACCIÓN INTELIGENTE</p>
    <button class="pulse-btn" onclick="startSystem()">INICIALIZAR VOZ Y HERRAMIENTAS</button>
</div>

<div id="voice-hud">IA ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.8rem; color:var(--cyan)">MYZION <span style="color:var(--green)">OMNI-SUITE</span></div>
    <button class="t-btn" style="border-color:var(--purple)" onclick="toggleSidebar()">REPOSITORIO ☰</button>
</header>

<div class="toolbar">
    <div class="tool-group">
        <select onchange="format('fontName', this.value)">
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times</option>
            <option value="Courier New">Courier</option>
            <option value="Georgia">Georgia</option>
        </select>
        <select onchange="format('fontSize', this.value)">
            <option value="3">Tamaño Normal</option>
            <option value="5">Subtítulo</option>
            <option value="7">Título Principal</option>
        </select>
    </div>
    <div class="tool-group">
        <button class="t-btn" onclick="format('bold')"><b>N</b></button>
        <button class="t-btn" onclick="format('italic')"><i>K</i></button>
        <button class="t-btn" onclick="format('underline')"><u>S</u></button>
        <input type="color" onchange="format('foreColor', this.value)" title="Color de letra">
    </div>
    <div class="tool-group">
        <button class="t-btn" onclick="insertFigure('rect')">Rectángulo</button>
        <button class="t-btn" onclick="document.getElementById('img-input').click()">Imagen</button>
        <input type="file" id="img-input" hidden accept="image/*" onchange="insertImage(this)">
    </div>
</div>

<main class="workspace" id="master-canvas">
    <div class="page-sheet" contenteditable="true" id="p1" onfocus="activeP='p1'">
        <h1 style="text-align:center; font-family:'Orbitron';">REPORTE MYZION PRO</h1>
        <hr>
        <p>Inicie su edición o use el dictado por voz...</p>
    </div>
</main>

<div class="control-panel">
    <button class="t-btn" style="color:var(--green)" onclick="addPage()">+ PÁGINA</button>
    <button class="t-btn" style="color:var(--green)" onclick="addTable()">+ TABLA</button>
    <button class="t-btn" onclick="runOCR()">OCR SCAN</button>
    <button class="t-btn" style="background:var(--purple)" onclick="shareProject()">COMPARTIR</button>
    <button id="mic-btn" class="t-btn" style="grid-column: span 4; border-color: var(--green); margin-top:5px;" onclick="toggleVoice()">ACTIVAR VOZ MAESTRA</button>
</div>

<div style="background:#000; padding:10px; display:flex; gap:10px; border-top:1px solid #222;">
    <button class="t-btn" style="flex:1" onclick="saveToHub()">GUARDAR</button>
    <button class="t-btn" style="flex:1" onclick="exportPDF()">PDF</button>
    <button class="t-btn" style="flex:1" onclick="exportWord()">WORD</button>
</div>

<div id="sidebar">
    <h3 style="color:var(--cyan); font-family:'Orbitron'; font-size:0.7rem;">ARCHIVOS GUARDADOS</h3>
    <div id="archive-list" style="overflow-y:auto; height:70%;"></div>
    <button class="t-btn" style="width:100%; margin-top:20px;" onclick="toggleSidebar()">CERRAR</button>
</div>

<script>
    let activeP = 'p1';
    let isListening = false;
    let savedDocs = [];
    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES'; recognition.continuous = true;

    function speak(t) {
        synth.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES'; m.rate = 1.0;
        synth.speak(m);
    }

    function startSystem() {
        document.getElementById('boot-layer').style.display = 'none';
        const msg = "Sistemas Myzion v41 operativos. Bienvenido a su Suite de Redacción. " +
        "He habilitado la barra superior de herramientas estilo Word para cambiar fuentes, colores e insertar imágenes. " +
        "Tiene disponibles las tablas elásticas, el escáner O C R y el repositorio de archivos. " +
        "Ahora puede compartir su documento directamente desde el botón púrpura. ¿Qué desea crear hoy?";
        speak(msg);
    }

    // --- FUNCIONES DE EDICIÓN WORD-STYLE ---
    function format(cmd, val = null) {
        document.execCommand(cmd, false, val);
        speak("Formato actualizado.");
    }

    function insertFigure(type) {
        const fig = document.createElement('div');
        fig.className = 'shape'; fig.contentEditable = "false";
        if(type === 'rect') fig.style = "width:150px; height:80px; background:#333; border:2px solid var(--cyan);";
        document.getElementById(activeP).appendChild(fig);
        speak("Figura geométrica insertada.");
    }

    function insertImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                document.getElementById(activeP).appendChild(img);
                speak("Imagen integrada al documento.");
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function shareProject() {
        const text = document.getElementById('master-canvas').innerText;
        if (navigator.share) {
            try {
                await navigator.share({ title: 'Documento Myzion v41', text: text });
                speak("Abriendo interfaz para compartir.");
            } catch (err) { speak("Error al compartir."); }
        } else { speak("Función de compartir no disponible en este navegador."); }
    }

    // --- FUNCIONES CORE ---
    function addPage() {
        const id = 'p' + (document.querySelectorAll('.page-sheet').length + 1);
        const p = document.createElement('div');
        p.className = 'page-sheet'; p.contentEditable = "true"; p.id = id;
        p.onfocus = () => activeP = id;
        p.innerHTML = `<h3 style="color:#ccc; font-family:'Orbitron';">PÁGINA ${id.substring(1)}</h3><hr>`;
        document.getElementById('master-canvas').appendChild(p);
        p.focus(); speak("Página " + id.substring(1) + " creada.");
    }

    function addTable() {
        const html = `<div class="table-box"><table><tr><td contenteditable="true">Cabecera</td><td contenteditable="true">Datos</td></tr><tr><td contenteditable="true">...</td><td contenteditable="true">...</td></tr></table></div><br>`;
        document.getElementById(activeP).innerHTML += html;
        speak("Tabla elástica añadida.");
    }

    function toggleVoice() {
        const hud = document.getElementById('voice-hud');
        if(!isListening) {
            recognition.start(); isListening = true;
            document.getElementById('mic-btn').style.background = "var(--green)";
            hud.style.display = "block"; speak("Escuchando.");
        } else {
            recognition.stop(); isListening = false;
            document.getElementById('mic-btn').style.background = "#111";
            hud.style.display = "none"; speak("Voz desactivada.");
        }
    }

    recognition.onresult = (e) => {
        const t = e.results[e.results.length - 1][0].transcript;
        document.execCommand('insertText', false, " " + t);
        speak("Registrado.");
    };

    function saveToHub() {
        const name = "DOC-" + new Date().toLocaleTimeString();
        savedDocs.push({ name, html: document.getElementById('master-canvas').innerHTML });
        updateHub(); speak("Guardado en el repositorio como " + name);
    }

    function updateHub() {
        const list = document.getElementById('archive-list');
        list.innerHTML = "";
        savedDocs.forEach(d => {
            const div = document.createElement('div');
            div.style = "padding:12px; border-bottom:1px solid #333; color:var(--cyan); cursor:pointer; font-size:0.65rem;";
            div.innerText = "📄 " + d.name;
            div.onclick = () => { document.getElementById('master-canvas').innerHTML = d.html; toggleSidebar(); speak("Archivo cargado."); };
            list.appendChild(div);
        });
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    function exportPDF() { 
        speak("Exportando a P D F.");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(document.getElementById(activeP).innerText, 10, 10);
        doc.save("Myzion_Export.pdf");
    }

    function exportWord() {
        speak("Exportando a Word.");
        const blob = new Blob(['\ufeff' + document.getElementById('master-canvas').innerText], { type: 'application/msword' });
        saveAs(blob, "Myzion_Export.doc");
    }

    function runOCR() { speak("Iniciando escaneo visual O C R."); /* Aquí va la lógica de cámara anterior */ }
</script>
</body>
</html>
