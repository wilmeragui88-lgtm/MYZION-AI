<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYZION OS - AI Futurista</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050a14;
    color:#00ffff;
    overflow:hidden;
    transition:0.5s;
}

.grid{
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:-1;
}

.center{
    position:absolute;
    top:25%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.core{
    width:250px;
    height:250px;
    border-radius:50%;
    border:4px solid #00ffff;
    box-shadow:0 0 50px #00ffff;
    animation:rotate 10s linear infinite;
    transition:0.3s;
}

.listening{
    border-color:lime;
    box-shadow:0 0 80px lime;
}

.speaking{
    border-color:orange;
    box-shadow:0 0 80px orange;
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.panel{
    position:absolute;
    bottom:0;
    width:100%;
    height:50%;
    background:#0a111f;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
}

input{
    width:70%;
    padding:10px;
    background:#111a2e;
    border:none;
    color:#00ffff;
    margin-bottom:5px;
}

button{
    padding:10px;
    background:#00ffff;
    border:none;
    cursor:pointer;
    margin-bottom:5px;
}

.appButton{
    padding:8px;
    margin:5px;
    background:#00ffff;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="center">
    <h1>MYZION OS</h1>
    <div id="core" class="core"></div>
    <br>
    <button onclick="activarEscucha()">Escucha Continua</button>
</div>

<div class="panel" id="panel">
    <p>🚀 MYZION OS inicializado...</p>
    <input type="text" id="input" placeholder="Escribe o di: MYZION ...">
    <button onclick="enviarManual()">Enviar</button>
    <div>
        <span class="appButton" onclick="ejecutarComando('abrir_web','https://www.google.com')">Google</span>
        <span class="appButton" onclick="ejecutarComando('modo_oscuro','')">Modo Oscuro</span>
        <span class="appButton" onclick="ejecutarComando('modo_claro','')">Modo Claro</span>
        <span class="appButton" onclick="ejecutarComando('alert','¡Hola desde MYZION OS!')">Notificación</span>
    </div>
    <div>
        <button onclick="modoVoz='normal'">Voz Normal</button>
        <button onclick="modoVoz='profesional'">Voz Profesional</button>
    </div>
</div>

<script>
// ===== CONFIG =====
const WAKE_WORD = "myzión";
const core = document.getElementById("core");
const panel = document.getElementById("panel");
let modoVoz = "normal";

// Historial de conversación
let historial = [
{role:"system", content:`
Eres MYZION OS, un sistema operativo inteligente futurista.
Responde SIEMPRE en JSON.

Conversación:
{ "tipo":"conversacion", "respuesta":"texto" }

Comando:
{ "tipo":"comando", "accion":"nombre_accion",
  "parametro":"valor", "respuesta":"texto" }
`}
];

// ===== VOZ =====
window.speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };

async function hablar(texto){
    core.classList.remove("listening");
    core.classList.add("speaking");

    if(modoVoz === "normal"){
        const speech = new SpeechSynthesisUtterance(texto);
        speech.lang="es-ES";
        speech.rate=0.9;
        speech.pitch=0.8;
        const voces = speechSynthesis.getVoices();
        const vozEspanol = voces.find(v => v.lang.includes("es"));
        if(vozEspanol){ speech.voice = vozEspanol; }
        speech.onend = () => { core.classList.remove("speaking"); };
        speechSynthesis.speak(speech);
    } else if(modoVoz === "profesional"){
        try{
            // Llamada al backend seguro que genere voz profesional
            const res = await fetch("https://TU_BACKEND.com/api/voz_profesional",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({texto})
            });
            const data = await res.json(); // {url: "https://...mp3"}
            const audio = new Audio(data.url);
            audio.onended = () => { core.classList.remove("speaking"); };
            audio.play();
        }catch(err){
            console.log("Error voz profesional:", err);
        }
    }
}

// ===== ENVÍO IA =====
async function enviarIA(texto){
    panel.innerHTML += "<p><b>Tú:</b> "+texto+"</p>";

    try{
        const response = await fetch("https://TU_BACKEND.com/api/ai",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({mensaje:texto, historial})
        });

        const data = await response.json();
        let json = data;

        panel.innerHTML += "<p><b>MYZION:</b> "+json.respuesta+"</p>";
        panel.scrollTop = panel.scrollHeight;

        await hablar(json.respuesta);

        if(json.tipo==="comando"){ ejecutarComando(json.accion,json.parametro); }

        historial.push({role:"user",content:texto});
        historial.push({role:"assistant",content:json.respuesta});
    }catch(err){
        panel.innerHTML += "<p><b>MYZION:</b> Error al conectar con IA.</p>";
    }
}

// ===== COMANDOS =====
function ejecutarComando(accion,parametro){
    if(accion==="abrir_web"){ window.open(parametro); }
    if(accion==="modo_oscuro"){ document.body.style.background="#000000"; }
    if(accion==="modo_claro"){ document.body.style.background="#050a14"; }
    if(accion==="alert"){ alert(parametro); }
}

// ===== ENVÍO MANUAL =====
function enviarManual(){
    const texto = document.getElementById("input").value;
    if(texto) enviarIA(texto);
    document.getElementById("input").value="";
}

// ===== ACTIVACIÓN POR VOZ =====
function activarEscucha(){
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang="es-ES";
    recognition.continuous=true;

    recognition.onresult = (event) => {
        const texto = event.results[event.results.length-1][0].transcript.toLowerCase();
        if(texto.includes(WAKE_WORD) || texto.includes("myz ion")){
            core.classList.add("listening");
            enviarIA(texto);
        }
    };

    recognition.start();
}
</script>

</body>
</html>
