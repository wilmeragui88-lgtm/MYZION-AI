<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | INTELLIGENT DOCS v22.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --blue: #0072ff; --purple: #bc13fe;
            --bg: #02050a; --glass: rgba(10, 25, 41, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            margin: 0; font-family: 'JetBrains Mono', monospace;
            background: var(--bg); color: var(--cyan); height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { padding: 10px; background: #000; border-bottom: 2px solid var(--blue); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .brand { font-family: 'Orbitron'; font-size: 0.7rem; text-transform: uppercase; }

        /* MENÚ DESPLEGABLE DE ARCHIVOS */
        #file-hub {
            position: absolute; top: 50px; right: 10px; width: 250px;
            background: var(--glass); border: 1px solid var(--purple);
            display: none; flex-direction: column; z-index: 2000; border-radius: 5px;
            max-height: 300px; overflow-y: auto;
        }
        .file-item { padding: 10px; font-size: 0.6rem; border-bottom: 1px solid rgba(188, 19, 254, 0.2); cursor: pointer; color: #fff; }
        .file-item:hover { background: var(--purple); }

        .viewport { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 140px; }
        .panel { background: var(--glass); border: 1px solid rgba(0,242,255,0.2); padding: 12px; border-radius: 5px; }

        /* PAPEL TIPO WORD IA */
        #paper {
            background: #fff; color: #000; padding: 30px; min-height: 400px;
            border-radius: 2px; font-family: 'Arial', sans-serif;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative;
        }
        #editable-content { outline: none; font-size: 1rem; line-height: 1.6; white-space: pre-wrap; }
        
        /* ESTILOS DE TABLAS IA */
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 0.8rem; }
        th { background: #f2f2f2; }

        /* BOTONES */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn {
            background: rgba(0,114,255,0.1); border: 1px solid var(--blue);
            color: #fff; padding: 12px; font-size: 0.55rem; font-family: 'Orbitron'; text-transform: uppercase;
        }
        .btn-ai { border-color: var(--green); color: var(--green); font-weight: bold; }

        footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px; border-top: 1px solid var(--blue); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; z-index: 500; }
        #ai-status { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; flex-direction: column; color: var(--green); }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const config = {
            apiKey: "AIzaSyAVuB6irppG-_9VbKSVY93P1dG6ZmC1KCY",
            authDomain: "myzion-os-master.firebaseapp.com",
            projectId: "myzion-os-master",
            appId: "1:262714217017:web:fae14ece4afb7cd16cb3e8"
        };
        const app = initializeApp(config);
        window.db = getDatabase(app);
        window.fb = { ref, push };
    </script>
</head>
<body>

<div id="ai-status">GENERANDO ESTRUCTURA CON IA...</div>

<div id="file-hub">
    <div style="padding:10px; background:var(--purple); font-size:0.7rem; font-weight:bold;">HISTORIAL DE DOCUMENTOS</div>
    <div id="file-list"></div>
</div>

<header>
    <div class="brand">MYZION INTELLIGENT <span style="color:var(--purple)">v22.0</span></div>
    <button class="btn" style="padding:5px 10px;" onclick="toggleFiles()">ARCHIVOS ▾</button>
</header>

<main class="viewport">
    <section class="panel"><div style="height:60px;"><canvas id="chart"></canvas></div></section>

    <section class="panel">
        <div id="paper">
            <div id="editable-content" contenteditable="true">
                Presione el botón "CREAR REPORTE IA" para generar una estructura automática...
            </div>
        </div>
    </section>

    <section class="panel">
        <div class="grid">
            <button class="btn btn-ai" onclick="generateAiReport()">CREAR REPORTE IA</button>
            <button class="btn btn-ai" onclick="generateAiTable()">INSERTAR TABLA IA</button>
            <button class="btn" onclick="openCam()">OMNI-SCAN OCR</button>
            <button class="btn" onclick="saveToHub()">GUARDAR EN HUB</button>
        </div>
    </section>
</main>

<footer>
    <button class="btn" style="background:var(--purple); grid-column: span 2;" onclick="toggleVoice()">IA DE VOZ & COMANDOS</button>
    <button class="btn" onclick="savePDF()">DESCARGAR PDF</button>
    <button class="btn" onclick="saveFullCapture()">CAPTURAR IMAGEN</button>
</footer>

<script>
    let savedFiles = [];

    // --- FUNCIONES DE IA (SIMULACIÓN DE ESTRUCTURA) ---
    function generateAiReport() {
        document.getElementById('ai-status').style.display = 'flex';
        setTimeout(() => {
            const report = `<h1>REPORTE DE ACTIVIDAD ACADÉMICA</h1>
<p><b>Fecha:</b> ${new Date().toLocaleDateString()}</p>
<p><b>Resumen:</b> Mediante el uso de inteligencia artificial, se ha procesado la información recolectada. Los datos indican un avance del 85% en los objetivos planteados.</p>
<h3>ANÁLISIS DE RESULTADOS</h3>
<ul><li>Optimización de recursos completada.</li><li>Digitalización de registros maestros activa.</li></ul>`;
            document.getElementById('editable-content').innerHTML = report;
            document.getElementById('ai-status').style.display = 'none';
        }, 1500);
    }

    function generateAiTable() {
        const table = `<table>
<tr><th>ESTUDIANTE</th><th>REGISTRO</th><th>ESTADO</th></tr>
<tr><td>Usuario 01</td><td>OCR v21</td><td>Completado</td></tr>
<tr><td>Usuario 02</td><td>Voz v22</td><td>En proceso</td></tr>
</table>`;
        document.getElementById('editable-content').innerHTML += table;
    }

    // --- MENÚ DESPLEGABLE Y GUARDADO ---
    function toggleFiles() {
        const hub = document.getElementById('file-hub');
        hub.style.display = hub.style.display === 'flex' ? 'none' : 'flex';
    }

    function saveToHub() {
        const content = document.getElementById('editable-content').innerHTML;
        const fileName = "DOC_" + new Date().toLocaleTimeString();
        savedFiles.push({ name: fileName, data: content });
        updateFileList();
        alert("Documento guardado en el Hub Local");
    }

    function updateFileList() {
        const list = document.getElementById('file-list');
        list.innerHTML = "";
        savedFiles.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerText = file.name;
            item.onclick = () => {
                document.getElementById('editable-content').innerHTML = file.data;
                toggleFiles();
            };
            list.appendChild(item);
        });
    }

    // --- MANTENER FUNCIONES ANTERIORES ---
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function toggleVoice() {
        recognition.start();
        alert("Escuchando comandos (Abrir cámara, Limpiar, Guardar...)");
    }

    recognition.onresult = (e) => {
        const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
        if(cmd.includes("abrir cámara")) openCam();
        if(cmd.includes("guardar")) saveToHub();
        document.getElementById('editable-content').innerText += " " + cmd;
    };

    function savePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.fromHTML(document.getElementById('editable-content'), 15, 15);
        doc.save("Zion_Intelligent.pdf");
    }

    // Gráfico de rendimiento
    const ctx = document.getElementById('chart').getContext('2d');
    new Chart(ctx, { type: 'line', data: { labels: ['A','B','C'], datasets: [{ data: [10,40,20], borderColor: '#00f2ff' }] }, options: { maintainAspectRatio: false } });

    async function openCam() { alert("Abriendo Omni-Scan..."); } // Referencia a función v21
</script>
</body>
</html>
