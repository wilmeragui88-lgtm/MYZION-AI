<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | OMNI-ADAPTIVE v48.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a; --glass: rgba(15, 17, 21, 0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { margin: 0; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* PANTALLA DE CARGA NEURONAL */
        #boot-layer { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .pulse-btn { background: none; border: 2px solid var(--green); color: var(--green); padding: 25px 50px; font-family: 'Orbitron'; font-size: 1.2rem; cursor: pointer; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 255, 157, 0.2); }

        header { padding: 12px 20px; background: #000; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        
        /* TOOLBAR HÍBRIDA WORD/EXCEL */
        .toolbar { background: #1a1d23; padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #333; overflow-x: auto; position: sticky; top: 0; z-index: 500; align-items: center; }
        .t-btn { background: #222; border: 1px solid #444; color: #fff; padding: 6px 10px; font-size: 0.65rem; cursor: pointer; border-radius: 3px; font-family: 'Orbitron'; }
        select { background: #222; color: #fff; border: 1px solid #444; font-size: 0.7rem; border-radius: 3px; padding: 3px; }

        /* ENTORNO PROFESIONAL */
        .workspace { flex: 1; overflow-y: auto; padding: 40px 15px; display: flex; flex-direction: column; align-items: center; gap: 50px; background: #111; }
        .page-sheet { background: #fff; color: #000; width: 100%; max-width: 900px; min-height: 1100px; padding: 60px; border-radius: 2px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; font-family: 'Arial', sans-serif; line-height: 1.6; }

        /* TABLAS ADAPTATIVAS (EXCEL STYLE) */
        .table-container { width: 100%; margin: 25px 0; padding: 5px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: auto; background: #fff; border: 2px solid #333; }
        th, td { border: 1px solid #ccc; padding: 10px; min-width: 80px; height: 35px; overflow: hidden; transition: all 0.2s ease; position: relative; }
        td:focus { background: #e8faff; border: 2px solid var(--cyan) !important; outline: none; }
        .active-cell { background: rgba(0, 242, 255, 0.1) !important; border: 2px solid var(--cyan) !important; }

        /* CONTROLES */
        .control-panel { background: #000; border-top: 2px solid var(--cyan); padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-core { background: #111; border: 1px solid #333; color: #fff; padding: 12px 5px; font-family: 'Orbitron'; font-size: 0.55rem; cursor: pointer; border-radius: 4px; }
        #voice-hud { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 8px 30px; border-radius: 30px; font-size: 0.7rem; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; box-shadow: 0 0 15px var(--green); }
        
        #ocr-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }
        video { width: 100%; height: 80%; object-fit: cover; }
    </style>
</head>
<body>

<div id="boot-layer">
    <h1 style="color:var(--cyan); font-family:'Orbitron'; font-size: 2.5rem;">MYZION v48</h1>
    <p style="color:#666; margin-bottom:30px;">SISTEMA OPERATIVO HÍBRIDO WORD-EXCEL</p>
    <button class="pulse-btn" onclick="initializeMyzion()">CONECTAR NEUROLINK</button>
</div>

<div id="voice-hud">SISTEMA ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.85rem; color:var(--cyan)">MYZION <span style="color:var(--purple)">SYNCH</span></div>
    <button class="t-btn" onclick="toggleHub()">REPOSITORIO ☰</button>
</header>

<div class="toolbar">
    <select onchange="document.execCommand('fontName', false, this.value)">
        <option value="Arial">Arial</option>
        <option value="Verdana">Verdana</option>
        <option value="JetBrains Mono">Terminal</option>
    </select>
    <select onchange="document.execCommand('fontSize', false, this.value)">
        <option value="3">Normal</option>
        <option value="5">Subtítulo</option>
        <option value="7">Título</option>
    </select>
    <button class="t-btn" onclick="document.execCommand('bold')">B</button>
    <button class="t-btn" onclick="document.execCommand('underline')">U</button>
    <input type="color" onchange="document.execCommand('foreColor', false, this.value)">
    <button class="t-btn" style="color:var(--green)" onclick="readAloud()">LECTURA IA</button>
</div>

<main class="workspace" id="main-canvas">
    <div class="page-sheet" contenteditable="true" id="p1" onfocus="activePage='p1'">
        <h1 style="text-align:center; font-family:'Orbitron';">SISTEMA UNIFICADO</h1>
        <p>Toca el área de trabajo o una celda para dictar...</p>
    </div>
</main>

<div class="control-panel">
    <button class="btn-core" style="color:var(--green)" onclick="createNewPage()">+ PÁGINA</button>
    <button class="btn-core" style="color:var(--green)" onclick="insertHybridTable()">+ TABLA ADAPT</button>
    <button class="btn-core" onclick="initOCR()">SCAN OCR</button>
    <button class="btn-core" style="color:var(--purple)" onclick="shareDocument()">COMPARTIR</button>
    <button id="mic-trigger" class="btn-core" style="grid-column: span 4; border-color: var(--green); padding:15px; font-size: 0.8rem; background: rgba(0,255,157,0.05);" onclick="toggleDictation()">ACTIVAR VOZ MAESTRA</button>
</div>

<div id="ocr-overlay">
    <video id="camera-stream" autoplay playsinline></video>
    <button class="btn-core" onclick="closeOCR()" style="position:absolute; bottom:20px; left:20px;">VOLVER</button>
    <button class="btn-core" onclick="captureText()" style="position:absolute; bottom:20px; right:20px; background:var(--purple);">CAPTURAR</button>
</div>

<script>
    let activePage = 'p1';
    let isListening = false;
    let selectedCell = null;
    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function hablar(t) {
        synth.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES'; m.rate = 1.0;
        synth.speak(m);
    }

    // --- INSTRUCCIONES DE BIENVENIDA ---
    function initializeMyzion() {
        document.getElementById('boot-layer').style.display = 'none';
        hablar("Myzion v48 activo. He integrado el motor de Excel en su documento Word. Primero, toque el lugar o la celda donde desee que escriba. Luego, active la Voz Maestra. Las tablas ahora se adaptarán solas al tamaño de lo que yo diga. El sistema está listo para procesar sus datos.");
    }

    // --- SISTEMA DE DICTADO IA ---
    function toggleDictation() {
        const btn = document.getElementById('mic-trigger');
        const hud = document.getElementById('voice-hud');
        if(!isListening) {
            recognition.start(); isListening = true;
            btn.style.background = "#00ff9d"; btn.style.color = "#000";
            hud.style.display = 'block'; hablar("Le escucho.");
        } else {
            recognition.stop(); isListening = false;
            btn.style.background = "#111"; btn.style.color = "#fff";
            hud.style.display = 'none'; hablar("Escucha finalizada.");
        }
    }

    recognition.onresult = (e) => {
        const t = e.results[e.results.length - 1][0].transcript;
        if(selectedCell) {
            selectedCell.innerText = t;
            // Adaptación automática post-dictado
            selectedCell.style.width = "auto";
        } else {
            document.execCommand('insertText', false, " " + t);
        }
    };

    // --- TABLAS HÍBRIDAS ADAPTATIVAS (TIPO EXCEL) ---
    function insertHybridTable() {
        const tid = "tab_" + Date.now();
        const html = `
            <div class="table-container" id="${tid}_container" contenteditable="false">
                <table id="${tid}">
                    <tr style="background:#f2f2f2; font-weight:bold;">
                        <td contenteditable="true">ID</td><td contenteditable="true">Descripción</td><td contenteditable="true">Valor</td>
                    </tr>
                    <tr>
                        <td contenteditable="true">...</td><td contenteditable="true">...</td><td contenteditable="true">...</td>
                    </tr>
                </table>
                <div style="margin-top:10px; display:flex; gap:10px;">
                    <button class="t-btn" onclick="addTableRow('${tid}')">+ FILA</button>
                    <button class="t-btn" onclick="addTableCol('${tid}')">+ COLUMNA</button>
                    <button class="t-btn" style="color:red" onclick="document.getElementById('${tid}_container').remove()">BORRAR</button>
                </div>
            </div><br>`;
        document.getElementById(activePage).innerHTML += html;
        hablar("Módulo de tabla adaptativa insertado.");
    }

    function addTableRow(id) {
        const t = document.getElementById(id);
        const r = t.insertRow(-1);
        for(let i=0; i<t.rows[0].cells.length; i++) r.insertCell(i).contentEditable = "true";
    }

    function addTableCol(id) {
        const t = document.getElementById(id);
        for(let i=0; i<t.rows.length; i++) t.rows[i].insertCell(-1).contentEditable = "true";
    }

    // --- MANEJO DE SELECCIÓN POR TOQUE ---
    document.addEventListener('click', (e) => {
        if(e.target.tagName === 'TD') {
            if(selectedCell) selectedCell.classList.remove('active-cell');
            selectedCell = e.target;
            selectedCell.classList.add('active-cell');
            hablar("Celda lista.");
        } else {
            if(selectedCell) selectedCell.classList.remove('active-cell');
            selectedCell = null;
        }
    });

    // --- FUNCIONES MANTENIDAS ---
    function createNewPage() {
        const id = 'p' + (document.querySelectorAll('.page-sheet').length + 1);
        const p = document.createElement('div');
        p.className = 'page-sheet'; p.contentEditable = "true"; p.id = id;
        p.onfocus = () => activePage = id;
        p.innerHTML = `<h3 style="color:#aaa;">PÁGINA ${id.substring(1)}</h3><hr style="border-top:1px dashed #eee;">`;
        document.getElementById('main-canvas').appendChild(p);
        p.focus();
    }

    function readAloud() { hablar(document.getElementById(activePage).innerText); }
    
    async function initOCR() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('camera-stream').srcObject = s;
        document.getElementById('ocr-overlay').style.display = 'block';
    }

    function closeOCR() {
        document.getElementById('camera-stream').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-overlay').style.display = 'none';
    }

    async function captureText() {
        hablar("Analizando...");
        const v = document.getElementById('camera-stream');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(activePage).innerText += "\n" + res.data.text;
        closeOCR();
    }

    async function shareDocument() {
        const text = document.getElementById(activePage).innerText;
        if(navigator.share) await navigator.share({ title: 'Myzion Master Doc', text: text });
    }
</script>
</body>
</html>
