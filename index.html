<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | ORACLE v36.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'JetBrains Mono', monospace; 
            background: var(--bg); color: #fff; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            padding: 12px 20px; background: #000; border-bottom: 2px solid var(--green);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }

        #hub-sidebar {
            position: fixed; top: 0; right: -320px; width: 320px; height: 100%;
            background: rgba(10,12,16,0.98); border-left: 2px solid var(--green);
            z-index: 2000; transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1);
            padding: 25px; box-shadow: -15px 0 40px rgba(0,0,0,0.9);
        }
        #hub-sidebar.active { right: 0; }

        .workspace { 
            flex: 1; overflow-y: auto; padding: 40px 15px; 
            display: flex; flex-direction: column; align-items: center; gap: 40px;
            background: #0f1115; scroll-behavior: smooth;
        }

        .page-sheet {
            background: #fff; color: #000; width: 98%; max-width: 850px;
            min-height: 1100px; padding: 60px; border-radius: 4px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6); position: relative;
            outline: none; font-family: 'Arial', sans-serif;
        }

        .table-wrapper { width: 100%; margin: 20px 0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; border: 2px solid #333; }
        th, td { border: 1px solid #ccc; padding: 12px; word-wrap: break-word; }
        .cell-focus { background: rgba(0, 255, 157, 0.1) !important; border: 2px solid var(--green) !important; }

        .control-panel { 
            background: #000; border-top: 2px solid var(--cyan);
            padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .btn-ui {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 12px 5px; font-family: 'Orbitron'; font-size: 0.5rem; cursor: pointer;
        }
        .btn-active { background: var(--green) !important; color: #000 !important; font-weight: bold; }

        #voice-hud { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 5px 25px; border-radius: 30px; font-size: 0.6rem; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; }
    </style>
</head>
<body onload="oracleProtocol()">

<div id="voice-hud">IA ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.85rem; color:var(--cyan)">MYZION <span style="color:var(--green)">ORACLE</span> v36</div>
    <button class="btn-ui" style="border-color:var(--cyan)" onclick="toggleHub()">HUB ☰</button>
</header>

<div id="hub-sidebar">
    <h3 style="color:var(--green); font-family:'Orbitron'; font-size:0.7rem;">ARCHIVOS GUARDADOS</h3>
    <div id="file-list" style="flex:1; overflow-y:auto; margin:20px 0;"></div>
    <button class="btn-ui" style="width:100%" onclick="toggleHub()">CERRAR</button>
</div>

<main class="workspace" id="main-view">
    <div class="page-sheet" contenteditable="true" id="p1" onfocus="curPage='p1'">
        <div style="font-size:0.6rem; color:#aaa; font-family:'Orbitron';">PÁGINA 1</div>
        <h1 style="text-align:center; font-family:'Orbitron'; margin-top:50px;">SISTEMA OPERATIVO MYZION</h1>
        <p style="text-align:center; color:#666;">Esperando instrucciones del usuario...</p>
    </div>
</main>

<div class="control-panel">
    <button class="btn-ui" style="color:var(--green)" onclick="addPage()">+ PÁGINA</button>
    <button class="btn-ui" style="color:var(--green)" onclick="addTable()">+ TABLA</button>
    <button class="btn-ui" onclick="startScanner()">SCAN OCR</button>
    <button id="v-btn" class="btn-ui" style="grid-column: span 3; border-color: var(--green); font-size:0.7rem;" onclick="toggleVoice()">ACTIVAR COMANDOS DE VOZ</button>
</div>

<div style="background:#000; padding:10px; display:flex; gap:10px; border-top:1px solid #222;">
    <button class="btn-ui" style="flex:1" onclick="saveFile()">GUARDAR</button>
    <button class="btn-ui" style="flex:1" onclick="exportPDF()">PDF</button>
    <button class="btn-ui" style="flex:1" onclick="exportWord()">WORD</button>
</div>

<div id="ocr-screen" style="display:none; position:fixed; inset:0; background:#000; z-index:5000;">
    <video id="webcam" style="width:100%; height:80%; object-fit:cover;" autoplay playsinline></video>
    <div style="height:20%; display:flex; justify-content:space-around; align-items:center;">
        <button class="btn-ui" onclick="stopScanner()">CANCELAR</button>
        <button class="btn-ui" style="background:var(--purple)" onclick="captureOCR()">CAPTURAR</button>
    </div>
</div>

<script>
    let pageTotal = 1;
    let curPage = 'p1';
    let isListening = false;
    let focusCell = null;
    let archives = [];

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function speak(t, callback) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'es-ES'; u.rate = 1.0;
        u.onend = () => { if(callback) callback(); };
        window.speechSynthesis.speak(u);
    }

    // --- PROTOCOLO ORACLE (BIENVENIDA Y GUÍA) ---
    function oracleProtocol() {
        const introText = "Bienvenido a Myzion Oracle versión 36. Soy su asistente de inteligencia artificial. " +
        "He configurado su entorno de trabajo con las siguientes funciones maestras: " +
        "Primero: Un sistema de páginas infinitas para documentos extensos. " +
        "Segundo: Tablas elásticas que se adaptan automáticamente a su contenido. " +
        "Tercero: Un escáner O C R para digitalizar textos físicos. " +
        "Y cuarto: Un repositorio lateral para gestionar todos sus archivos. " +
        "Usted puede tocar cualquier celda de una tabla para dictarme directamente. " +
        "Dígame, ¿por dónde desea comenzar a trabajar hoy?";

        setTimeout(() => {
            speak(introText, () => {
                // Después de la guía, activa el hud visual brevemente
                const hud = document.getElementById('voice-hud');
                hud.innerText = "IA: ESPERANDO ORDEN...";
                hud.style.display = 'block';
                setTimeout(() => hud.style.display = 'none', 3000);
            });
        }, 1000);
    }

    // --- VOZ ---
    function toggleVoice() {
        const btn = document.getElementById('v-btn');
        const hud = document.getElementById('voice-hud');
        if(!isListening) {
            recognition.start();
            isListening = true;
            btn.classList.add('btn-active');
            hud.style.display = 'block';
            hud.innerText = "IA ESCUCHANDO...";
            speak("Sistemas de escucha activos.");
        } else {
            recognition.stop();
            isListening = false;
            btn.classList.remove('btn-active');
            hud.style.display = 'none';
        }
    }

    recognition.onresult = (e) => {
        const msg = e.results[e.results.length - 1][0].transcript.toLowerCase();
        if(msg.includes("nueva página")) addPage();
        else if(msg.includes("nueva tabla")) addTable();
        else if(msg.includes("guardar")) saveFile();
        else {
            if(focusCell) {
                focusCell.innerText = msg;
                moveCell();
            } else {
                document.getElementById(curPage).innerHTML += " " + msg;
            }
        }
    };

    function moveCell() {
        let n = focusCell.nextElementSibling;
        if(!n) {
            let nr = focusCell.parentElement.nextElementSibling;
            if(nr) n = nr.cells[0];
        }
        if(n) {
            focusCell.classList.remove('cell-focus');
            focusCell = n;
            focusCell.classList.add('cell-focus');
        }
    }

    // --- PÁGINAS Y TABLAS ---
    function addPage() {
        pageTotal++;
        const p = document.createElement('div');
        p.className = 'page-sheet';
        p.contentEditable = "true";
        p.id = 'p' + pageTotal;
        p.onfocus = () => curPage = p.id;
        p.innerHTML = `<div style="font-size:0.6rem; color:#aaa; font-family:'Orbitron';">PÁGINA ${pageTotal}</div>`;
        document.getElementById('main-view').appendChild(p);
        p.focus();
        speak("Página " + pageTotal + " añadida.");
    }

    function addTable() {
        const id = "t" + Date.now();
        const html = `
            <div id="${id}_w" class="table-wrapper">
                <table id="${id}">
                    <thead><tr><th contenteditable="true">CABECERA 1</th><th contenteditable="true">CABECERA 2</th></tr></thead>
                    <tbody><tr><td contenteditable="true">...</td><td contenteditable="true">...</td></tr></tbody>
                </table>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button class="btn-ui" onclick="addRow('${id}')">+ FILA</button>
                    <button class="btn-ui" onclick="addCol('${id}')">+ COL</button>
                    <button class="btn-ui" style="color:red" onclick="document.getElementById('${id}_w').remove()">ELIMINAR</button>
                </div>
            </div><br>`;
        document.getElementById(curPage).innerHTML += html;
        speak("Tabla elástica insertada.");
    }

    function addRow(id) {
        const t = document.getElementById(id);
        const r = t.insertRow(-1);
        for(let i=0; i<t.rows[0].cells.length; i++) r.insertCell(i).contentEditable = "true";
    }

    function addCol(id) {
        const t = document.getElementById(id);
        for(let i=0; i<t.rows.length; i++) {
            let c = t.rows[i].insertCell(-1);
            c.contentEditable = "true";
            if(i===0) c.outerHTML = `<th contenteditable="true">NUEVO</th>`;
        }
    }

    document.addEventListener('click', (e) => {
        if(e.target.tagName === 'TD' || e.target.tagName === 'TH') {
            if(focusCell) focusCell.classList.remove('cell-focus');
            focusCell = e.target;
            focusCell.classList.add('cell-focus');
            speak("Celda activa.");
        }
    });

    // --- OCR & FILES ---
    function toggleHub() { document.getElementById('hub-sidebar').classList.toggle('active'); }
    function saveFile() {
        const content = document.getElementById('main-view').innerHTML;
        const name = "DOC-" + new Date().toLocaleTimeString();
        archives.push({ name, content });
        renderHub();
        speak("Documento guardado.");
    }
    function renderHub() {
        const l = document.getElementById('file-list');
        l.innerHTML = "";
        archives.forEach((d) => {
            const div = document.createElement('div');
            div.style = "padding:10px; border-bottom:1px solid #222; font-size:0.6rem; color:var(--cyan); cursor:pointer;";
            div.innerText = "📄 " + d.name;
            div.onclick = () => { document.getElementById('main-view').innerHTML = d.content; toggleHub(); };
            l.appendChild(div);
        });
    }

    async function startScanner() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('webcam').srcObject = s;
        document.getElementById('ocr-screen').style.display = 'block';
    }
    function stopScanner() {
        document.getElementById('webcam').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-screen').style.display = 'none';
    }
    async function captureOCR() {
        speak("Procesando.");
        const v = document.getElementById('webcam');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(curPage).innerText += "\n" + res.data.text.trim();
        stopScanner();
        speak("Texto integrado.");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const pgs = document.getElementsByClassName('page-sheet');
        for(let i=0; i<pgs.length; i++) {
            if(i>0) doc.addPage();
            doc.text(doc.splitTextToSize(pgs[i].innerText, 180), 10, 20);
        }
        doc.save("Zion_Oracle.pdf");
    }

    function exportWord() {
        const blob = new Blob(['\ufeff' + document.getElementById('main-view').innerText], { type: 'application/msword' });
        saveAs(blob, "Zion_Archive.doc");
    }
</script>
</body>
</html>
