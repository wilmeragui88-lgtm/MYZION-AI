<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYZION AI - Sistema Operativo Total</title>

    <style>
        :root {
            --primary: #00ffff;
            --bg: #050a14;
            --panel-bg: rgba(10, 17, 31, 0.95);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--primary);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background 1s ease;
        }

        /* Fondo de rejilla digital */
        .grid {
            position: fixed;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .center {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Núcleo Central Dinámico */
        .core {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 30px var(--primary), inset 0 0 15px var(--primary);
            animation: rotate 10s linear infinite;
            transition: all 0.5s ease;
            cursor: pointer;
        }

        .listening { border-color: #00ff00 !important; box-shadow: 0 0 50px #00ff00 !important; animation: rotate 2s linear infinite, pulse 0.7s ease-in-out infinite; }
        .speaking { border-color: #ffaa00 !important; box-shadow: 0 0 50px #ffaa00 !important; animation: rotate 4s linear infinite, pulse 1s ease-in-out infinite; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Panel de Control y Memoria */
        .panel {
            height: 50%;
            background: var(--panel-bg);
            border-top: 2px solid var(--primary);
            padding: 15px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .task-list {
            background: rgba(0, 255, 255, 0.08);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px dashed var(--primary);
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0a111f;
            padding: 10px;
            display: flex;
            gap: 8px;
            box-sizing: border-box;
            z-index: 10;
        }

        input {
            flex: 1;
            padding: 12px;
            background: #111a2e;
            border: 1px solid var(--primary);
            color: var(--primary);
            outline: none;
            border-radius: 4px;
        }

        button {
            padding: 10px 15px;
            background: var(--primary);
            border: none;
            color: #050a14;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        button:hover { opacity: 0.8; box-shadow: 0 0 10px var(--primary); }

        .memoria-old { opacity: 0.35; font-size: 0.85em; border-left: 2px solid var(--primary); padding-left: 10px; margin-bottom: 10px; }
        h1 { letter-spacing: 6px; margin: 0 0 10px 0; text-shadow: 0 0 15px var(--primary); font-size: 1.8em; }
        ul { margin: 5px 0; padding-left: 20px; }
    </style>
</head>
<body>

<div class="grid"></div>

<div class="center">
    <h1>MYZION AI</h1>
    <div id="core" class="core" onclick="activarVoz()"></div>
    <br>
    <button onclick="activarVoz()" style="padding: 15px 30px;">🎙️ ACTIVAR MICROFONO</button>
</div>

<div class="panel" id="panel">
    <div id="tasks-container" class="task-list">
        <strong>📌 MEMORIA DE TAREAS:</strong>
        <ul id="listado-tareas"></ul>
    </div>
    
    <div id="chat-log"></div>
    
    <div class="controls">
        <input type="text" id="input" placeholder="Comandos: 'Añadir tarea...', 'Busca en Youtube...', 'Modo guerra'...">
        <button onclick="enviar()">ENVIAR</button>
        <button onclick="limpiarCerebro()" style="background:#ff4444; color:white;">RESET</button>
    </div>
</div>

<script>
    const core = document.getElementById("core");
    const chatLog = document.getElementById("chat-log");
    const inputField = document.getElementById("input");
    const listaTareasUI = document.getElementById("listado-tareas");

    // --- CEREBRO (STORAGE) ---
    function guardarDato(clave, valor) { localStorage.setItem(clave, JSON.stringify(valor)); }
    function obtenerDato(clave) { return JSON.parse(localStorage.getItem(clave)) || []; }

    // --- VOZ ---
    function hablar(texto) {
        window.speechSynthesis.cancel();
        core.classList.add("speaking");
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = "es-ES";
        msg.rate = 1.0;
        msg.pitch = 0.9;
        msg.onend = () => core.classList.remove("speaking");
        window.speechSynthesis.speak(msg);
    }

    // --- FUNCIÓN DE BIENVENIDA COMPLETA ---
    function bienvenidaProactiva() {
        const textoBienvenida = "Sistema MYZION iniciado. Soy tu asistente inteligente avanzado. Mis funciones incluyen: gestión de tareas con memoria persistente, búsquedas en tiempo real en YouTube, Wikipedia y Google, y control de interfaz mediante comandos de voz o texto. También puedo cambiar mi entorno visual según tu preferencia. ¿En qué puedo asistirte hoy?";
        
        chatLog.innerHTML += `<p style="color: #ffaa00; border: 1px solid #ffaa00; padding: 10px; border-radius: 5px;"><b>MYZION:</b> ${textoBienvenida}</p>`;
        hablar(textoBienvenida);
    }

    function cargarSistema() {
        // Cargar historial de chat
        const memoria = obtenerDato("cerebro_myzion");
        memoria.forEach(m => {
            chatLog.innerHTML += `<div class="memoria-old"><b>Tú:</b> ${m.user} | <b>AI:</b> ${m.ai}</div>`;
        });
        
        renderizarTareas();
        scrollFinal();
        
        // Retraso pequeño para asegurar que la voz cargue bien
        setTimeout(bienvenidaProactiva, 1200);
    }

    // --- GESTOR DE TAREAS ---
    function gestionarTarea(texto) {
        let tareas = obtenerDato("mis_tareas");
        if (texto.includes("añadir tarea") || texto.includes("recordar")) {
            let nueva = texto.replace("añadir tarea", "").replace("recordar", "").trim();
            if(nueva) {
                tareas.push(nueva);
                guardarDato("mis_tareas", tareas);
                renderizarTareas();
                return `Tarea registrada en memoria: ${nueva}`;
            }
        }
        if (texto.includes("borrar tareas") || texto.includes("limpiar lista")) {
            guardarDato("mis_tareas", []);
            renderizarTareas();
            return "He vaciado tu lista de pendientes.";
        }
        return null;
    }

    function renderizarTareas() {
        const tareas = obtenerDato("mis_tareas");
        listaTareasUI.innerHTML = tareas.length ? "" : "<li>No hay tareas pendientes.</li>";
        tareas.forEach(t => { listaTareasUI.innerHTML += `<li>${t}</li>`; });
    }

    // --- PROCESADOR DE INTELIGENCIA ---
    function procesarInteligencia(texto) {
        const t = texto.toLowerCase();

        // 1. Tareas
        const msgTarea = gestionarTarea(t);
        if(msgTarea) return msgTarea;

        // 2. Modos de Pantalla
        if (t.includes("modo guerra") || t.includes("rojo")) { document.body.style.background = "#2a0000"; return "Protocolo de combate activo. Interfaz en rojo."; }
        if (t.includes("modo paz") || t.includes("azul")) { document.body.style.background = "#050a14"; return "Estabilidad restaurada."; }
        if (t.includes("modo bosque") || t.includes("verde")) { document.body.style.background = "#001a05"; return "Modo ecológico activado."; }

        // 3. Búsquedas
        if (t.includes("busca en youtube") || t.includes("reproduce")) {
            let q = t.replace("busca en youtube", "").replace("reproduce", "").trim();
            window.open(`https://www.youtube.com/results?search_query=${q}`);
            return "Abriendo YouTube para buscar " + q;
        }
        if (t.includes("qué es") || t.includes("busca en wikipedia")) {
            let q = t.replace("busca en wikipedia", "").replace("qué es", "").trim();
            window.open(`https://es.wikipedia.org/wiki/${q}`);
            return "Consultando Wikipedia.";
        }
        if (t.includes("busca")) {
            let q = t.replace("busca", "").trim();
            window.open(`https://www.google.com/search?q=${q}`);
            return "Buscando en Google.";
        }

        // 4. Utilidades
        if (t.includes("hora")) return "La hora actual es " + new Date().toLocaleTimeString();
        if (t.includes("fecha")) return "Hoy es " + new Date().toLocaleDateString();
        if (t.includes("quien eres")) return "Soy MYZION, tu sistema de inteligencia artificial personal.";

        return "He procesado tu comando y lo he almacenado en mi memoria central.";
    }

    function enviar() {
        const val = inputField.value;
        if (!val) return;

        chatLog.innerHTML += `<p><b>Tú:</b> ${val}</p>`;
        const resp = procesarInteligencia(val);
        chatLog.innerHTML += `<p><b>MYZION:</b> ${resp}</p>`;

        // Guardar en memoria de chat
        let hist = obtenerDato("cerebro_myzion");
        hist.push({ user: val, ai: resp });
        guardarDato("cerebro_myzion", hist);

        hablar(resp);
        inputField.value = "";
        scrollFinal();
    }

    function activarVoz() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Navegador no compatible con reconocimiento de voz.");
        
        const rec = new Speech();
        rec.lang = "es-ES";
        rec.onstart = () => core.classList.add("listening");
        rec.onresult = (e) => {
            inputField.value = e.results[0][0].transcript;
            enviar();
        };
        rec.onend = () => core.classList.remove("listening");
        rec.start();
    }

    function limpiarCerebro() {
        if(confirm("¿Deseas formatear toda la memoria y reiniciar el sistema?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function scrollFinal() {
        const p = document.getElementById("panel");
        p.scrollTop = p.scrollHeight;
    }

    // Eventos de teclado
    inputField.addEventListener("keypress", (e) => { if(e.key === "Enter") enviar(); });
    
    // Iniciar
    window.onload = cargarSistema;
</script>
</body>
</html>
