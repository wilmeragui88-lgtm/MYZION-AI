<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | ARMOR-READ v18.0</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --blue: #0072ff; --purple: #bc13fe;
            --bg: #02050a; --glass: rgba(10, 25, 41, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            margin: 0; font-family: 'JetBrains Mono', monospace;
            background: var(--bg); color: var(--cyan); height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { padding: 10px; background: #000; border-bottom: 2px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 1px; }

        /* CAPA DE ESCANEO PROFESIONAL */
        #cam-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; flex-direction: column; }
        .cam-view { position: relative; width: 100%; height: 75%; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* GUÍA DE ENFOQUE */
        .focus-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; height: 50%; border: 2px solid var(--cyan);
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.7); border-radius: 10px;
        }
        .scan-line {
            position: absolute; width: 100%; height: 3px; background: var(--cyan);
            box-shadow: 0 0 15px var(--cyan); animation: scanLoop 3s infinite linear;
        }
        @keyframes scanLoop { 0% { top: 0; } 100% { top: 100%; } }

        /* PANEL DE DOCUMENTO LIMPIO */
        .viewport { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 120px; }
        #paper { background: #fff; color: #111; padding: 25px; min-height: 350px; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); }
        #editable-content { outline: none; font-size: 1.05rem; line-height: 1.6; font-family: 'serif'; white-space: pre-wrap; text-transform: none; }

        footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px; border-top: 1px solid var(--blue); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: #081a2d; border: 1px solid var(--blue); color: #fff; padding: 15px; font-family: 'Orbitron'; font-size: 0.6rem; text-transform: uppercase; }
        .btn-main { background: var(--purple); border: none; font-weight: bold; }
        
        #status-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 25px; border: 2px solid var(--green); color: var(--green); z-index: 10000; display: none; text-align: center; font-size: 0.8rem; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const config = {
            apiKey: "AIzaSyAVuB6irppG-_9VbKSVY93P1dG6ZmC1KCY",
            authDomain: "myzion-os-master.firebaseapp.com",
            projectId: "myzion-os-master",
            storageBucket: "myzion-os-master.firebasestorage.app",
            messagingSenderId: "262714217017",
            appId: "1:262714217017:web:fae14ece4afb7cd16cb3e8"
        };
        const app = initializeApp(config);
        window.db = getDatabase(app);
        window.fb = { ref, push };
    </script>
</head>
<body>

<div id="status-box">RECONSTRUYENDO DOCUMENTO...<br>LIMPIANDO CARACTERES INVÁLIDOS</div>

<div id="cam-overlay">
    <div class="cam-view">
        <video id="video" autoplay playsinline></video>
        <div class="focus-guide"><div class="scan-line"></div></div>
    </div>
    <div style="height: 100px; display: flex; justify-content: space-around; align-items: center; background: #000;">
        <button class="btn" onclick="closeCam()">CERRAR</button>
        <button onclick="smartCapture()" style="width:75px; height:75px; border-radius:50%; background:var(--green); border:4px solid #fff;"></button>
        <div style="width:60px"></div>
    </div>
</div>

<main class="viewport">
    <header>
        <div class="brand">MYZION ARMOR-READ <span style="color:var(--purple)">v18.0</span></div>
        <div style="font-size: 0.5rem; color: var(--green);">MÓDULO ANTI-RUIDO ACTIVO</div>
    </header>

    <div id="paper">
        <div style="border-bottom: 1px solid #ccc; margin-bottom: 15px; font-size: 0.7rem; color: #666;">
            MAESTRO: REGISTRO MYZION | FECHA: <span id="date-el"></span>
        </div>
        <div id="editable-content" contenteditable="true">Esperando captura de alta precisión...</div>
    </div>

    <button class="btn btn-main" onclick="openCam()">ESCANEAR CON LIMPIEZA IA</button>
</main>

<footer>
    <button class="btn" onclick="savePDF()">GUARDAR PDF</button>
    <button class="btn" onclick="saveIMG()">GUARDAR IMAGEN</button>
    <button class="btn" onclick="saveCloud()" style="grid-column: span 2;">SUBIR A FIREBASE</button>
</footer>

<script>
    document.getElementById('date-el').innerText = new Date().toLocaleDateString();

    async function openCam() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
        });
        document.getElementById('video').srcObject = stream;
        document.getElementById('cam-overlay').style.display = 'flex';
    }

    function closeCam() {
        const v = document.getElementById('video');
        if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('cam-overlay').style.display = 'none';
    }

    async function smartCapture() {
        const status = document.getElementById('status-box');
        status.style.display = 'block';
        
        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        
        // --- FILTRO DE LIMPIEZA PROFUNDA ---
        ctx.filter = 'grayscale(1) contrast(3) brightness(0.7) blur(0.5px)';
        ctx.drawImage(video, 0, 0);
        
        try {
            const result = await Tesseract.recognize(canvas.toDataURL('image/png'), 'spa', {
                workerOptions: { 
                    // BLOQUEAMOS NÚMEROS EXTRAÑOS Y SÍMBOLOS QUE ENSUCIAN EL TEXTO
                    tessedit_char_whitelist: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZáéíóúÁÉÍÓÚñÑ.,:;()/- ' 
                }
            });

            const target = document.getElementById('editable-content');
            if(target.innerText.includes("Esperando")) target.innerText = "";
            
            // ELIMINACIÓN DE CARACTERES SOLITARIOS (BASURA)
            const cleanedText = result.data.text.split('\n')
                .map(line => line.length < 3 && !line.includes('.') ? '' : line)
                .join('\n');

            target.innerText += "\n" + cleanedText.trim();
            if(window.navigator.vibrate) window.navigator.vibrate(200);
            
        } catch(e) { alert("Error de procesamiento"); }
        finally { status.style.display = 'none'; closeCam(); }
    }

    function savePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const txt = document.getElementById('editable-content').innerText;
        doc.setFontSize(11);
        doc.text(doc.splitTextToSize(txt, 180), 15, 20);
        doc.save("Registro_Limpio.pdf");
    }

    async function saveIMG() {
        const canvas = await html2canvas(document.getElementById('paper'));
        const link = document.createElement('a');
        link.download = 'Captura_Zion.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    function saveCloud() {
        const txt = document.getElementById('editable-content').innerText;
        window.fb.push(window.fb.ref(window.db, 'registros/'), {
            detalle: txt, fecha: new Date().toLocaleString()
        });
        alert("Sincronizado correctamente.");
    }
</script>
</body>
</html>
