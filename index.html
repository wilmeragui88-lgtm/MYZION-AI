<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYZION AI - Advanced Neural System</title>
    <style>
        :root { 
            --primary: #00ffff; 
            --bg: #02050a; 
            --panel: rgba(10, 17, 31, 0.95);
            --accent: #ff00ff;
        }
        
        body { 
            margin: 0; 
            font-family: 'Orbitron', 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--primary); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            transition: all 0.5s ease;
        }
        
        /* Fondo de Rejilla Animada */
        .grid { 
            position: fixed; 
            width: 200%; 
            height: 200%; 
            background-image: linear-gradient(var(--primary) 1px, transparent 1px), linear-gradient(90deg, var(--primary) 1px, transparent 1px); 
            background-size: 50px 50px; 
            opacity: 0.1; 
            transform: perspective(500px) rotateX(60deg); 
            z-index: -1; 
            animation: moveGrid 10s linear infinite; 
        }
        @keyframes moveGrid { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

        /* Cabecera */
        .header { 
            padding: 15px; 
            text-align: center; 
            background: rgba(0,0,0,0.8); 
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
            z-index: 10;
        }
        h1 { margin: 0; letter-spacing: 10px; font-size: 1.4rem; text-shadow: 0 0 10px var(--primary); }

        /* Panel de Tareas (Cerebro Secundario) */
        .task-panel { 
            background: rgba(0, 255, 255, 0.05); 
            border: 1px dashed var(--primary); 
            margin: 10px; 
            padding: 10px; 
            border-radius: 8px; 
            font-size: 0.85rem;
            max-height: 100px;
            overflow-y: auto;
        }

        /* Área de Chat */
        .chat-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scrollbar-width: thin;
        }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 15px; font-size: 0.95rem; line-height: 1.5; position: relative; animation: fadeIn 0.3s ease; }
        .user-msg { align-self: flex-end; background: rgba(0, 255, 255, 0.1); border: 1px solid var(--primary); color: #fff; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); border-bottom-left-radius: 2px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Núcleo Reactivo */
        .core-box { display: flex; justify-content: center; align-items: center; padding: 15px; }
        .core { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            border: 4px solid var(--primary); 
            box-shadow: 0 0 20px var(--primary), inset 0 0 10px var(--primary); 
            transition: 0.4s; 
            cursor: pointer;
        }
        .listening { border-color: #00ff00; box-shadow: 0 0 40px #00ff00; transform: scale(1.2); }
        .thinking { border-color: var(--accent); animation: pulse 0.6s infinite alternate; box-shadow: 0 0 40px var(--accent); }
        @keyframes pulse { from { opacity: 0.5; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }

        /* Controles Inferiores */
        .controls { 
            background: #0a111f; 
            padding: 15px; 
            display: flex; 
            gap: 10px; 
            border-top: 2px solid var(--primary); 
            align-items: center;
        }
        input { 
            flex: 1; 
            background: #111a2e; 
            border: 1px solid var(--primary); 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            outline: none; 
            font-size: 1rem;
        }
        button { 
            background: var(--primary); 
            color: #000; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-mic { font-size: 1.5rem; background: transparent; border: 1px solid var(--primary); color: var(--primary); }
    </style>
</head>
<body>

<div class="grid"></div>

<div class="header">
    <h1>MYZION AI SYSTEM</h1>
</div>

<div class="task-panel" id="task-container">
    <strong>📌 OBJETIVOS PRIORITARIOS:</strong>
    <ul id="task-list" style="margin: 5px 0; padding-left: 20px;"></ul>
</div>

<div id="chat" class="chat-area"></div>

<div class="core-box">
    <div id="core" class="core" onclick="activarVoz()"></div>
</div>

<div class="controls">
    <button class="btn-mic" onclick="activarVoz()">🎙️</button>
    <input type="text" id="userInput" placeholder="Escribe tu comando o consulta...">
    <button onclick="handleSend()">EJECUTAR</button>
    <button onclick="resetSystem()" style="background: #ff4444; color: white;">RESET</button>
</div>

<script>
    // --- INTEGRACIÓN DE IDENTIDAD Y CEREBRO ---
    const API_KEY = 'AIzaSyBf_shZMc7pa6q9BhX9i2njKW1G_O9Iegg';
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const core = document.getElementById('core');
    const taskListUI = document.getElementById('task-list');

    let chatHistory = []; // Memoria de la sesión actual

    // --- SISTEMA DE AUDIO ---
    function hablar(texto) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = 'es-ES';
        msg.rate = 1.0;
        msg.pitch = 0.9;
        msg.onend = () => core.classList.remove('thinking');
        window.speechSynthesis.speak(msg);
    }

    function activarVoz() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Navegador no soporta reconocimiento de voz.");
        const rec = new Speech();
        rec.lang = 'es-ES';
        rec.onstart = () => core.classList.add('listening');
        rec.onend = () => core.classList.remove('listening');
        rec.onresult = (e) => {
            input.value = e.results[0][0].transcript;
            handleSend();
        };
        rec.start();
    }

    // --- GESTIÓN DE MEMORIA LOCAL (TAREAS) ---
    function renderTasks() {
        const tasks = JSON.parse(localStorage.getItem('myzion_tasks')) || [];
        taskListUI.innerHTML = tasks.length ? "" : "<li>No hay tareas en el búfer.</li>";
        tasks.forEach((t, i) => {
            taskListUI.innerHTML += `<li>${t}</li>`;
        });
    }

    function saveTask(texto) {
        let tasks = JSON.parse(localStorage.getItem('myzion_tasks')) || [];
        tasks.push(texto);
        localStorage.setItem('myzion_tasks', JSON.stringify(tasks));
        renderTasks();
    }

    // --- EJECUCIÓN DE APLICACIONES ---
    function abrirApp(url) {
        const win = window.open(url, '_blank');
        if (!win) alert("Acceso bloqueado. Por favor, permite las ventanas emergentes.");
    }

    // --- PROCESAMIENTO CENTRAL ---
    function addMsg(role, text) {
        const d = document.createElement('div');
        d.className = `msg ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
        d.innerText = text;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    async function handleSend() {
        const rawText = input.value.trim();
        if(!rawText) return;

        addMsg('user', rawText);
        input.value = '';
        core.classList.add('thinking');

        const lowText = rawText.toLowerCase();

        // 1. FILTRO DE COMANDOS LOCALES (Inmediatos)
        if (lowText.includes("añadir tarea") || lowText.includes("recordar")) {
            let task = rawText.replace(/añadir tarea|recordar/gi, "").trim();
            saveTask(task);
            const r = "Entendido. He registrado la tarea en mi memoria local.";
            addMsg('ai', r); hablar(r);
            return;
        }

        if (lowText.includes("youtube") || lowText.includes("reproduce")) {
            let query = lowText.replace("busca en youtube", "").replace("reproduce", "").trim();
            abrirApp(`https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`);
            const r = "Abriendo YouTube para ejecutar: " + query;
            addMsg('ai', r); hablar(r);
            return;
        }

        if (lowText.includes("modo guerra")) { 
            document.body.style.filter = "hue-rotate(150deg) brightness(0.8)"; 
            addMsg('ai', "Protocolo de alerta activado."); 
            return; 
        }

        // 2. CONEXIÓN A INTELIGENCIA AVANZADA (GEMINI)
        chatHistory.push({ role: "user", parts: [{ text: rawText }] });

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: chatHistory })
            });

            const data = await res.json();
            const aiResponse = data.candidates[0].content.parts[0].text;

            addMsg('ai', aiResponse);
            hablar(aiResponse);
            chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });

        } catch (error) {
            console.error(error);
            addMsg('ai', "Error crítico de enlace neuronal. Revisa tu conexión a la red.");
        } finally {
            core.classList.remove('thinking');
        }
    }

    function resetSystem() {
        if(confirm("¿Deseas formatear la memoria de MYZION?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // --- INICIALIZACIÓN ---
    window.onload = () => {
        renderTasks();
        const welcome = "Sistema MYZION AI en línea. Enlace con Gemini 1.5 Flash establecido. Todas las funciones de búsqueda, memoria y control de tareas están operativas. ¿Cuál es tu primera instrucción?";
        addMsg('ai', welcome);
        hablar(welcome);
    };

    // Soporte para tecla Enter
    input.addEventListener("keypress", (e) => { if(e.key === "Enter") handleSend(); });
</script>
</body>
</html>
