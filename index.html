<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | PRECISION v31.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #010409;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'JetBrains Mono', monospace; 
            background: var(--bg); color: #fff; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { 
            padding: 12px 20px; background: #000; border-bottom: 2px solid var(--green);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .brand { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--cyan); letter-spacing: 2px; }

        /* EDITOR MAESTRO */
        .viewport { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 10px; }
        #canvas-word { 
            flex: 1; background: #fff; color: #000; border-radius: 4px;
            padding: 40px; overflow-y: auto; box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }
        #main-editor { outline: none; font-size: 1rem; line-height: 1.6; font-family: 'Arial', sans-serif; min-height: 100%; }

        /* TABLAS DINÁMICAS Y SELECCIONABLES */
        .table-wrapper { margin: 20px 0; border: 1px solid #eee; padding: 15px; background: #fafafa; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border: 2px solid #333; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: left; transition: 0.2s; }
        
        /* Efecto cuando la celda tiene el foco de la IA */
        .cell-focus { 
            background: rgba(0, 242, 255, 0.1) !important; 
            border: 2px solid var(--cyan) !important;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .table-controls { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { background: #111; color: #fff; border: 1px solid #444; padding: 5px 12px; font-size: 0.6rem; cursor: pointer; font-family: 'Orbitron'; }
        .btn-action:hover { border-color: var(--cyan); color: var(--cyan); }

        /* COMANDOS DE LA IA */
        .command-center { 
            background: rgba(0,0,0,0.95); border-top: 2px solid var(--cyan);
            padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
        }
        .btn-main {
            background: rgba(255,255,255,0.03); border: 1px solid #333; color: #fff;
            padding: 15px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; text-transform: uppercase;
        }
        .btn-active { background: var(--green) !important; color: #000 !important; border: none; font-weight: bold; }

        #voice-status { 
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: var(--green); color: #000; padding: 5px 25px; border-radius: 20px;
            font-size: 0.6rem; font-family: 'Orbitron'; display: none; z-index: 2000; font-weight: bold;
        }

        .footer-tools { background: #000; padding: 10px; display: flex; justify-content: space-around; gap: 5px; border-top: 1px solid #222; }
    </style>
</head>
<body onload="bootSystem()">

<div id="voice-status">IA: ESCUCHANDO</div>

<header>
    <div class="brand">MYZION <span style="color:var(--green)">OS</span> v31</div>
    <div id="sys-clock" style="font-size: 0.7rem; color: var(--cyan);">00:00:00</div>
</header>

<main class="viewport">
    <div id="canvas-word">
        <div id="main-editor" contenteditable="true">
            <h1 style="text-align:center;">SISTEMA DE GESTIÓN PRECISA</h1>
            <p>Seleccione una celda o use los comandos de voz para comenzar.</p>
        </div>
    </div>
</main>

<div class="command-center">
    <button class="btn-main" style="border-color: var(--purple); color: var(--purple);" onclick="insertDynamicTable()">+ TABLA INTELIGENTE</button>
    <button class="btn-main" onclick="openScanner()">OMNI-SCANNER OCR</button>
    <button id="v-master" class="btn-main" style="grid-column: span 2; border-color: var(--green); color: var(--green);" onclick="toggleVoice()">ACTIVAR COMANDOS DE VOZ</button>
</div>

<div class="footer-tools">
    <button class="btn-action" onclick="exportPDF()">PDF</button>
    <button class="btn-action" onclick="exportWord()">WORD</button>
    <button class="btn-action" onclick="exportPNG()">PNG</button>
    <button class="btn-action" style="color:red" onclick="resetEditor()">BORRAR</button>
</div>

<div id="scanner-ui" style="display:none; position:fixed; inset:0; background:#000; z-index:5000;">
    <video id="video" style="width:100%; height:85%; object-fit:cover;" autoplay playsinline></video>
    <div style="height:15%; display:flex; justify-content:space-around; align-items:center;">
        <button class="btn-main" onclick="closeScanner()">CERRAR</button>
        <button class="btn-main" style="background:var(--purple)" onclick="processOCR()">CAPTURAR</button>
    </div>
</div>

<script>
    let isListening = false;
    let targetCell = null;
    let isFocusedOnTable = false;

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function speak(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'es-ES'; u.rate = 1.1;
        window.speechSynthesis.speak(u);
    }

    function bootSystem() {
        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        setTimeout(() => {
            speak("Bienvenido a Myzion 31. He activado la selección de celdas inteligente. " +
                  "Ahora puede tocar cualquier parte de una tabla y yo escribiré justo ahí. " +
                  "Todas las funciones de escaneo y exportación están listas.");
        }, 800);
    }

    // --- MANEJO DE SELECCIÓN DE TABLA ---
    document.addEventListener('click', (e) => {
        if (e.target.tagName === 'TD' || e.target.tagName === 'TH') {
            if (targetCell) targetCell.classList.remove('cell-focus');
            targetCell = e.target;
            targetCell.classList.add('cell-focus');
            isFocusedOnTable = true;
            
            const colName = targetCell.closest('table').rows[0].cells[targetCell.cellIndex].innerText;
            speak("Posicionado en " + colName + ". ¿Qué dato ingreso?");
        } else if (e.target.id === 'main-editor' || e.target.closest('#main-editor')) {
            if (targetCell) targetCell.classList.remove('cell-focus');
            isFocusedOnTable = false;
        }
    });

    // --- COMANDOS DE VOZ ---
    function toggleVoice() {
        const btn = document.getElementById('v-master');
        const hud = document.getElementById('voice-status');
        if(!isListening) {
            recognition.start();
            isListening = true;
            btn.classList.add('btn-active');
            hud.style.display = 'block';
            speak("Sistemas de escucha activados.");
        } else {
            recognition.stop();
            isListening = false;
            btn.classList.remove('btn-active');
            hud.style.display = 'none';
        }
    }

    recognition.onresult = (e) => {
        const msg = e.results[e.results.length - 1][0].transcript.toLowerCase();
        const editor = document.getElementById('main-editor');

        if(msg.includes("crear tabla")) { insertDynamicTable(); }
        else if(msg.includes("auditoría")) { speak("Contenido del reporte: " + editor.innerText); }
        else if(msg.includes("salir de la tabla")) { 
            if(targetCell) targetCell.classList.remove('cell-focus');
            isFocusedOnTable = false;
            speak("Dictado libre activado.");
        }
        else {
            if(isFocusedOnTable && targetCell) {
                targetCell.innerText = msg;
                // Opcional: auto-avanzar a la derecha
                moveNext();
            } else {
                editor.innerHTML += " " + msg;
            }
        }
    };

    function moveNext() {
        let next = targetCell.nextElementSibling;
        if(!next) {
            let nextRow = targetCell.parentElement.nextElementSibling;
            if(nextRow) next = nextRow.cells[0];
        }
        if(next) {
            targetCell.classList.remove('cell-focus');
            targetCell = next;
            targetCell.classList.add('cell-focus');
        }
    }

    // --- FUNCIONES DINÁMICAS ---
    function insertDynamicTable() {
        const id = "t_" + Date.now();
        const html = `
            <div id="${id}_wrap" class="table-wrapper">
                <table id="${id}">
                    <thead><tr><th contenteditable="true">CATEGORÍA</th><th contenteditable="true">VALOR</th></tr></thead>
                    <tbody><tr><td contenteditable="true">...</td><td contenteditable="true">...</td></tr></tbody>
                </table>
                <div class="table-controls">
                    <button class="btn-action" onclick="addRow('${id}')">+ FILA</button>
                    <button class="btn-action" onclick="addCol('${id}')">+ COL</button>
                    <button class="btn-action" style="color:red" onclick="document.getElementById('${id}_wrap').remove()">X</button>
                </div>
            </div><br>`;
        document.getElementById('main-editor').innerHTML += html;
        speak("Tabla insertada. Toque cualquier casilla para llenarla.");
    }

    function addRow(id) {
        const t = document.getElementById(id);
        const r = t.insertRow(-1);
        for(let i=0; i<t.rows[0].cells.length; i++) {
            let c = r.insertCell(i); c.contentEditable = "true"; c.innerText = "...";
        }
    }

    function addCol(id) {
        const t = document.getElementById(id);
        for(let i=0; i<t.rows.length; i++) {
            let c = t.rows[i].insertCell(-1);
            c.contentEditable = "true";
            if(i===0) c.outerHTML = `<th contenteditable="true">NUEVO</th>`;
            else c.innerText = "...";
        }
    }

    // --- OCR Y EXPORTACIÓN ---
    async function openScanner() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = s;
        document.getElementById('scanner-ui').style.display = 'block';
    }
    function closeScanner() {
        document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('scanner-ui').style.display = 'none';
    }
    async function processOCR() {
        speak("Escaneando...");
        const v = document.getElementById('video');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById('main-editor').innerText += "\n" + res.data.text.trim();
        closeScanner();
        speak("Texto integrado.");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(doc.splitTextToSize(document.getElementById('main-editor').innerText, 180), 15, 20);
        doc.save("Zion_Precision_v31.pdf");
    }

    function exportWord() {
        const content = document.getElementById('main-editor').innerText;
        const blob = new Blob(['\ufeff' + content], { type: 'application/msword' });
        saveAs(blob, "Zion_Doc.doc");
    }

    async function exportPNG() {
        const canvas = await html2canvas(document.getElementById('canvas-word'));
        const link = document.createElement('a');
        link.download = 'Captura_Precision.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    function resetEditor() { document.getElementById('main-editor').innerHTML = ""; speak("Documento borrado."); }
</script>
</body>
</html>
