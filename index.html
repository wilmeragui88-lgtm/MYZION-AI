<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYZION OS PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Roboto',Arial,sans-serif;
    background:#050a14;
    color:#00ffff;
    display:flex;
    flex-direction:column;
    height:100vh;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#0a111f;
    border-bottom:2px solid #00ffff;
}

.top-bar h1{margin:0;font-size:1.5rem;}
.status{
    display:flex;
    align-items:center;
    gap:15px;
}
.status span{font-weight:bold;}

.main{
    display:flex;
    flex:1;
    overflow:hidden;
}

.center{
    flex:2;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.core{
    width:200px;
    height:200px;
    border-radius:50%;
    border:4px solid #00ffff;
    box-shadow:0 0 50px #00ffff;
    animation:rotate 10s linear infinite;
    transition:0.3s;
}
.listening{border-color:lime;box-shadow:0 0 80px lime;}
.speaking{border-color:orange;box-shadow:0 0 80px orange;}
@keyframes rotate{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

.panel-chat{
    flex:3;
    display:flex;
    flex-direction:column;
    background:#0a111f;
    padding:10px;
    overflow-y:auto;
}

.panel-chat p{
    margin:5px 0;
}

.user-msg{color:#00ff99;}
.ai-msg{color:#ffcc00;}

.commands{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:5px;
}

button, .appButton{
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#00ffff;
    color:#050a14;
    font-weight:bold;
    transition:0.3s;
}
button:hover, .appButton:hover{background:#00ffcc;}
</style>
</head>

<body>
<div class="top-bar">
    <h1>MYZION OS PRO</h1>
    <div class="status">
        <span id="micStatus">🔴 Inactivo</span>
        <select id="voiceSelect" onchange="modoVoz=this.value">
            <option value="normal">Voz Normal</option>
            <option value="profesional">Voz Profesional</option>
        </select>
    </div>
</div>

<div class="main">
    <div class="center">
        <div id="core" class="core"></div>
        <button onclick="activarEscucha()">Escucha Continua</button>
    </div>
    <div class="panel-chat" id="panel">
        <p>🚀 MYZION OS PRO inicializado...</p>
        <input type="text" id="input" placeholder="Escribe o di: MYZION ...">
        <button onclick="enviarManual()">Enviar</button>
        <div class="commands">
            <span class="appButton" onclick="ejecutarComandoGlobal('abrir_web','https://www.google.com')">Google</span>
            <span class="appButton" onclick="ejecutarComandoGlobal('modo_oscuro','')">Modo Oscuro</span>
            <span class="appButton" onclick="ejecutarComandoGlobal('modo_claro','')">Modo Claro</span>
            <span class="appButton" onclick="ejecutarComandoGlobal('alert','¡Hola desde MYZION OS!')">Notificación</span>
            <span class="appButton" onclick="ejecutarComandoGlobal('linterna_on','')">Linterna ON</span>
            <span class="appButton" onclick="ejecutarComandoGlobal('linterna_off','')">Linterna OFF</span>
        </div>
    </div>
</div>

<script>
const core=document.getElementById("core");
const panel=document.getElementById("panel");
const micStatus=document.getElementById("micStatus");
let modoVoz="normal";
let WAKE_WORD="myzión";
let historial=[{role:"system", content:"Eres MYZION OS PRO, sistema operativo inteligente futurista"}];

window.speechSynthesis.onvoiceschanged=()=>{speechSynthesis.getVoices();};

async function hablar(texto){
    core.classList.remove("listening");
    core.classList.add("speaking");
    if(modoVoz==="normal"){
        const s=new SpeechSynthesisUtterance(texto);
        s.lang="es-ES"; s.rate=0.9; s.pitch=0.8;
        const voces=speechSynthesis.getVoices();
        const vozE=voces.find(v=>v.lang.includes("es"));
        if(vozE)s.voice=vozE;
        s.onend=()=>core.classList.remove("speaking");
        speechSynthesis.speak(s);
    }else{
        try{
            const res=await fetch("https://TU_BACKEND.com/api/voz_profesional",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({texto})});
            const data=await res.json();
            const audio=new Audio(data.url);
            audio.onended=()=>core.classList.remove("speaking");
            audio.play();
        }catch(err){console.log("Error voz profesional",err);}
    }
}

async function enviarIA(texto){
    panel.innerHTML+=`<p class="user-msg">Tú: ${texto}</p>`;
    try{
        const res=await fetch("https://TU_BACKEND.com/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mensaje:texto,historial})});
        const data=await res.json();
        let json=data;
        panel.innerHTML+=`<p class="ai-msg">MYZION: ${json.respuesta}</p>`;
        panel.scrollTop=panel.scrollHeight;
        await hablar(json.respuesta);
        if(json.tipo==='comando') ejecutarComandoGlobal(json.accion,json.parametro);
        historial.push({role:"user",content:texto});
        historial.push({role:"assistant",content:json.respuesta});
    }catch(err){panel.innerHTML+="<p class='ai-msg'>Error al conectar IA</p>";}
}

function enviarManual(){
    const texto=document.getElementById("input").value;
    if(texto) enviarIA(texto);
    document.getElementById("input").value="";
}

function ejecutarComandoGlobal(accion,parametro){
    switch(accion){
        case "abrir_web": window.open(parametro); break;
        case "modo_oscuro": document.body.style.background="#000"; break;
        case "modo_claro": document.body.style.background="#050a14"; break;
        case "alert": alert(parametro); break;
        case "linterna_on": console.log("Linterna ON"); break;
        case "linterna_off": console.log("Linterna OFF"); break;
        case "gps": console.log("Mostrar GPS"); break;
        default: console.log("Comando desconocido",accion);
    }
}

function activarEscucha(){
    const recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    recognition.lang="es-ES"; recognition.continuous=true;
    micStatus.textContent="🟢 Escuchando...";
    recognition.onresult=(event)=>{
        const texto=event.results[event.results.length-1][0].transcript.toLowerCase();
        if(texto.includes(WAKE_WORD)) enviarIA(texto);
    };
    recognition.start();
}
</script>

</body>
</html>
