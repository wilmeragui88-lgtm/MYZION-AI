<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | OMNI-SYNCH v46.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a; --glass: rgba(15, 17, 21, 0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { margin: 0; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ARRANQUE Y TUTORIAL */
        #boot-layer { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .pulse-btn { background: none; border: 2px solid var(--green); color: var(--green); padding: 25px 50px; font-family: 'Orbitron'; font-size: 1.2rem; cursor: pointer; transition: 0.4s; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 255, 157, 0.2); text-transform: uppercase; }
        .pulse-btn:hover { background: var(--green); color: #000; box-shadow: 0 0 50px var(--green); }

        /* HEADER Y REPOSITORIO */
        header { padding: 12px 20px; background: #000; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        #hub-sidebar { position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: var(--glass); border-left: 2px solid var(--cyan); z-index: 2000; transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1); padding: 25px; box-shadow: -10px 0 30px #000; }
        #hub-sidebar.active { right: 0; }

        /* BARRA DE HERRAMIENTAS ESTILO WORD */
        .toolbar { background: #1a1d23; padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #333; overflow-x: auto; position: sticky; top: 0; z-index: 500; align-items: center; }
        .tool-group { display: flex; gap: 5px; border-right: 1px solid #444; padding-right: 10px; align-items: center; }
        .t-btn { background: #222; border: 1px solid #444; color: #fff; padding: 6px 10px; font-size: 0.65rem; cursor: pointer; border-radius: 3px; font-family: 'Orbitron'; }
        select { background: #222; color: #fff; border: 1px solid #444; font-size: 0.7rem; border-radius: 3px; padding: 3px; }

        /* ÁREA DE TRABAJO */
        .workspace { flex: 1; overflow-y: auto; padding: 40px 15px; display: flex; flex-direction: column; align-items: center; gap: 50px; background: #111; scroll-behavior: smooth; }
        .page-sheet { background: #fff; color: #000; width: 98%; max-width: 850px; min-height: 1100px; padding: 70px; border-radius: 2px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; outline: none; font-family: 'Arial', sans-serif; line-height: 1.6; }
        .page-marker { position: absolute; top: 20px; left: 25px; font-size: 0.6rem; color: #aaa; font-family: 'Orbitron'; pointer-events: none; }

        /* TABLAS EVOLUCIONADAS */
        .table-container { margin: 25px 0; border: 1px dashed #ccc; padding: 15px; border-radius: 8px; background: #f9f9f9; }
        .table-box { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; border: 2px solid #444; background: #fff; }
        th, td { border: 1px solid #ccc; padding: 12px; min-width: 100px; outline: none; text-align: left; }
        .active-cell { background: rgba(0, 242, 255, 0.12) !important; border: 2px solid var(--cyan) !important; }
        .table-controls { display: flex; gap: 8px; margin-top: 12px; }

        /* PANEL DE CONTROL INFERIOR */
        .control-panel { background: #000; border-top: 2px solid var(--cyan); padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-core { background: #111; border: 1px solid #333; color: #fff; padding: 12px 5px; font-family: 'Orbitron'; font-size: 0.55rem; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
        
        #voice-hud { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 8px 30px; border-radius: 30px; font-size: 0.7rem; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; box-shadow: 0 0 20px var(--green); }
        #ocr-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }
        video { width: 100%; height: 80%; object-fit: cover; }
    </style>
</head>
<body>

<div id="boot-layer">
    <h1 style="color:var(--cyan); font-family:'Orbitron'; font-size: 2.5rem; margin-bottom: 10px;">MYZION v46</h1>
    <p style="color:#666; margin-bottom:30px;">TOTAL OMNI-SYNCH ACTIVADO</p>
    <button class="pulse-btn" onclick="startOmniInstruction()">INICIALIZAR SISTEMAS</button>
</div>

<div id="voice-hud">SISTEMA ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.85rem; color:var(--cyan)">MYZION <span style="color:var(--purple)">MASTER</span></div>
    <button class="t-btn" style="border-color:var(--cyan); padding: 8px 15px;" onclick="toggleHub()">MIS ARCHIVOS ☰</button>
</header>

<div class="toolbar">
    <div class="tool-group">
        <select onchange="document.execCommand('fontName', false, this.value)">
            <option value="Arial">Arial</option>
            <option value="JetBrains Mono">Mono</option>
            <option value="Georgia">Georgia</option>
        </select>
        <select onchange="document.execCommand('fontSize', false, this.value)">
            <option value="3">Normal</option>
            <option value="5">Grande</option>
            <option value="7">Título</option>
        </select>
    </div>
    <div class="tool-group">
        <button class="t-btn" onclick="document.execCommand('bold')"><b>B</b></button>
        <button class="t-btn" onclick="document.execCommand('italic')"><i>I</i></button>
        <input type="color" onchange="document.execCommand('foreColor', false, this.value)" style="width:25px; height:25px; border:none; background:none;">
    </div>
    <button class="t-btn" style="color:var(--green); border-color:var(--green)" onclick="readAloud()">LEER DOCUMENTO</button>
</div>

<div id="hub-sidebar">
    <h3 style="color:var(--cyan); font-family:'Orbitron'; font-size:0.7rem; border-bottom: 1px solid #333; padding-bottom:10px;">REPOSITORIO</h3>
    <div id="file-index" style="margin-top:20px;"></div>
    <button class="btn-core" style="width:100%; margin-top:20px;" onclick="toggleHub()">CERRAR</button>
</div>

<main class="workspace" id="main-canvas">
    <div class="page-sheet" contenteditable="true" id="p1" onfocus="activePage='p1'">
        <div class="page-marker">PÁGINA 1</div>
        <h1 style="text-align:center; font-family:'Orbitron'; margin-top:50px;">NUEVA REDACCIÓN</h1>
        <p>Seleccione el lugar de escritura y active la Voz Maestra...</p>
    </div>
</main>

<div class="control-panel">
    <button class="btn-core" style="color:var(--green)" onclick="createNewPage()">+ PÁGINA</button>
    <button class="btn-core" style="color:var(--green)" onclick="insertSmartTable()">+ TABLA IA</button>
    <button class="btn-core" onclick="initOCR()">OCR SCAN</button>
    <button class="btn-core" style="color:var(--purple); border-color:var(--purple)" onclick="shareDocument()">COMPARTIR</button>
    <button id="mic-trigger" class="btn-core" style="grid-column: span 4; border-color: var(--green); margin-top:5px; padding:15px; font-size: 0.8rem;" onclick="toggleDictation()">ACTIVAR VOZ MAESTRA</button>
</div>

<div style="background:#000; padding:12px; display:flex; gap:10px; border-top:1px solid #222;">
    <button class="btn-core" style="flex:1" onclick="saveToHub()">GUARDAR</button>
    <button class="btn-core" style="flex:1" onclick="exportPDF()">EXPORTAR PDF</button>
</div>

<div id="ocr-overlay">
    <video id="camera-stream" autoplay playsinline></video>
    <div style="height:20%; display:flex; justify-content:space-around; align-items:center; background:#000;">
        <button class="btn-core" onclick="closeOCR()">VOLVER</button>
        <button class="btn-core" style="background:var(--purple); padding:15px 30px;" onclick="captureText()">CAPTURAR</button>
    </div>
</div>

<script>
    let activePage = 'p1';
    let isListening = false;
    let selectedCell = null;
    let fileHistory = [];
    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function hablar(texto) {
        synth.cancel();
        const m = new SpeechSynthesisUtterance(texto);
        m.lang = 'es-ES'; m.rate = 1.0;
        synth.speak(m);
    }

    // --- TUTORIAL INTEGRADO ---
    function startOmniInstruction() {
        document.getElementById('boot-layer').style.display = 'none';
        hablar("Protocolo Myzion iniciado. Para trabajar, toque el lugar donde desea escribir, ya sea en la hoja o en una celda. Luego presione el botón ACTIVAR VOZ MAESTRA para dictar. He activado las funciones de tablas elásticas: use los botones que aparecen bajo la tabla para agregar filas, columnas o eliminarla. Todo listo para su comando.");
    }

    // --- SISTEMA DE DICTADO ---
    function toggleDictation() {
        const btn = document.getElementById('mic-trigger');
        const hud = document.getElementById('voice-hud');
        if(!isListening) {
            try {
                recognition.start();
                isListening = true;
                btn.style.background = "#00ff9d"; btn.style.color = "#000";
                hud.style.display = 'block'; hablar("Sintonizando voz.");
            } catch(e) {}
        } else {
            recognition.stop();
            isListening = false;
            btn.style.background = "#111"; btn.style.color = "#fff";
            hud.style.display = 'none'; hablar("Escucha en pausa.");
        }
    }

    recognition.onresult = (e) => {
        const t = e.results[e.results.length - 1][0].transcript;
        if(selectedCell) {
            selectedCell.innerText = t;
        } else {
            document.execCommand('insertText', false, " " + t);
        }
    };

    // --- GESTIÓN DE TABLAS AVANZADAS ---
    function insertSmartTable() {
        const tid = "tab_" + Date.now();
        const html = `
            <div class="table-container" id="${tid}_container" contenteditable="false">
                <div class="table-box">
                    <table id="${tid}">
                        <tr><td contenteditable="true">Dato A</td><td contenteditable="true">Dato B</td></tr>
                    </table>
                </div>
                <div class="table-controls">
                    <button class="t-btn" onclick="modTable('${tid}', 'row')">+ Fila</button>
                    <button class="t-btn" onclick="modTable('${tid}', 'col')">+ Col</button>
                    <button class="t-btn" style="color:red; border-color:red" onclick="document.getElementById('${tid}_container').remove()">Eliminar</button>
                </div>
            </div><br>`;
        document.getElementById(activePage).innerHTML += html;
        hablar("Tabla vinculada.");
    }

    function modTable(id, type) {
        const table = document.getElementById(id);
        if(type === 'row') {
            const r = table.insertRow(-1);
            for(let i=0; i<table.rows[0].cells.length; i++) r.insertCell(i).contentEditable = "true";
            hablar("Fila añadida.");
        } else {
            for(let i=0; i<table.rows.length; i++) table.rows[i].insertCell(-1).contentEditable = "true";
            hablar("Columna añadida.");
        }
    }

    document.addEventListener('click', (e) => {
        if(e.target.tagName === 'TD') {
            if(selectedCell) selectedCell.classList.remove('active-cell');
            selectedCell = e.target;
            selectedCell.classList.add('active-cell');
            hablar("Celda activa.");
        }
    });

    // --- FUNCIONES MANTENIDAS ---
    function createNewPage() {
        const id = 'p' + (document.querySelectorAll('.page-sheet').length + 1);
        const p = document.createElement('div');
        p.className = 'page-sheet'; p.contentEditable = "true"; p.id = id;
        p.onfocus = () => activePage = id;
        p.innerHTML = `<div class="page-marker">PÁGINA ${id.substring(1)}</div>`;
        document.getElementById('main-canvas').appendChild(p);
        p.focus(); hablar("Nueva hoja.");
    }

    function readAloud() { hablar(document.getElementById(activePage).innerText); }

    async function shareDocument() {
        const text = document.getElementById(activePage).innerText;
        if(navigator.share) await navigator.share({ title: 'Myzion Master', text: text });
    }

    function saveToHub() {
        const name = "DOC-" + new Date().toLocaleTimeString();
        fileHistory.push({ name, data: document.getElementById('main-canvas').innerHTML });
        updateFileList(); hablar("Archivo guardado.");
    }

    function updateFileList() {
        const list = document.getElementById('file-index');
        list.innerHTML = "";
        fileHistory.forEach(f => {
            const div = document.createElement('div');
            div.style = "padding:10px; border-bottom:1px solid #333; color:var(--cyan); cursor:pointer; font-size:0.6rem;";
            div.innerText = "📄 " + f.name;
            div.onclick = () => { document.getElementById('main-canvas').innerHTML = f.data; toggleHub(); hablar("Cargado."); };
            list.appendChild(div);
        });
    }

    function toggleHub() { document.getElementById('hub-sidebar').classList.toggle('active'); }

    async function initOCR() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('camera-stream').srcObject = s;
        document.getElementById('ocr-overlay').style.display = 'block';
        hablar("Escáner visual activo.");
    }

    function closeOCR() {
        document.getElementById('camera-stream').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-overlay').style.display = 'none';
    }

    async function captureText() {
        hablar("Extrayendo texto...");
        const v = document.getElementById('camera-stream');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(activePage).innerText += "\n" + res.data.text;
        closeOCR(); hablar("Texto integrado.");
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(document.getElementById(activePage).innerText.substring(0, 1000), 10, 20);
        doc.save("Myzion_Pro.pdf");
    }
</script>
</body>
</html>
