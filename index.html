<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYZION AI - Creative Director Edition</title>
    <style>
        :root { --primary: #00ffff; --bg: #010409; --accent: #ff00ff; --glass: rgba(0, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Estética Visual Avanzada */
        .background-fx { position: fixed; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #0a192f 0%, #010409 100%); }
        .grid { position: fixed; width: 200%; height: 200%; background-image: linear-gradient(var(--primary) 1px, transparent 1px), linear-gradient(90deg, var(--primary) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.05; transform: perspective(500px) rotateX(60deg); animation: move 12s linear infinite; z-index: -1; }
        @keyframes move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

        /* Navegación y Memoria */
        .top-nav { background: var(--glass); border-bottom: 1px solid var(--primary); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); z-index: 10; }
        .task-view { font-size: 0.8rem; letter-spacing: 1px; color: #fff; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 70%; }

        /* Flujo de Chat */
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 15px; font-size: 0.95rem; line-height: 1.6; border: 1px solid rgba(0,255,255,0.1); animation: slideIn 0.3s ease; }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.03); border-left: 3px solid var(--accent); }
        .user { align-self: flex-end; background: var(--primary); color: #000; font-weight: 600; border: none; box-shadow: 0 4px 15px rgba(0,255,255,0.2); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Interfaz de Control (Nexus) */
        .core-interface { padding: 20px; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.9); border-top: 1px solid var(--primary); box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        .nexus { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 0 20px var(--primary); cursor: pointer; transition: 0.4s; position: relative; background: transparent; }
        .active-mic { border-color: #00ff00; box-shadow: 0 0 35px #00ff00; transform: scale(1.1); }
        .processing { animation: pulse 0.6s infinite alternate; border-color: var(--accent); box-shadow: 0 0 35px var(--accent); }
        @keyframes pulse { from { transform: scale(1); opacity: 0.6; } to { transform: scale(1.1); opacity: 1; } }

        .input-box { width: 100%; max-width: 800px; display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--primary); color: #fff; padding: 14px; border-radius: 10px; outline: none; font-size: 1rem; }
        button { background: var(--primary); color: #000; border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="background-fx"></div>
<div class="grid"></div>

<div class="top-nav">
    <div class="task-view" id="task-display">MEMORIA: Inicializando núcleos...</div>
    <div style="font-weight: bold; font-size: 0.8rem; letter-spacing: 2px;">MYZION CREATIVE</div>
</div>

<div id="chat-flow"></div>

<div class="core-interface">
    <div id="nexus" class="nexus" onclick="startVoice()"></div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Escribe un comando o describe tu spot comercial...">
        <button onclick="handleAction()">EJECUTAR</button>
        <button onclick="clearAll()" style="background:#ff4444; color:white;">RESET</button>
    </div>
</div>

<script>
    // --- NÚCLEO DE INTELIGENCIA ---
    const GEMINI_API = 'AIzaSyBf_shZMc7pa6q9BhX9i2njKW1G_O9Iegg';
    const ELEVEN_API = 'TU_API_KEY_ELEVENLABS'; // Cambia esto para voces realistas
    const VOICE_ID = 'pNInz6obpgDQGcFmaJgB'; // Adam (Locutor Pro)

    const chatFlow = document.getElementById('chat-flow');
    const userInput = document.getElementById('userInput');
    const nexus = document.getElementById('nexus');
    let sessionHistory = [
        { role: "user", parts: [{ text: "A partir de ahora eres MYZION, una Directora Creativa experta en marketing y locución. Tus respuestas deben ser profesionales, inspiradoras y enfocadas en crear contenido de alto impacto. Si te pido un guion, dalo con estructura de locución (música, voz, efectos)." }] },
        { role: "model", parts: [{ text: "Entendido. Sistema MYZION Creative activo. Estoy lista para dirigir tu producción y llevar tus ideas al siguiente nivel." }] }
    ];

    async function speakNeural(text) {
        nexus.classList.add('processing');
        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'xi-api-key': ELEVEN_API },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.8 }
                })
            });
            if (!response.ok) throw new Error();
            const blob = await response.blob();
            const audio = new Audio(URL.createObjectURL(blob));
            await audio.play();
        } catch (e) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
        } finally {
            nexus.classList.remove('processing');
        }
    }

    function print(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        chatFlow.appendChild(div);
        chatFlow.scrollTop = chatFlow.scrollHeight;
    }

    async function handleAction() {
        const val = userInput.value.trim();
        if(!val) return;

        print('user', val);
        userInput.value = '';
        nexus.classList.add('processing');

        const cmd = val.toLowerCase();

        // Automatización de Búsqueda
        if (cmd.includes("busca") || cmd.includes("reproduce")) {
            let q = cmd.replace(/busca|reproduce|youtube/gi, "").trim();
            window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`);
            print('ai', `Abriendo recursos multimedia para: ${q}`);
            nexus.classList.remove('processing');
            return;
        }

        // Registro de Tareas
        if (cmd.includes("recordar") || cmd.includes("tarea")) {
            let t = val.replace(/recordar|tarea/gi, "").trim();
            let tasks = JSON.parse(localStorage.getItem('mz_tasks')) || [];
            tasks.push(t);
            localStorage.setItem('mz_tasks', JSON.stringify(tasks));
            updateTaskUI();
        }

        sessionHistory.push({ role: "user", parts: [{ text: val }] });

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: sessionHistory })
            });

            const data = await response.json();
            const aiResp = data.candidates[0].content.parts[0].text;

            print('ai', aiResp);
            await speakNeural(aiResp);
            sessionHistory.push({ role: "model", parts: [{ text: aiResp }] });

        } catch (err) {
            print('ai', "Error de enlace neuronal. Revisa tu conexión o API Key.");
        } finally {
            nexus.classList.remove('processing');
        }
    }

    function updateTaskUI() {
        const t = JSON.parse(localStorage.getItem('mz_tasks')) || [];
        document.getElementById('task-display').innerText = "MEMORIA: " + (t.length ? t.join(" | ") : "Sin objetivos pendientes.");
    }

    function startVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-ES';
        rec.onstart = () => nexus.classList.add('active-mic');
        rec.onend = () => nexus.classList.remove('active-mic');
        rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; handleAction(); };
        rec.start();
    }

    function clearAll() { if(confirm("¿Reiniciar sistema operativo MYZION?")) { localStorage.clear(); location.reload(); } }

    window.onload = () => {
        updateTaskUI();
        const intro = "MYZION Creative Online. Enlace neuronal activo. Estoy lista para redactar y producir tus contenidos. ¿Qué tenemos en agenda hoy?";
        print('ai', intro);
        const msg = new SpeechSynthesisUtterance(intro);
        msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
    };

    userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") handleAction(); });
</script>
</body>
</html>
