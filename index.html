<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION MASTER | V51.0 TOTAL ESTRUCTURE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 12px 20px; background: #000; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .toolbar { background: #1a1d23; padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid #333; overflow-x: auto; }
        .t-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 14px; font-size: 0.65rem; cursor: pointer; border-radius: 4px; font-family: 'Orbitron'; white-space: nowrap; transition: 0.2s; }
        .t-btn:active { transform: scale(0.95); background: var(--purple); }

        .workspace { flex: 1; overflow-y: auto; padding: 30px 10px; background: #111; display: flex; flex-direction: column; align-items: center; }
        
        /* CONTROLES DE PÁGINA */
        .page-wrapper { position: relative; width: 100%; max-width: 850px; margin-bottom: 50px; transition: 0.3s; }
        .page-controls { position: absolute; top: 0; right: -55px; display: flex; flex-direction: column; gap: 5px; }
        .ctrl-p-btn { background: #111; color: #fff; border: 1px solid #444; padding: 8px; cursor: pointer; border-radius: 4px; font-family: 'Orbitron'; font-size: 10px; width: 45px; transition: 0.2s; }
        .ctrl-p-btn.del { background: #700; border-color: #f44; }
        .ctrl-p-btn:hover { background: var(--cyan); color: #000; }

        .page-sheet { 
            background: #fff; color: #000; width: 100%; min-height: 1100px; 
            padding: 60px 50px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            outline: none; font-family: 'Arial', sans-serif; line-height: 1.6; position: relative;
        }

        /* TABLAS Y CELDAS */
        .word-table-wrapper { margin: 20px 0; border: 1px solid #ddd; padding: 10px; background: #fdfdfd; border-radius: 6px; }
        .table-controls { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 5px; flex-wrap: wrap; }
        .btn-mini { background: #fff; border: 1px solid #ccc; color: #333; font-size: 9px; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; border: 1.5pt solid black; background: #fff; }
        td { border: 1pt solid black; padding: 12px; min-height: 40px; word-break: break-word; font-size: 14px; color: #000; }
        .active-cell { outline: 3px solid var(--cyan) !important; background: rgba(0, 242, 255, 0.08) !important; }

        .control-panel { background: #000; border-top: 2px solid var(--cyan); padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        #voice-hud { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 8px 35px; border-radius: 30px; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; box-shadow: 0 0 15px var(--green); }
        
        #hub-sidebar { position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: rgba(5,7,10,0.98); border-left: 2px solid var(--cyan); z-index: 4000; transition: 0.3s; padding: 25px; overflow-y: auto; }
        #hub-sidebar.active { right: 0; }
        
        #ocr-overlay { display:none; position:fixed; inset:0; background:#000; z-index:5000; }
        #camera-stream { width:100%; height:85%; object-fit:cover; }
    </style>
</head>
<body onload="bienvenidaIA()">

<div id="voice-hud">🎙️ IA: ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.85rem; color:var(--cyan)">MYZION <span style="color:var(--purple)">MASTER v51.0</span></div>
    <div style="display:flex; gap:5px;">
        <button class="t-btn" style="border-color:var(--green)" onclick="shareFile()">COMPARTIR 🔗</button>
        <button class="t-btn" onclick="toggleHub()">REPO ☰</button>
    </div>
</header>

<div class="toolbar">
    <button class="t-btn" onclick="execIA('bold', 'Negrita')">B</button>
    <button class="t-btn" onclick="execIA('italic', 'Cursiva')">I</button>
    <button class="t-btn" onclick="execIA('underline', 'Subrayado')">U</button>
    <button class="t-btn" style="color:var(--green)" onclick="leerTodo()">LEER DOCUMENTO</button>
</div>

<main class="workspace" id="canvas">
    <div class="page-wrapper" id="wrap-p1">
        <div class="page-controls">
            <button class="ctrl-p-btn" title="Subir" onclick="movePage('wrap-p1', 'up')">↑</button>
            <button class="ctrl-p-btn" title="Bajar" onclick="movePage('wrap-p1', 'down')">↓</button>
            <button class="ctrl-p-btn del" title="Borrar" onclick="deletePage('wrap-p1')">X</button>
        </div>
        <div class="page-sheet" contenteditable="true" id="p1" onfocus="activePage='p1'">
            <h1 style="text-align:center; font-family:'Orbitron';">MYZION MASTER v51</h1>
            <p>Sistema estructural avanzado configurado. Use los controles laterales para gestionar las páginas.</p>
        </div>
    </div>
</main>

<div class="control-panel">
    <button class="t-btn" style="color:var(--green)" onclick="newPage()">+ PÁG</button>
    <button class="t-btn" style="color:var(--green)" onclick="insertSmartTable()">+ TABLA</button>
    <button class="t-btn" onclick="startOCR()">OCR</button>
    <button id="mic-trigger" class="t-btn" style="border-color:var(--green)" onclick="toggleVoiceIA()">🎙️ VOZ IA</button>
</div>

<div style="background:#000; padding:12px; display:flex; gap:10px; border-top:1px solid #222;">
    <button class="t-btn" style="flex:1" onclick="saveDoc()">GUARDAR</button>
    <button class="t-btn" style="flex:1" onclick="exportPDF()">PDF</button>
    <button class="t-btn" style="flex:1" onclick="exportWord()">WORD</button>
</div>

<div id="ocr-overlay">
    <video id="camera-stream" autoplay playsinline></video>
    <div style="height:15%; display:flex; justify-content:space-around; align-items:center;">
        <button class="t-btn" onclick="stopOCR()">SALIR</button>
        <button class="t-btn" style="background:var(--purple); padding:15px;" onclick="snapText()">CAPTURAR</button>
    </div>
</div>

<div id="hub-sidebar">
    <h3 style="font-family:'Orbitron'; color:var(--cyan)">REPOSITORIO</h3>
    <div id="file-list"></div>
    <button class="t-btn" style="width:100%; margin-top:20px" onclick="toggleHub()">CERRAR</button>
</div>

<script>
    let activePage = 'p1';
    let isListening = false;
    let selectedCell = null;
    let savedDocs = [];
    
    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES'; recognition.continuous = true;

    function hablar(t) { synth.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; synth.speak(m); }
    function bienvenidaIA() { hablar("Control estructural total v51 activo. Todas las funciones sincronizadas."); }

    function execIA(cmd, msg) { document.execCommand(cmd, false, null); hablar(msg); }

    // --- MANEJO DE PÁGINAS (SUBIR/BAJAR/BORRAR) ---
    window.movePage = (id, direction) => {
        const wrapper = document.getElementById(id);
        if (direction === 'up' && wrapper.previousElementSibling) {
            wrapper.parentNode.insertBefore(wrapper, wrapper.previousElementSibling);
            hablar("Página reubicada arriba.");
        } else if (direction === 'down' && wrapper.nextElementSibling) {
            wrapper.parentNode.insertBefore(wrapper.nextElementSibling, wrapper);
            hablar("Página reubicada abajo.");
        }
    };

    window.deletePage = (wrapperId) => {
        const wrappers = document.querySelectorAll('.page-wrapper');
        if(wrappers.length > 1) {
            document.getElementById(wrapperId).remove();
            activePage = document.querySelector('.page-sheet').id;
            hablar("Página eliminada.");
        } else { hablar("Error: El documento debe contener al menos una página."); }
    };

    function newPage() {
        const ts = Date.now();
        const id = 'p' + ts;
        const wrapId = 'wrap-' + id;
        const wrap = document.createElement('div');
        wrap.className = 'page-wrapper'; wrap.id = wrapId;
        wrap.innerHTML = `
            <div class="page-controls">
                <button class="ctrl-p-btn" onclick="movePage('${wrapId}', 'up')">↑</button>
                <button class="ctrl-p-btn" onclick="movePage('${wrapId}', 'down')">↓</button>
                <button class="ctrl-p-btn del" onclick="deletePage('${wrapId}')">X</button>
            </div>
            <div class="page-sheet" contenteditable="true" id="${id}" onfocus="activePage='${id}'; selectedCell=null;">
                <hr style="border:0.5px solid #eee">
                <p style="color:#aaa; font-size:10px;">ID PÁGINA: ${ts}</p>
            </div>`;
        document.getElementById('canvas').appendChild(wrap);
        document.getElementById(id).focus();
        hablar("Nueva página lista.");
    }

    // --- MANEJO DE TABLAS (FILAS/COLUMNAS/BORRAR) ---
    function insertSmartTable() {
        const id = "t" + Date.now();
        const wrap = document.createElement('div');
        wrap.className = 'word-table-wrapper'; wrap.contentEditable = "false"; wrap.id = id + "_w";
        wrap.innerHTML = `
            <div class="table-controls">
                <button class="btn-mini" onclick="addRowIA('${id}')">+ Fila</button>
                <button class="btn-mini" onclick="delRowIA('${id}')">- Fila</button>
                <button class="btn-mini" onclick="addColIA('${id}')">+ Col</button>
                <button class="btn-mini" onclick="delColIA('${id}')">- Col</button>
                <button class="btn-mini" style="color:red" onclick="deleteTable('${id}_w')">Borrar Tabla</button>
            </div>
            <table id="${id}">
                <tr><td contenteditable="true" onclick="selectCellIA(this)">...</td><td contenteditable="true" onclick="selectCellIA(this)">...</td></tr>
            </table>`;
        document.getElementById(activePage).appendChild(wrap);
        hablar("Tabla insertada.");
    }

    function selectCellIA(c) {
        if(selectedCell) selectedCell.classList.remove('active-cell');
        selectedCell = c; selectedCell.classList.add('active-cell');
        hablar("Celda seleccionada.");
    }

    window.addRowIA = (id) => {
        const t = document.getElementById(id); const r = t.insertRow();
        for(let i=0; i<t.rows[0].cells.length; i++) {
            let c = r.insertCell(); c.contentEditable = "true"; c.innerText = "..."; c.onclick = () => selectCellIA(c);
        }
        hablar("Fila añadida.");
    };

    window.delRowIA = (id) => {
        const t = document.getElementById(id);
        if(t.rows.length > 1) { t.deleteRow(-1); hablar("Fila quitada."); }
    };

    window.addColIA = (id) => {
        const t = document.getElementById(id);
        Array.from(t.rows).forEach(r => {
            let c = r.insertCell(); c.contentEditable = "true"; c.innerText = "..."; c.onclick = () => selectCellIA(c);
        });
        hablar("Columna añadida.");
    };

    window.delColIA = (id) => {
        const t = document.getElementById(id);
        if(t.rows[0].cells.length > 1) {
            Array.from(t.rows).forEach(r => r.deleteCell(-1));
            hablar("Columna quitada.");
        }
    };

    window.deleteTable = (id) => { document.getElementById(id).remove(); hablar("Tabla borrada."); };

    // --- DICTADO UNIVERSAL CORREGIDO ---
    function toggleVoiceIA() {
        if(!isListening) { 
            recognition.start(); isListening = true; 
            document.getElementById('voice-hud').style.display = 'block'; 
            hablar("Escuchando.");
        } else { 
            recognition.stop(); isListening = false; 
            document.getElementById('voice-hud').style.display = 'none'; 
            hablar("Procesado.");
        }
    }

    recognition.onresult = (e) => {
        const text = e.results[e.results.length - 1][0].transcript;
        if(selectedCell) { 
            selectedCell.innerText = text; 
        } else { 
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                const node = document.createTextNode(text + " ");
                range.insertNode(node);
                range.setStartAfter(node);
                sel.removeAllRanges(); sel.addRange(range);
            }
        }
    };

    // --- FUNCIONES DE ALMACENAMIENTO Y EXPORTACIÓN ---
     function saveDoc() {
    const content = document.getElementById('canvas').innerHTML;
    localStorage.setItem("myz_master_doc", content);
    hablar("Documento guardado permanentemente.");
}
    
    function exportWord() {
        const b = new Blob(['\ufeff', document.getElementById('canvas').innerHTML], { type: 'application/msword' });
        saveAs(b, "Myzion_Master.doc");
        hablar("Word generado.");
    }

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p','pt','a4');

    doc.html(document.getElementById('canvas'), {
        callback: function (doc) {
            doc.save("Myzion_Master.pdf");
            hablar("PDF generado correctamente.");
        },
        x: 20,
        y: 20,
        width: 550
    });
}

    async function startOCR() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('camera-stream').srcObject = s;
        document.getElementById('ocr-overlay').style.display = 'block';
        hablar("Cámara lista.");
    }

    async function snapText() {
        const v = document.getElementById('camera-stream');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(activePage).innerHTML += `<p>${res.data.text}</p>`;
        stopOCR(); hablar("Escaneo finalizado.");
    }

    function stopOCR() {
        document.getElementById('camera-stream').srcObject?.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-overlay').style.display = 'none';
    }

    function toggleHub() { document.getElementById('hub-sidebar').classList.toggle('active'); }

    function updateHub() {
        const l = document.getElementById('file-list'); l.innerHTML = "";
        savedDocs.forEach(d => {
            const b = document.createElement('div'); b.className = 't-btn'; b.style="margin-bottom:8px; display:block; text-align:left; width:100%";
            b.innerText = d.name; b.onclick = () => { document.getElementById('canvas').innerHTML = d.content; toggleHub(); hablar("Cargando."); };
            l.appendChild(b);
        });
    }

    function leerTodo() { hablar(document.getElementById(activePage).innerText); }

    async function shareFile() {
        const b = new Blob(['\ufeff', document.getElementById('canvas').innerHTML], { type: 'application/msword' });
        const f = new File([b], "Myzion_Master.doc", { type: 'application/msword' });
        if (navigator.share) navigator.share({ files: [f], title: 'Myzion Master' });
        else exportWord();
    }
</script>
</body>
</html>
