<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYZION AI - Voice Studio 2026</title>
    <style>
        :root { --primary: #00ffff; --bg: #010409; --accent: #ff00ff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .bg-grid { position: fixed; width: 200%; height: 200%; background-image: linear-gradient(var(--primary) 1px, transparent 1px), linear-gradient(90deg, var(--primary) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.05; transform: perspective(500px) rotateX(60deg); z-index: -1; animation: moveGrid 15s linear infinite; }
        @keyframes moveGrid { from { transform: translateY(0); } to { transform: translateY(50px); } }

        .top-bar { padding: 10px; background: rgba(0, 255, 255, 0.05); border-bottom: 1px solid var(--primary); font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; border: 1px solid rgba(0,255,255,0.2); }
        .ai { align-self: flex-start; background: rgba(255, 255, 255, 0.03); }
        .user { align-self: flex-end; background: var(--primary); color: #000; font-weight: bold; }

        .studio-controls { background: #0a111f; padding: 15px; border-top: 2px solid var(--primary); display: flex; flex-direction: column; gap: 10px; }
        .voice-selector { display: flex; gap: 10px; align-items: center; font-size: 0.8rem; color: #fff; }
        select { background: #111a2e; color: var(--primary); border: 1px solid var(--primary); padding: 5px; border-radius: 4px; outline: none; }

        .input-group { display: flex; gap: 10px; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--primary); color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--primary); color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .nexus { width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 0 15px var(--primary); transition: 0.3s; cursor: pointer; }
        .active { border-color: var(--accent); box-shadow: 0 0 25px var(--accent); transform: scale(1.1); }
    </style>
</head>
<body>

<div class="bg-grid"></div>

<div class="top-bar">
    <div id="task-info">MEMORIA: Sistema Optimizado</div>
    <div style="font-weight: bold; letter-spacing: 2px;">MYZION v5.0</div>
</div>

<div id="chat"></div>

<div class="studio-controls">
    <div class="voice-selector">
        <span>LOCUTOR:</span>
        <select id="voiceId">
            <option value="pNInz6obpgDQGcFmaJgB">Adam (Voz Profunda)</option>
            <option value="21m00Tcm4TlvDq8ikWAM">Rachel (Voz Narrativa)</option>
            <option value="Lcf7u9Pa96hpMN9MwzGa">Bella (Voz Premium)</option>
        </select>
        <span style="margin-left: 10px;">PRODUCCIÓN ACTIVA</span>
    </div>
    
    <div class="input-group">
        <div id="nexus" class="nexus" onclick="startMic()"></div>
        <input type="text" id="userInput" placeholder="Escribe el spot o comando de voz...">
        <button onclick="handleAction()">PROCESAR</button>
    </div>
</div>

<script>
    const GEMINI_KEY = 'AIzaSyBf_shZMc7pa6q9BhX9i2njKW1G_O9Iegg';
    const ELEVEN_KEY = 'TU_API_KEY_ELEVENLABS'; // Coloca tu llave para voces reales

    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const nexus = document.getElementById('nexus');
    let history = [];

    // --- MOTOR DE VOZ (SISTEMA + NEURAL) ---
    async function speak(text) {
        nexus.classList.add('active');
        const selectedVoice = document.getElementById('voiceId').value;

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${selectedVoice}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'xi-api-key': ELEVEN_KEY },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.8 }
                })
            });

            if(!response.ok) throw new Error();
            const blob = await response.blob();
            const audio = new Audio(URL.createObjectURL(blob));
            await audio.play();
        } catch (e) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'es-ES';
            window.speechSynthesis.speak(ut);
        } finally {
            nexus.classList.remove('active');
        }
    }

    function addMsg(role, text) {
        const d = document.createElement('div');
        d.className = `msg ${role}`;
        d.innerHTML = text.replace(/\n/g, '<br>');
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    async function handleAction() {
        const val = input.value.trim();
        if(!val) return;

        addMsg('user', val);
        input.value = '';
        nexus.classList.add('active');

        // Lógica de Comandos (YouTube/Recordatorios)
        if(val.toLowerCase().includes("busca") || val.toLowerCase().includes("reproduce")) {
            let q = val.toLowerCase().replace(/busca|reproduce|youtube/gi, "").trim();
            window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`);
            addMsg('ai', `Ejecutando búsqueda multimedia de ${q}`);
            return;
        }

        history.push({ role: "user", parts: [{ text: `Actúa como Directora Creativa. Escribe un guion publicitario profesional para: ${val}` }] });

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: history })
            });

            const data = await res.json();
            const aiResp = data.candidates[0].content.parts[0].text;

            addMsg('ai', aiResp);
            await speak(aiResp);
            history.push({ role: "model", parts: [{ text: aiResp }] });
        } catch (e) {
            addMsg('ai', "Error de enlace neuronal.");
        } finally {
            nexus.classList.remove('active');
        }
    }

    function startMic() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-ES';
        rec.onstart = () => nexus.style.borderColor = "#00ff00";
        rec.onresult = (e) => { input.value = e.results[0][0].transcript; handleAction(); };
        rec.onend = () => nexus.style.borderColor = "#00ffff";
        rec.start();
    }

    window.onload = () => {
        const welcome = "Sistema MYZION Voice Studio iniciado. Estoy lista para locutar tus spots comerciales. ¿Qué producto vamos a posicionar hoy?";
        addMsg('ai', welcome);
        setTimeout(() => speak(welcome), 500);
    };

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") handleAction(); });
</script>
</body>
</html>
