<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION MASTER | TOTAL COMPATIBILITY v47.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 12px 20px; background: #000; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .toolbar { background: #1a1d23; padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid #333; overflow-x: auto; }
        .t-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 14px; font-size: 0.65rem; cursor: pointer; border-radius: 4px; font-family: 'Orbitron'; white-space: nowrap; }

        .workspace { flex: 1; overflow-y: auto; padding: 30px 10px; background: #111; display: flex; flex-direction: column; align-items: center; }
        .page-sheet { 
            background: #fff; color: #000; width: 100%; max-width: 850px; min-height: 1100px; 
            padding: 60px 50px; margin-bottom: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            outline: none; font-family: 'Times New Roman', serif; line-height: 1.5; position: relative;
        }

        /* TABLAS NATIVAS COMPATIBLES */
        .word-table-wrapper { margin: 20px 0; border: 1px solid #ddd; padding: 10px; background: #fff; resize: both; overflow: auto; position: relative; }
        .table-controls { display: flex; gap: 5px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .btn-mini { background: #f8f9fa; border: 1px solid #ddd; color: #333; font-size: 9px; padding: 4px 8px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; border: 1.5pt solid black; margin-bottom: 10px; }
        td { border: 1pt solid black; padding: 10px; min-height: 35px; font-size: 11pt; color: #000; }
        .active-cell { outline: 3px solid var(--cyan) !important; background: rgba(0, 242, 255, 0.05) !important; }

        .control-panel { background: #000; border-top: 2px solid var(--cyan); padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        #voice-hud { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 8px 35px; border-radius: 30px; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; }
        
        #hub-sidebar { position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: #000; border-left: 2px solid var(--cyan); z-index: 4000; transition: 0.3s; padding: 25px; }
        #hub-sidebar.active { right: 0; }
        
        #ocr-overlay { display:none; position:fixed; inset:0; background:#000; z-index:5000; }
        #camera-stream { width:100%; height:85%; object-fit:cover; }
    </style>
</head>
<body>

<div id="voice-hud">🎙️ IA: ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.85rem; color:var(--cyan)">MYZION <span style="color:var(--purple)">v47.0 FIX</span></div>
    <div style="display:flex; gap:5px;">
        <button class="t-btn" style="border-color:var(--green)" onclick="shareAsFile()">COMPARTIR 🔗</button>
        <button class="t-btn" onclick="toggleHub()">REPO ☰</button>
    </div>
</header>

<div class="toolbar">
    <button class="t-btn" onclick="exec('bold')">B</button>
    <button class="t-btn" onclick="exec('italic')">I</button>
    <button class="t-btn" onclick="exec('underline')">U</button>
    <button class="t-btn" style="color:var(--green)" onclick="leerTodo()">LEER</button>
</div>

<main class="workspace" id="canvas">
    <div class="page-sheet" contenteditable="true" id="p1" onfocus="activePage='p1'">
        <h1 style="text-align:center;">INFORME PROFESIONAL</h1>
        <p>Documento optimizado para visualización universal.</p>
    </div>
</main>

<div class="control-panel">
    <button class="t-btn" style="color:var(--green)" onclick="newPage()">+ PÁG</button>
    <button class="t-btn" style="color:var(--green)" onclick="insertTable()">+ TABLA</button>
    <button class="t-btn" onclick="startOCR()">OCR</button>
    <button id="mic-trigger" class="t-btn" style="border-color:var(--green)" onclick="toggleVoiceIA()">🎙️ VOZ IA</button>
</div>

<div style="background:#000; padding:12px; display:flex; gap:10px; border-top:1px solid #222;">
    <button class="t-btn" style="flex:1" onclick="saveDoc()">GUARDAR</button>
    <button class="t-btn" style="flex:1" onclick="exportPDF()">PDF</button>
    <button class="t-btn" style="flex:1" onclick="exportWord()">WORD</button>
</div>

<div id="ocr-overlay">
    <video id="camera-stream" autoplay playsinline></video>
    <div style="height:15%; display:flex; justify-content:space-around; align-items:center;">
        <button class="t-btn" onclick="stopOCR()">SALIR</button>
        <button class="t-btn" style="background:var(--purple); padding:15px;" onclick="snapText()">CAPTURAR</button>
    </div>
</div>

<script>
    let activePage = 'p1';
    let isListening = false;
    let selectedCell = null;
    let savedDocs = [];
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES'; recognition.continuous = true;

    function hablar(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; window.speechSynthesis.speak(m); }
    function exec(cmd) { document.execCommand(cmd, false, null); }

    function insertTable() {
        const id = "t" + Date.now();
        const wrap = document.createElement('div');
        wrap.className = 'word-table-wrapper'; wrap.contentEditable = "false"; wrap.id = id + "_w";
        wrap.innerHTML = `
            <div class="table-controls">
                <button class="btn-mini" onclick="addRow('${id}')">+ Fila</button>
                <button class="btn-mini" onclick="addCol('${id}')">+ Col</button>
                <button class="btn-mini" style="color:red" onclick="document.getElementById('${id}_w').remove()">Eliminar</button>
            </div>
            <table id="${id}">
                <tr><td contenteditable="true" onclick="selectCell(this)">...</td><td contenteditable="true" onclick="selectCell(this)">...</td></tr>
            </table>`;
        document.getElementById(activePage).appendChild(wrap);
    }

    function selectCell(c) {
        if(selectedCell) selectedCell.classList.remove('active-cell');
        selectedCell = c; selectedCell.classList.add('active-cell');
    }

    window.addRow = (id) => {
        const t = document.getElementById(id); const r = t.insertRow();
        for(let i=0; i<t.rows[0].cells.length; i++) {
            let c = r.insertCell(); c.contentEditable = "true"; c.innerText = "..."; c.onclick = () => selectCell(c);
        }
    };

    window.addCol = (id) => {
        const t = document.getElementById(id);
        Array.from(t.rows).forEach(r => {
            let c = r.insertCell(); c.contentEditable = "true"; c.innerText = "..."; c.onclick = () => selectCell(c);
        });
    };

    function toggleVoiceIA() {
        if(!isListening) { recognition.start(); isListening = true; document.getElementById('voice-hud').style.display = 'block'; }
        else { recognition.stop(); isListening = false; document.getElementById('voice-hud').style.display = 'none'; }
    }

    recognition.onresult = (e) => {
        const text = e.results[e.results.length - 1][0].transcript;
        if(selectedCell) selectedCell.innerText = text;
        else document.execCommand('insertText', false, text);
    };

    // --- CORRECCIÓN DE EXPORTACIÓN Y COMPARTIR ---
    function generateWordHTML() {
        const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset='utf-8'><style>
            table { border-collapse: collapse; width: 100%; margin: 10px 0; }
            td { border: 1px solid black; padding: 8px; font-family: 'Arial'; font-size: 11pt; }
            .table-controls { display: none; } /* Oculta controles en Word */
        </style></head><body>`;
        const footer = "</body></html>";
        return header + document.getElementById('canvas').innerHTML + footer;
    }

    function exportWord() {
        const blob = new Blob(['\ufeff', generateWordHTML()], { type: 'application/msword' });
        saveAs(blob, "Documento_Myzion.doc");
        hablar("Documento Word descargado.");
    }

    function exportPDF() {
        const doc = new jspdf.jsPDF();
        doc.text(document.getElementById(activePage).innerText, 15, 15);
        doc.save("Documento_Myzion.pdf");
    }

    async function shareAsFile() {
        hablar("Preparando archivo para compartir.");
        const html = generateWordHTML();
        const file = new File([html], "Myzion_Master.doc", { type: 'application/msword' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({
                    files: [file],
                    title: 'Documento Myzion',
                    text: 'Te envío mi documento de Myzion Master.'
                });
            } catch (err) { alert("Error al compartir: " + err); }
        } else {
            exportWord(); // Si no puede compartir el archivo, lo descarga automáticamente
            alert("Tu dispositivo no permite compartir archivos directamente, se ha descargado el archivo Word.");
        }
    }

    // --- FUNCIONES RESTANTES INTACTAS ---
    function newPage() {
        const id = 'p' + (document.querySelectorAll('.page-sheet').length + 1);
        const p = document.createElement('div');
        p.className = 'page-sheet'; p.contentEditable = "true"; p.id = id;
        p.onfocus = () => activePage = id;
        p.innerHTML = `<hr><small>PÁGINA ${id.slice(1)}</small>`;
        document.getElementById('canvas').appendChild(p); p.focus();
    }

    async function startOCR() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('camera-stream').srcObject = s;
        document.getElementById('ocr-overlay').style.display = 'block';
    }

    function stopOCR() {
        document.getElementById('camera-stream').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-overlay').style.display = 'none';
    }

    async function snapText() {
        hablar("Analizando...");
        const v = document.getElementById('camera-stream');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(activePage).innerHTML += `<p>${res.data.text}</p>`;
        stopOCR();
    }

    function saveDoc() {
        savedDocs.push({ name: "MYZ-"+new Date().toLocaleTimeString(), content: document.getElementById('canvas').innerHTML });
        updateHub(); hablar("Guardado en repositorio.");
    }

    function updateHub() {
        const l = document.getElementById('file-list'); l.innerHTML = "";
        savedDocs.forEach(d => {
            const b = document.createElement('div'); b.className = 't-btn'; b.style="margin-bottom:5px; display:block; text-align:left;";
            b.innerText = d.name; b.onclick = () => { document.getElementById('canvas').innerHTML = d.content; toggleHub(); };
            l.appendChild(b);
        });
    }

    function toggleHub() { document.getElementById('hub-sidebar').classList.toggle('active'); }
    function leerTodo() { hablar(document.getElementById(activePage).innerText); }
</script>
</body>
</html>
