<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYZION AI - Total Integration</title>
    <style>
        :root { --primary: #00ffff; --bg: #010409; --accent: #ff00ff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .bg-grid { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #0a192f 0%, #010409 100%); z-index: -1; }
        .grid-lines { position: fixed; width: 200%; height: 200%; background-image: linear-gradient(var(--primary) 1px, transparent 1px), linear-gradient(90deg, var(--primary) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.05; transform: perspective(500px) rotateX(60deg); animation: move 10s linear infinite; z-index: -1; }
        @keyframes move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 15px; font-size: 0.95rem; line-height: 1.5; border: 1px solid rgba(0,255,255,0.1); }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.03); border-left: 4px solid var(--primary); }
        .user { align-self: flex-end; background: var(--primary); color: #000; font-weight: bold; }

        .controls { background: rgba(0,0,0,0.9); padding: 20px; border-top: 1px solid var(--primary); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .nexus { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--primary); box-shadow: 0 0 20px var(--primary); cursor: pointer; transition: 0.4s; }
        .active { border-color: var(--accent); box-shadow: 0 0 35px var(--accent); transform: scale(1.1); }
        
        .input-box { width: 100%; display: flex; gap: 10px; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--primary); color: white; padding: 12px; border-radius: 10px; outline: none; }
        button { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="grid-lines"></div>

<div id="chat"></div>

<div class="controls">
    <div id="nexus" class="nexus" onclick="startVoice()"></div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Escribe tu comando o spot...">
        <button onclick="handleAction()">EJECUTAR</button>
    </div>
</div>

<script>
    // INTEGRACIÓN DE LLAVES
    const GEMINI_KEY = 'AIzaSyBf_shZMc7pa6q9BhX9i2njKW1G_O9Iegg';
    const NEW_KEY = '27fe664ce23ffcea6bb2f47db2443dcee9388a158424752d70f8e14f7e71b368'; // La llave que enviaste

    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const nexus = document.getElementById('nexus');
    let history = [];

    function addMsg(role, text) {
        const d = document.createElement('div');
        d.className = `msg ${role}`;
        d.innerHTML = text.replace(/\n/g, '<br>');
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    async function speak(text) {
        nexus.classList.add('active');
        // Usamos la nueva llave para ElevenLabs si es el caso
        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/pNInz6obpgDQGcFmaJgB`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'xi-api-key': NEW_KEY },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.8 }
                })
            });
            if(!response.ok) throw new Error();
            const blob = await response.blob();
            const audio = new Audio(URL.createObjectURL(blob));
            await audio.play();
        } catch (e) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'es-ES';
            window.speechSynthesis.speak(ut);
        } finally {
            nexus.classList.remove('active');
        }
    }

    async function handleAction() {
        const val = input.value.trim();
        if(!val) return;

        addMsg('user', val);
        input.value = '';
        nexus.classList.add('active');

        // Comandos Directos
        if(val.toLowerCase().includes("busca") || val.toLowerCase().includes("reproduce")) {
            let q = val.toLowerCase().replace(/busca|reproduce|youtube/gi, "").trim();
            window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`);
            return;
        }

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: history.concat([{ role: "user", parts: [{ text: val }] }]) })
            });
            const data = await response.json();
            const aiResp = data.candidates[0].content.parts[0].text;

            addMsg('ai', aiResp);
            await speak(aiResp);
            history.push({ role: "user", parts: [{ text: val }] }, { role: "model", parts: [{ text: aiResp }] });
        } catch (e) {
            addMsg('ai', "Error de conexión neuronal. Verifica si la llave está activa.");
        } finally {
            nexus.classList.remove('active');
        }
    }

    function startVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-ES';
        rec.onresult = (e) => { input.value = e.results[0][0].transcript; handleAction(); };
        rec.start();
    }

    window.onload = () => {
        const w = "MYZION AI Iniciada con nueva configuración de seguridad. ¿Qué misión tenemos hoy?";
        addMsg('ai', w);
        speak(w);
    };
</script>
</body>
</html>
