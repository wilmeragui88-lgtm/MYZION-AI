<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION MASTER | OMNI-WRITER v43.8</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER & TOOLBAR */
        header { padding: 12px 20px; background: #000; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .toolbar { background: #1a1d23; padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid #333; overflow-x: auto; }
        .t-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 14px; font-size: 0.65rem; cursor: pointer; border-radius: 4px; font-family: 'Orbitron'; white-space: nowrap; }

        /* DOCUMENTO ESTILO WORD */
        .workspace { flex: 1; overflow-y: auto; padding: 30px 10px; background: #111; display: flex; flex-direction: column; align-items: center; }
        .page-sheet { 
            background: #fff; color: #000; width: 100%; max-width: 850px; min-height: 1100px; 
            padding: 60px 50px; margin-bottom: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            outline: none; font-family: 'Arial', sans-serif; line-height: 1.6; position: relative;
        }

        /* TABLAS NATIVAS WORD REFORZADAS */
        .word-table-wrapper { margin: 25px 0; border: 1px solid #ddd; padding: 10px; background: #fdfdfd; border-radius: 6px; }
        .table-controls { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .btn-mini { background: #fff; border: 1px solid #ccc; color: #333; font-size: 10px; padding: 5px 10px; cursor: pointer; font-family: Arial; font-weight: bold; border-radius: 3px; }
        .btn-danger { color: #d00 !important; border-color: #d00 !important; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: #fff; border: 1.5px solid #000; }
        th, td { border: 1px solid #000; padding: 12px; min-height: 40px; word-break: break-word; font-size: 14px; color: #000; }
        .active-cell { outline: 3px solid var(--cyan) !important; background: rgba(0, 242, 255, 0.08) !important; }

        /* INTERFAZ IA */
        .control-panel { background: #000; border-top: 2px solid var(--cyan); padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        #voice-hud { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 8px 35px; border-radius: 30px; font-size: 0.7rem; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; }

        #hub-sidebar { position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: rgba(5,7,10,0.98); border-left: 2px solid var(--cyan); z-index: 4000; transition: 0.4s; padding: 25px; }
        #hub-sidebar.active { right: 0; }
        
        #ocr-overlay { display:none; position:fixed; inset:0; background:#000; z-index:5000; }
        #camera-stream { width:100%; height:85%; object-fit:cover; }
    </style>
</head>
<body>

<div id="voice-hud">🎙️ IA: ESCUCHANDO PARA LLENAR TABLA...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.85rem; color:var(--cyan)">MYZION <span style="color:var(--purple)">MASTER PRO</span></div>
    <button class="t-btn" onclick="toggleHub()">REPOSITORIO ☰</button>
</header>

<div class="toolbar">
    <button class="t-btn" onclick="exec('bold')">B</button>
    <button class="t-btn" onclick="exec('italic')">I</button>
    <button class="t-btn" onclick="exec('underline')">U</button>
    <button class="t-btn" style="color:var(--green)" onclick="leerDocumento()">LEER TODO</button>
    <button class="t-btn" onclick="document.getElementById('img-input').click()">SUBIR IMAGEN</button>
    <input type="file" id="img-input" hidden accept="image/*" onchange="uploadImg(this)">
</div>

<div id="hub-sidebar">
    <h2 style="color:var(--cyan); font-family:'Orbitron';">ARCHIVOS</h2>
    <div id="file-list"></div>
    <button class="t-btn" style="width:100%; margin-top:20px;" onclick="toggleHub()">CERRAR</button>
</div>

<main class="workspace" id="canvas">
    <div class="page-sheet" contenteditable="true" id="p1" onfocus="activePage='p1'">
        <h1 style="text-align:center; font-family:'Orbitron'; margin-top:40px;">PROYECTO OMNI-WRITER</h1>
        <p>Seleccione una celda y active la voz para llenarla automáticamente.</p>
    </div>
</main>

<div class="control-panel">
    <button class="t-btn" style="color:var(--green)" onclick="createNewPage()">+ PÁGINA</button>
    <button class="t-btn" style="color:var(--green)" onclick="insertSmartWordTable()">+ TABLA WORD</button>
    <button class="t-btn" onclick="startOCR()">OCR</button>
    <button id="mic-trigger" class="t-btn" style="border-color:var(--green)" onclick="toggleVoiceIA()">🎙️ VOZ IA</button>
</div>

<div style="background:#000; padding:12px; display:flex; gap:10px; border-top:1px solid #222;">
    <button class="t-btn" style="flex:1" onclick="saveDoc()">GUARDAR</button>
    <button class="t-btn" style="flex:1" onclick="exportFile('pdf')">PDF</button>
    <button class="t-btn" style="flex:1" onclick="exportFile('doc')">WORD</button>
</div>

<div id="ocr-overlay">
    <video id="camera-stream" autoplay playsinline></video>
    <div style="height:15%; display:flex; justify-content:space-around; align-items:center;">
        <button class="t-btn" onclick="stopOCR()">SALIR</button>
        <button class="t-btn" style="background:var(--purple); padding:15px;" onclick="snapText()">CAPTURAR</button>
    </div>
</div>

<script>
    let activePage = 'p1';
    let isListening = false;
    let selectedCell = null;
    let savedDocs = [];
    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES'; recognition.continuous = true;

    function hablar(t) { synth.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; synth.speak(m); }
    function exec(cmd) { document.execCommand(cmd, false, null); }

    // --- TABLAS WORD DINÁMICAS ---
    function insertSmartWordTable() {
        const tid = "tab_" + Date.now();
        const wrapper = document.createElement('div');
        wrapper.className = 'word-table-wrapper';
        wrapper.contentEditable = "false";
        wrapper.id = tid + "_wrap";

        wrapper.innerHTML = `
            <div class="table-controls">
                <button class="btn-mini" onclick="addRow('${tid}')">+ Fila</button>
                <button class="btn-mini" onclick="addCol('${tid}')">+ Columna</button>
                <button class="btn-mini btn-danger" onclick="document.getElementById('${tid}_wrap').remove()">Borrar Tabla</button>
            </div>
            <table id="${tid}">
                <tr><td contenteditable="true" onclick="selectCell(this)">...</td><td contenteditable="true" onclick="selectCell(this)">...</td></tr>
            </table>
        `;
        document.getElementById(activePage).appendChild(wrapper);
        hablar("Tabla Word lista. Toca una celda para dictar.");
    }

    function selectCell(cell) {
        if(selectedCell) selectedCell.classList.remove('active-cell');
        selectedCell = cell;
        selectedCell.classList.add('active-cell');
    }

    window.addRow = function(id) {
        const t = document.getElementById(id);
        const r = t.insertRow();
        for(let i=0; i<t.rows[0].cells.length; i++) {
            let c = r.insertCell(); 
            c.contentEditable = "true"; 
            c.innerText = "...";
            c.onclick = () => selectCell(c);
        }
    };

    window.addCol = function(id) {
        const t = document.getElementById(id);
        Array.from(t.rows).forEach(r => {
            let c = r.insertCell(); 
            c.contentEditable = "true"; 
            c.innerText = "...";
            c.onclick = () => selectCell(c);
        });
    };

    // --- VOZ IA (LLENADO DE TABLAS Y TEXTO) ---
    function toggleVoiceIA() {
        if(!isListening) {
            recognition.start(); isListening = true;
            document.getElementById('voice-hud').style.display = 'block';
            document.getElementById('mic-trigger').style.background = 'var(--green)';
            hablar("Escuchando.");
        } else {
            recognition.stop(); isListening = false;
            document.getElementById('voice-hud').style.display = 'none';
            document.getElementById('mic-trigger').style.background = 'transparent';
        }
    }

    recognition.onresult = (e) => {
        const text = e.results[e.results.length - 1][0].transcript;
        if(selectedCell) {
            selectedCell.innerText = text;
        } else {
            document.execCommand('insertText', false, text);
        }
    };

    // --- FUNCIONES COMPLETAS ---
    function createNewPage() {
        const id = 'p' + (document.querySelectorAll('.page-sheet').length + 1);
        const p = document.createElement('div');
        p.className = 'page-sheet'; p.contentEditable = "true"; p.id = id;
        p.onfocus = () => activePage = id;
        p.innerHTML = `<h3>PÁGINA ${id.slice(1)}</h3>`;
        document.getElementById('canvas').appendChild(p);
        p.focus();
    }

    async function startOCR() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('camera-stream').srcObject = s;
        document.getElementById('ocr-overlay').style.display = 'block';
    }

    function stopOCR() {
        document.getElementById('camera-stream').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-overlay').style.display = 'none';
    }

    async function snapText() {
        hablar("Procesando imagen.");
        const v = document.getElementById('camera-stream');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(activePage).innerHTML += `<p>${res.data.text}</p>`;
        stopOCR(); hablar("Texto capturado.");
    }

    function saveDoc() {
        savedDocs.push({ name: "DOC-"+Date.now(), content: document.getElementById('canvas').innerHTML });
        updateHub(); hablar("Guardado.");
    }

    function updateHub() {
        const l = document.getElementById('file-list'); l.innerHTML = "";
        savedDocs.forEach(d => {
            const b = document.createElement('div'); b.className = 't-btn'; b.style="margin-bottom:5px; display:block;";
            b.innerText = d.name; b.onclick = () => { document.getElementById('canvas').innerHTML = d.content; toggleHub(); };
            l.appendChild(b);
        });
    }

    function toggleHub() { document.getElementById('hub-sidebar').classList.toggle('active'); }
    function leerDocumento() { hablar(document.getElementById(activePage).innerText); }

    function exportFile(type) {
        const content = document.getElementById(activePage).innerText;
        if(type === 'pdf') {
            const doc = new jspdf.jsPDF();
            doc.text(content, 10, 10); doc.save("Myzion.pdf");
        } else {
            const blob = new Blob(['\ufeff', document.getElementById('canvas').innerHTML], {type: 'application/msword'});
            saveAs(blob, "Myzion.doc");
        }
    }

    function uploadImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result; img.style.maxWidth = "100%";
                document.getElementById(activePage).appendChild(img);
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
