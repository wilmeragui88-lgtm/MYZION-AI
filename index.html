<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | OMNI-SENTINEL v51.2</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a; --glass: rgba(15, 17, 21, 0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { margin: 0; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #boot-layer { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .pulse-btn { background: none; border: 2px solid var(--green); color: var(--green); padding: 25px 50px; font-family: 'Orbitron'; font-size: 1.2rem; cursor: pointer; transition: 0.4s; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 255, 157, 0.2); }

        header { padding: 12px 20px; background: #000; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .toolbar { background: #1a1d23; padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #333; overflow-x: auto; }
        .tool-group { display: flex; gap: 5px; border-right: 1px solid #444; padding-right: 10px; align-items: center; }
        .t-btn { background: #222; border: 1px solid #444; color: #fff; padding: 6px 10px; font-size: 0.65rem; cursor: pointer; border-radius: 3px; font-family: 'Orbitron'; }

        .workspace { flex: 1; overflow-y: auto; padding: 40px 15px; display: flex; flex-direction: column; align-items: center; gap: 30px; background: #111; }
        .page-wrapper { position: relative; width: 100%; max-width: 850px; margin-bottom: 40px; }
        .page-sheet { background: #fff; color: #000; width: 100%; min-height: 1100px; padding: 70px; border-radius: 2px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; font-family: 'Arial', sans-serif; line-height: 1.6; outline: none; }
        
        .table-container { width: 100%; margin: 25px 0; padding: 12px; background: #f4f6f8; border: 1px solid #ccc; border-radius: 6px; cursor: move; }
        table { width: 100%; border-collapse: collapse; background: #fff; border: 2.5px solid #222; }
        th, td { border: 1px solid #bbb; padding: 12px; min-width: 90px; }
        .active-cell { border: 2.5px solid var(--cyan) !important; background: rgba(0,242,255,0.1) !important; }

        .control-panel { background: #000; border-top: 2px solid var(--cyan); padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        #voice-hud { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 8px 30px; border-radius: 30px; font-size: 0.7rem; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; }
        
        #hub-sidebar { position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: var(--glass); border-left: 2px solid var(--cyan); z-index: 2000; transition: 0.5s; padding: 25px; }
        #hub-sidebar.active { right: 0; }
        
        #ocr-overlay { display:none; position:fixed; inset:0; background:#000; z-index:5000; }
        video { width:100%; height:80%; object-fit:cover; }
    </style>
</head>
<body>

<div id="boot-layer">
    <h1 style="color:var(--cyan); font-family:'Orbitron';">MYZION v51.2</h1>
    <button class="pulse-btn" onclick="startSupremeSystem()">INICIALIZAR SISTEMA</button>
</div>

<div id="voice-hud">IA: ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.85rem; color:var(--cyan)">MYZION <span style="color:var(--purple)">SENTINEL</span></div>
    <button class="t-btn" onclick="toggleHub()">MIS ARCHIVOS ☰</button>
</header>

<div class="toolbar">
    <div class="tool-group">
        <select onchange="document.execCommand('fontName', false, this.value)">
            <option value="Arial">Arial</option>
            <option value="Verdana">Verdana</option>
        </select>
        <button class="t-btn" onclick="document.execCommand('bold')">B</button>
        <input type="color" onchange="document.execCommand('foreColor', false, this.value)">
    </div>
    <button class="t-btn" style="color:var(--green)" onclick="readAloud()">LECTURA IA</button>
</div>

<main class="workspace" id="main-canvas">
    <div class="page-wrapper" id="wrap-p1">
        <div class="page-sheet" contenteditable="true" id="p1" onfocus="activePage='p1'">
            <h1 style="text-align:center; font-family:'Orbitron';">SISTEMA LISTO</h1>
            <p>Toque aquí para empezar...</p>
        </div>
    </div>
</main>

<div class="control-panel">
    <button class="t-btn" style="color:var(--green)" onclick="createNewPage()">+ PÁGINA</button>
    <button class="t-btn" style="color:var(--green)" onclick="insertHybridTable()">+ TABLA EXCEL</button>
    <button class="t-btn" onclick="initOCR()">OCR SCAN</button>
    <button class="t-btn" style="color:var(--purple)" onclick="shareDoc()">COMPARTIR</button>
    <button id="mic-trigger" class="t-btn" style="grid-column: span 4; border-color: var(--green); padding:15px;" onclick="toggleDictation()">ACTIVAR VOZ MAESTRA</button>
</div>

<div id="hub-sidebar">
    <h3 style="color:var(--cyan); font-family:'Orbitron'; font-size:0.7rem;">REPOSITORIO</h3>
    <div id="file-index"></div>
    <button class="t-btn" style="width:100%; margin-top:20px;" onclick="toggleHub()">CERRAR</button>
</div>

<div id="ocr-overlay">
    <video id="camera-stream" autoplay playsinline></video>
    <button class="t-btn" onclick="captureText()" style="position:absolute; bottom:20px; right:20px; background:var(--purple); padding:20px;">CAPTURAR</button>
    <button class="t-btn" onclick="closeOCR()" style="position:absolute; bottom:20px; left:20px;">CERRAR</button>
</div>

<script>
    let activePage = 'p1';
    let isListening = false;
    let selectedCell = null;
    let fileHistory = [];
    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES'; recognition.continuous = true;

    function hablar(t) {
        synth.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'es-ES';
        synth.speak(m);
    }

    function startSupremeSystem() {
        document.getElementById('boot-layer').style.display = 'none';
        hablar("Myzion v51.2 iniciado correctamente. Todas las funciones de Word, Excel y OCR están listas. Toque la pantalla para comenzar su proyecto.");
    }

    function createNewPage() {
        const id = 'p' + Date.now();
        const wrapId = 'wrap-' + id;
        const pageCount = document.querySelectorAll('.page-sheet').length + 1;
        const wrap = document.createElement('div');
        wrap.className = 'page-wrapper'; wrap.id = wrapId;
        wrap.innerHTML = `<div class="page-sheet" contenteditable="true" id="${id}" onfocus="activePage='${id}'"><p>Página ${pageCount}</p></div><button style="position:absolute; right:-40px; top:10px; background:red; color:white; border:none; border-radius:50%; cursor:pointer;" onclick="deletePage('${wrapId}')">X</button>`;
        document.getElementById('main-canvas').appendChild(wrap);
        hablar("Nueva página creada. Total: " + pageCount);
    }

    function deletePage(wid) {
        if(document.querySelectorAll('.page-sheet').length > 1) {
            document.getElementById(wid).remove();
            hablar("Página eliminada.");
        }
    }

    function insertHybridTable() {
        const tid = "tab_" + Date.now();
        const html = `<div id="${tid}_container" class="table-container" draggable="true" ondragstart="drag(event)" contenteditable="false"><table><tr style="background:#eee;"><th contenteditable="true">A</th><th contenteditable="true">B</th></tr><tr><td contenteditable="true">...</td><td contenteditable="true">...</td></tr></table><button class="t-btn" onclick="addRow('${tid}')">+ Fila</button></div>`;
        document.getElementById(activePage).innerHTML += html;
        hablar("Tabla insertada.");
    }

    function addRow(id) {
        const t = document.querySelector(`#${id}`);
        const r = t.insertRow(-1);
        for(let i=0; i<t.rows[0].cells.length; i++) r.insertCell(i).contentEditable = "true";
    }

    function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
    document.getElementById('main-canvas').ondragover = (e) => e.preventDefault();
    document.getElementById('main-canvas').ondrop = (e) => {
        e.preventDefault();
        const data = e.dataTransfer.getData("text");
        if(e.target.classList.contains('page-sheet')) e.target.appendChild(document.getElementById(data));
    };

    function toggleDictation() {
        const btn = document.getElementById('mic-trigger');
        const hud = document.getElementById('voice-hud');
        if(!isListening) {
            recognition.start(); isListening = true;
            btn.style.background = "#00ff9d"; btn.style.color = "#000";
            hud.style.display = 'block'; hablar("Escuchando.");
        } else {
            recognition.stop(); isListening = false;
            btn.style.background = "#111"; btn.style.color = "#fff";
            hud.style.display = 'none'; hablar("Pausa.");
        }
    }

    recognition.onresult = (e) => {
        const t = e.results[e.results.length - 1][0].transcript;
        if(selectedCell) selectedCell.innerText = t;
        else document.execCommand('insertText', false, " " + t);
    };

    document.addEventListener('click', (e) => {
        if(e.target.tagName === 'TD' || e.target.tagName === 'TH') {
            if(selectedCell) selectedCell.classList.remove('active-cell');
            selectedCell = e.target;
            selectedCell.classList.add('active-cell');
        }
    });

    async function initOCR() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('camera-stream').srcObject = s;
        document.getElementById('ocr-overlay').style.display = 'block';
    }

    function closeOCR() {
        document.getElementById('camera-stream').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-overlay').style.display = 'none';
    }

    async function captureText() {
        const v = document.getElementById('camera-stream');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(activePage).innerText += "\n" + res.data.text;
        closeOCR(); hablar("Texto procesado.");
    }

    function saveToHub() {
        const time = new Date().toLocaleTimeString();
        fileHistory.push({ name: "DOC-" + time, data: document.getElementById('main-canvas').innerHTML });
        updateFileList();
        hablar(`Guardado. El documento tiene ${document.querySelectorAll('.page-sheet').length} páginas y ${document.querySelectorAll('table').length} tablas.`);
    }

    function updateFileList() {
        const list = document.getElementById('file-index');
        list.innerHTML = "";
        fileHistory.forEach(f => {
            const d = document.createElement('div');
            d.style = "padding:10px; border-bottom:1px solid #333; color:var(--cyan); cursor:pointer;";
            d.innerText = f.name;
            d.onclick = () => { document.getElementById('main-canvas').innerHTML = f.data; toggleHub(); };
            list.appendChild(d);
        });
    }

    function toggleHub() { document.getElementById('hub-sidebar').classList.toggle('active'); }
    function readAloud() { hablar(document.getElementById(activePage).innerText); }
    function exportPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text(document.getElementById(activePage).innerText.substring(0,1000), 10, 10); doc.save("Myzion.pdf"); }
    async function shareDoc() { if(navigator.share) await navigator.share({ title: 'Myzion', text: document.getElementById(activePage).innerText }); }
</script>
</body>
</html>
