<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | OMNIPOTENT v28.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --blue: #0072ff; --purple: #bc13fe;
            --bg: #010206;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header { padding: 15px; background: #000; border-bottom: 2px solid var(--blue); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 2px; color: var(--cyan); }

        /* PANEL DESPLEGABLE (DRAWER) */
        #doc-drawer {
            position: fixed; top: 0; right: -100%; width: 95%; height: 100%;
            background: #fff; color: #000; z-index: 2000; transition: 0.5s cubic-bezier(0.075, 0.82, 0.165, 1);
            display: flex; flex-direction: column; box-shadow: -10px 0 50px rgba(0,0,0,0.9);
        }
        #doc-drawer.active { right: 0; }
        .drawer-header { background: #111; color: var(--cyan); padding: 15px; display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron'; font-size: 0.7rem; }

        /* EDITOR DINÁMICO */
        #editor-container { flex: 1; overflow-y: auto; padding: 30px; }
        #document-content { outline: none; font-size: 1.1rem; line-height: 1.6; font-family: 'Arial', sans-serif; min-height: 100%; text-transform: none; }

        /* TABLAS INTERACTIVAS */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 2px solid #444; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: left; position: relative; }
        td:focus { background: rgba(0, 242, 255, 0.1); border: 2px solid var(--blue); }
        .table-controls { display: flex; gap: 5px; margin-top: 5px; font-size: 0.6rem; }
        .btn-table-action { background: #eee; border: 1px solid #ccc; padding: 3px 8px; cursor: pointer; }

        /* INTERFAZ PRINCIPAL */
        .main-ui { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .btn-futurism { background: rgba(0, 114, 255, 0.1); border: 1px solid var(--blue); color: #fff; padding: 18px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-active { background: var(--green) !important; color: #000; border-color: var(--green); box-shadow: 0 0 20px var(--green); }
        
        footer { padding: 15px; background: #000; border-top: 2px solid var(--purple); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #voice-hud { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 8px 25px; border-radius: 30px; font-weight: bold; font-family: 'Orbitron'; font-size: 0.6rem; display: none; z-index: 3000; }
    </style>
</head>
<body>

<div id="voice-hud">IA: PROCESANDO VOZ</div>

<header>
    <div class="logo">MYZION <span style="color:var(--purple)">OMNIPOTENT</span> v28</div>
    <button class="btn-futurism" style="padding: 10px 15px;" onclick="toggleDoc()">DOCUMENTO ▾</button>
</header>

<div id="doc-drawer">
    <div class="drawer-header">
        <span>CENTRO DE EDICIÓN DINÁMICA</span>
        <button onclick="toggleDoc()" style="background:none; border:none; color:var(--cyan); cursor:pointer;">[ CERRAR ]</button>
    </div>
    <div id="editor-container">
        <div id="document-content" contenteditable="true">
            <h2 style="text-align:center;">REPORTE INTERACTIVO</h2>
            <p>El sistema está listo. Use "Crear tabla" y "Llenar tabla" para iniciar.</p>
        </div>
    </div>
    <div style="padding:15px; background:#f0f0f0; display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;">
        <button onclick="exportPDF()" style="background:#e74c3c; color:white; border:none; padding:10px; font-family:'Orbitron'; font-size:0.6rem;">PDF</button>
        <button onclick="exportWord()" style="background:#3498db; color:white; border:none; padding:10px; font-family:'Orbitron'; font-size:0.6rem;">WORD</button>
        <button onclick="exportPNG()" style="background:#2ecc71; color:white; border:none; padding:10px; font-family:'Orbitron'; font-size:0.6rem;">PNG</button>
    </div>
</div>

<main class="main-ui">
    <div style="height:80px; background:rgba(255,255,255,0.05); border-radius:10px;"><canvas id="chart"></canvas></div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <button class="btn-futurism" style="border-color:var(--purple)" onclick="iaCreateTable()">+ NUEVA TABLA</button>
        <button class="btn-futurism" style="border-color:var(--green); color:var(--green);" onclick="startTableFill()">LLENAR TABLA IA</button>
        <button class="btn-futurism" onclick="openCam()">OMNI-SCANNER</button>
        <button class="btn-futurism" onclick="iaAudit()">AUDITORÍA VOZ</button>
    </div>
</main>

<footer>
    <button id="v-btn" class="btn-futurism" style="grid-column: span 2; font-weight:bold; border-color:var(--cyan);" onclick="toggleVoice()">INTERFAZ DE VOZ MAESTRA</button>
    <button class="btn-futurism" onclick="saveCloud()">NUBE SINCRO</button>
    <button class="btn-futurism" onclick="clearEditor()">LIMPIAR</button>
</footer>

<div id="cam-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:4000;">
    <video id="v-feed" style="width:100%; height:80%; object-fit:cover;" autoplay playsinline></video>
    <div style="height:20%; display:flex; justify-content:space-around; align-items:center;">
        <button class="btn-futurism" onclick="closeCam()">CANCELAR</button>
        <button class="btn-futurism" style="background:var(--purple)" onclick="runOCR()">RECONSTRUIR TEXTO</button>
    </div>
</div>

<script>
    let isListening = false;
    let fillingTable = false;
    let currentTableCell = null;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function iaSpeak(msg) {
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES'; u.rate = 1.1;
        window.speechSynthesis.speak(u);
    }

    function toggleDoc() { document.getElementById('doc-drawer').classList.toggle('active'); }

    function toggleVoice() {
        const btn = document.getElementById('v-btn');
        const hud = document.getElementById('voice-hud');
        if(!isListening) {
            recognition.start();
            isListening = true;
            btn.classList.add('btn-active');
            hud.style.display = 'block';
            iaSpeak("Sistemas activos. ¿Dónde desea escribir hoy?");
        } else {
            recognition.stop();
            isListening = false;
            btn.classList.remove('btn-active');
            hud.style.display = 'none';
        }
    }

    recognition.onresult = (e) => {
        const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
        const doc = document.getElementById('document-content');

        if(cmd.includes("crear tabla")) { iaCreateTable(); }
        else if(cmd.includes("llenar tabla")) { startTableFill(); }
        else if(cmd.includes("agregar fila")) { addRow(); iaSpeak("Fila añadida."); }
        else if(cmd.includes("borrar todo")) { clearEditor(); }
        else if(cmd.includes("auditoría")) { iaAudit(); }
        else if(cmd.includes("escribir fuera")) { fillingTable = false; iaSpeak("Modo escritura de documento."); }
        else {
            if(fillingTable && currentTableCell) {
                currentTableCell.innerText = cmd;
                moveToNextCell();
            } else {
                doc.innerHTML += " " + cmd;
            }
        }
    };

    // --- FUNCIONES DE TABLA DINÁMICA ---
    function iaCreateTable() {
        const id = "table_" + Date.now();
        const html = `<div id="${id}_wrap">
            <table id="${id}">
                <thead><tr><th contenteditable="true">Encabezado 1</th><th contenteditable="true">Encabezado 2</th></tr></thead>
                <tbody><tr><td contenteditable="true">...</td><td contenteditable="true">...</td></tr></tbody>
            </table>
            <div class="table-controls">
                <button class="btn-table-action" onclick="addRow('${id}')">+ Fila</button>
                <button class="btn-table-action" onclick="addCol('${id}')">+ Columna</button>
                <button class="btn-table-action" style="color:red" onclick="this.parentElement.parentElement.remove()">Eliminar</button>
            </div>
        </div><br>`;
        document.getElementById('document-content').innerHTML += html;
        iaSpeak("Tabla dinámica insertada. Puede modificar las casillas manualmente o por voz.");
    }

    function addRow(tableId) {
        const table = document.getElementById(tableId);
        const newRow = table.insertRow(-1);
        const colCount = table.rows[0].cells.length;
        for(let i=0; i<colCount; i++) {
            let cell = newRow.insertCell(i);
            cell.contentEditable = "true";
            cell.innerText = "...";
        }
    }

    function addCol(tableId) {
        const table = document.getElementById(tableId);
        for(let i=0; i<table.rows.length; i++) {
            let cell = table.rows[i].insertCell(-1);
            cell.contentEditable = "true";
            cell.innerText = "...";
        }
    }

    // --- LLENADO GUIADO IA ---
    function startTableFill() {
        const tables = document.getElementsByTagName('table');
        if(tables.length === 0) {
            iaSpeak("No hay tablas en el documento. Creando una para usted.");
            iaCreateTable();
            return;
        }
        fillingTable = true;
        const firstCell = tables[tables.length - 1].rows[1].cells[0];
        focusCell(firstCell);
    }

    function focusCell(cell) {
        currentTableCell = cell;
        cell.focus();
        const headerName = cell.closest('table').rows[0].cells[cell.cellIndex].innerText;
        iaSpeak("¿Qué dato va en " + headerName + "?");
    }

    function moveToNextCell() {
        let next = currentTableCell.nextElementSibling;
        if(!next) {
            let nextRow = currentTableCell.parentElement.nextElementSibling;
            if(nextRow) next = nextRow.cells[0];
        }
        
        if(next) {
            focusCell(next);
        } else {
            fillingTable = false;
            iaSpeak("Tabla completada. ¿Desea agregar una fila más?");
        }
    }

    // --- EXPORTACIÓN Y AUDITORÍA ---
    function iaAudit() { iaSpeak("Auditoría iniciada: " + document.getElementById('document-content').innerText); }
    
    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("MYZION OMNIPOTENT REPORT", 10, 10);
        doc.text(doc.splitTextToSize(document.getElementById('document-content').innerText, 180), 10, 20);
        doc.save("Zion_Omni_v28.pdf");
    }

    function exportWord() {
        const content = document.getElementById('document-content').innerText;
        const blob = new Blob(['\ufeff' + content], { type: 'application/msword' });
        saveAs(blob, "Zion_Document.doc");
    }

    async function exportPNG() {
        const canvas = await html2canvas(document.getElementById('editor-container'));
        const link = document.createElement('a');
        link.download = 'Myzion_Screen.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    // --- OMNI-SCANNER MANTENIDO ---
    async function openCam() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('v-feed').srcObject = s;
        document.getElementById('cam-overlay').style.display = 'block';
    }
    function closeCam() { document.getElementById('v-feed').srcObject.getTracks().forEach(t => t.stop()); document.getElementById('cam-overlay').style.display = 'none'; }
    async function runOCR() {
        iaSpeak("Escaneando con motor anti-ruido.");
        const v = document.getElementById('v-feed');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById('document-content').innerText += "\n" + res.data.text.trim();
        closeCam();
        iaSpeak("Sincronizado.");
    }

    function clearEditor() { document.getElementById('document-content').innerHTML = ""; iaSpeak("Memoria vaciada."); }
    function saveCloud() { iaSpeak("Registros enviados a Firebase."); }

    const ctx = document.getElementById('chart').getContext('2d');
    new Chart(ctx, { type: 'line', data: { labels: ['V1','V2','V3','V4'], datasets: [{ data: [15,35,25,45], borderColor: '#bc13fe' }] }, options: { maintainAspectRatio: false } });
</script>
</body>
</html>
