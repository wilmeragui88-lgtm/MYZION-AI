<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYZION AI - Sistema Integrado Total</title>
    <style>
        :root { --primary: #00ffff; --bg: #02050a; --panel: rgba(10, 17, 31, 0.95); }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--primary); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 1s ease; }
        
        /* Fondo Cyberpunk */
        .grid { position: fixed; width: 200%; height: 200%; background-image: linear-gradient(var(--primary) 1px, transparent 1px), linear-gradient(90deg, var(--primary) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.05; transform: perspective(500px) rotateX(60deg); z-index: -1; animation: moveGrid 15s linear infinite; }
        @keyframes moveGrid { from { transform: translateY(0); } to { transform: translateY(50px); } }

        /* Interfaz */
        .header { padding: 10px; text-align: center; border-bottom: 1px solid rgba(0, 255, 255, 0.2); background: rgba(0,0,0,0.8); z-index: 10; }
        h1 { margin: 0; letter-spacing: 5px; font-size: 1.1rem; text-shadow: 0 0 10px var(--primary); }

        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .user-msg { align-self: flex-end; background: rgba(0, 255, 255, 0.1); border: 1px solid var(--primary); color: #fff; }
        .ai-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); }

        /* Panel de Tareas */
        .task-panel { background: rgba(0, 255, 255, 0.05); border: 1px dashed var(--primary); margin: 10px; padding: 10px; border-radius: 8px; font-size: 0.8rem; }
        .task-panel ul { margin: 5px 0; padding-left: 20px; }

        /* Núcleo Visualizador */
        .core-box { display: flex; justify-content: center; align-items: center; padding: 10px; }
        .core { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary); transition: 0.4s; }
        .listening { border-color: #00ff00; box-shadow: 0 0 30px #00ff00; transform: scale(1.2); }
        .thinking { border-color: #ffaa00; animation: pulse 0.8s infinite alternate; }
        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; transform: scale(1.1); } }

        /* Controles */
        .controls { background: #0a111f; padding: 12px; display: flex; gap: 8px; border-top: 1px solid var(--primary); }
        input { flex: 1; background: #111a2e; border: 1px solid var(--primary); color: white; padding: 10px; border-radius: 5px; outline: none; }
        button { background: var(--primary); color: #000; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-reset { background: #ff4444; color: white; }
    </style>
</head>
<body>

<div class="grid"></div>
<div class="header"><h1>MYZION AI - CORE INTEGRATED</h1></div>

<div class="task-panel">
    <strong>📌 TAREAS ACTIVAS:</strong>
    <ul id="task-list"></ul>
</div>

<div id="chat" class="chat-area"></div>

<div class="core-box">
    <div id="core" class="core"></div>
</div>

<div class="controls">
    <button onclick="activarVoz()">🎙️</button>
    <input type="text" id="userInput" placeholder="Escribe un comando o pregunta...">
    <button onclick="handleSend()">ENVIAR</button>
    <button class="btn-reset" onclick="resetMemory()">RESET</button>
</div>

<script>
    // --- CONFIGURACIÓN E INICIALIZACIÓN ---
    const API_KEY = 'AIzaSyBf_shZMc7pa6q9BhX9i2njKW1G_O9Iegg';
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const core = document.getElementById('core');
    const taskListUI = document.getElementById('task-list');

    let chatHistory = []; // Memoria de la sesión actual

    // --- FUNCIONES DE VOZ ---
    function hablar(texto) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = 'es-ES';
        msg.onend = () => core.classList.remove('thinking');
        window.speechSynthesis.speak(msg);
    }

    function activarVoz() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Navegador no compatible.");
        const rec = new Speech();
        rec.lang = 'es-ES';
        rec.onstart = () => core.classList.add('listening');
        rec.onend = () => core.classList.remove('listening');
        rec.onresult = (e) => {
            input.value = e.results[0][0].transcript;
            handleSend();
        };
        rec.start();
    }

    // --- GESTIÓN DE TAREAS Y MEMORIA ---
    function updateTasks() {
        const tasks = JSON.parse(localStorage.getItem('myzion_tasks')) || [];
        taskListUI.innerHTML = tasks.length ? "" : "<li>No hay pendientes.</li>";
        tasks.forEach(t => { taskListUI.innerHTML += `<li>${t}</li>`; });
    }

    function saveTask(texto) {
        let tasks = JSON.parse(localStorage.getItem('myzion_tasks')) || [];
        tasks.push(texto);
        localStorage.setItem('myzion_tasks', JSON.stringify(tasks));
        updateTasks();
    }

    function resetMemory() {
        if(confirm("¿Reiniciar MYZION? Se borrarán tareas y chat.")) {
            localStorage.clear();
            location.reload();
        }
    }

    // --- LÓGICA DE APPS ---
    function abrirApp(url) {
        const win = window.open(url, '_blank');
        if (!win) alert("Permite las ventanas emergentes para abrir aplicaciones.");
    }

    // --- PROCESAMIENTO E IA ---
    function addMsg(role, text) {
        const d = document.createElement('div');
        d.className = `msg ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
        d.innerText = text;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    async function handleSend() {
        const rawText = input.value.trim();
        if(!rawText) return;

        addMsg('user', rawText);
        input.value = '';
        core.classList.add('thinking');

        const lowText = rawText.toLowerCase();

        // 1. Comandos Locales Inmediatos
        if (lowText.includes("añadir tarea") || lowText.includes("recordar")) {
            let t = rawText.replace(/añadir tarea|recordar/gi, "").trim();
            saveTask(t);
            const r = "He guardado tu tarea: " + t;
            addMsg('ai', r); hablar(r);
            return;
        }

        if (lowText.includes("youtube") || lowText.includes("reproduce")) {
            let q = lowText.replace("busca en youtube", "").replace("reproduce", "").trim();
            abrirApp(`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`);
            const r = "Abriendo YouTube para buscar " + q;
            addMsg('ai', r); hablar(r);
            return;
        }

        if (lowText.includes("modo guerra")) { document.body.style.background = "#300"; addMsg('ai', "Modo alerta activa."); return; }

        // 2. Consulta a IA Avanzada (Gemini)
        chatHistory.push({ role: "user", parts: [{ text: rawText }] });

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: chatHistory })
            });

            const data = await res.json();
            const aiText = data.candidates[0].content.parts[0].text;

            addMsg('ai', aiText);
            hablar(aiText);
            chatHistory.push({ role: "model", parts: [{ text: aiText }] });

        } catch (e) {
            addMsg('ai', "Error de conexión neuronal.");
        } finally {
            core.classList.remove('thinking');
        }
    }

    // --- INICIO ---
    window.onload = () => {
        updateTasks();
        const intro = "Sistema MYZION en línea. Soy tu IA avanzada. Puedo gestionar tus tareas, abrir aplicaciones y razonar contigo. ¿Qué misión tenemos hoy?";
        addMsg('ai', intro);
        hablar(intro);
    };

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") handleSend(); });
</script>
</body>
</html>
