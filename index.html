<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION MASTER | OMNI-VOICE v48.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --cyan: #00f2ff; --green: #00ff9d; --purple: #bc13fe; --bg: #05070a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 12px 20px; background: #000; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .toolbar { background: #1a1d23; padding: 10px; display: flex; gap: 8px; border-bottom: 1px solid #333; overflow-x: auto; }
        .t-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 14px; font-size: 0.65rem; cursor: pointer; border-radius: 4px; font-family: 'Orbitron'; white-space: nowrap; transition: 0.2s; }
        .t-btn:active { transform: scale(0.95); background: var(--purple); }

        .workspace { flex: 1; overflow-y: auto; padding: 30px 10px; background: #111; display: flex; flex-direction: column; align-items: center; }
        .page-sheet { 
            background: #fff; color: #000; width: 100%; max-width: 850px; min-height: 1100px; 
            padding: 60px 50px; margin-bottom: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            outline: none; font-family: 'Arial', sans-serif; line-height: 1.6; position: relative;
        }

        .word-table-wrapper { margin: 20px 0; border: 1px solid #ddd; padding: 10px; background: #fdfdfd; border-radius: 6px; }
        .table-controls { display: flex; gap: 6px; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .btn-mini { background: #fff; border: 1px solid #ccc; color: #333; font-size: 10px; padding: 5px 10px; cursor: pointer; border-radius: 3px; }

        table { width: 100%; border-collapse: collapse; border: 1.5pt solid black; background: #fff; }
        td { border: 1pt solid black; padding: 12px; min-height: 40px; word-break: break-word; font-size: 14px; color: #000; }
        .active-cell { outline: 3px solid var(--cyan) !important; background: rgba(0, 242, 255, 0.08) !important; }

        .control-panel { background: #000; border-top: 2px solid var(--cyan); padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        #voice-hud { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 8px 35px; border-radius: 30px; display: none; z-index: 3000; font-family: 'Orbitron'; font-weight: bold; box-shadow: 0 0 15px var(--green); }
        
        #hub-sidebar { position: fixed; top: 0; right: -320px; width: 320px; height: 100%; background: rgba(5,7,10,0.98); border-left: 2px solid var(--cyan); z-index: 4000; transition: 0.3s; padding: 25px; overflow-y: auto; }
        #hub-sidebar.active { right: 0; }
        
        #ocr-overlay { display:none; position:fixed; inset:0; background:#000; z-index:5000; }
        #camera-stream { width:100%; height:85%; object-fit:cover; }
    </style>
</head>
<body onload="bienvenidaIA()">

<div id="voice-hud">🎙️ IA: ESCUCHANDO...</div>

<header>
    <div style="font-family:'Orbitron'; font-size:0.85rem; color:var(--cyan)">MYZION <span style="color:var(--purple)">MASTER v48.0</span></div>
    <div style="display:flex; gap:5px;">
        <button class="t-btn" style="border-color:var(--green)" onclick="shareFile()">COMPARTIR 🔗</button>
        <button class="t-btn" onclick="toggleHub()">REPO ☰</button>
    </div>
</header>

<div class="toolbar">
    <button class="t-btn" onclick="execIA('bold', 'Negrita aplicada')">B</button>
    <button class="t-btn" onclick="execIA('italic', 'Cursiva aplicada')">I</button>
    <button class="t-btn" onclick="execIA('underline', 'Subrayado aplicado')">U</button>
    <button class="t-btn" style="color:var(--green)" onclick="leerTodo()">LEER DOCUMENTO</button>
</div>

<main class="workspace" id="canvas">
    <div class="page-sheet" contenteditable="true" id="p1" onfocus="activePage='p1'">
        <h1 style="text-align:center; font-family:'Orbitron';">INFORME MYZION MASTER</h1>
        <p>El sistema de voz está sincronizado. Puede dictar directamente o interactuar con los elementos dinámicos.</p>
    </div>
</main>

<div class="control-panel">
    <button class="t-btn" style="color:var(--green)" onclick="newPage()">+ PÁG</button>
    <button class="t-btn" style="color:var(--green)" onclick="insertSmartTable()">+ TABLA</button>
    <button class="t-btn" onclick="startOCR()">OCR</button>
    <button id="mic-trigger" class="t-btn" style="border-color:var(--green)" onclick="toggleVoiceIA()">🎙️ VOZ IA</button>
</div>

<div style="background:#000; padding:12px; display:flex; gap:10px; border-top:1px solid #222;">
    <button class="t-btn" style="flex:1" onclick="saveDoc()">GUARDAR</button>
    <button class="t-btn" style="flex:1" onclick="exportPDF()">PDF</button>
    <button class="t-btn" style="flex:1" onclick="exportWord()">WORD</button>
</div>

<div id="ocr-overlay">
    <video id="camera-stream" autoplay playsinline></video>
    <div style="height:15%; display:flex; justify-content:space-around; align-items:center;">
        <button class="t-btn" onclick="stopOCR()">SALIR</button>
        <button class="t-btn" style="background:var(--purple); padding:15px;" onclick="snapText()">CAPTURAR</button>
    </div>
</div>

<div id="hub-sidebar">
    <h3 style="font-family:'Orbitron'; color:var(--cyan)">REPOSITORIO</h3>
    <div id="file-list"></div>
    <button class="t-btn" style="width:100%; margin-top:20px" onclick="toggleHub()">CERRAR</button>
</div>

<script>
    let activePage = 'p1';
    let isListening = false;
    let selectedCell = null;
    let savedDocs = [];
    
    // Configuración de Voz
    const synth = window.speechSynthesis;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES'; 
    recognition.continuous = true;

    function hablar(texto) {
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        utterance.rate = 1.1;
        synth.speak(utterance);
    }

    function bienvenidaIA() {
        hablar("Bienvenido a Myzion Master versión 48. Sistema de voz activo y listo para redactar.");
    }

    function execIA(cmd, msg) {
        document.execCommand(cmd, false, null);
        hablar(msg);
    }

    // --- FUNCIONES DE TABLA CON VOZ ---
    function insertSmartTable() {
        const id = "t" + Date.now();
        const wrap = document.createElement('div');
        wrap.className = 'word-table-wrapper'; wrap.contentEditable = "false"; wrap.id = id + "_w";
        wrap.innerHTML = `
            <div class="table-controls">
                <button class="btn-mini" onclick="addRowIA('${id}')">+ Fila</button>
                <button class="btn-mini" onclick="addColIA('${id}')">+ Col</button>
                <button class="btn-mini" style="color:red" onclick="deleteTable('${id}_w')">Eliminar</button>
            </div>
            <table id="${id}">
                <tr><td contenteditable="true" onclick="selectCellIA(this)">...</td><td contenteditable="true" onclick="selectCellIA(this)">...</td></tr>
            </table>`;
        document.getElementById(activePage).appendChild(wrap);
        hablar("Tabla inteligente insertada. Toque una celda para dictar contenido.");
    }

    function selectCellIA(c) {
        if(selectedCell) selectedCell.classList.remove('active-cell');
        selectedCell = c; 
        selectedCell.classList.add('active-cell');
        hablar("Celda seleccionada. Lista para entrada de voz.");
    }

    window.addRowIA = (id) => {
        const t = document.getElementById(id); const r = t.insertRow();
        for(let i=0; i<t.rows[0].cells.length; i++) {
            let c = r.insertCell(); c.contentEditable = "true"; c.innerText = "..."; c.onclick = () => selectCellIA(c);
        }
        hablar("Fila agregada.");
    };

    window.addColIA = (id) => {
        const t = document.getElementById(id);
        Array.from(t.rows).forEach(r => {
            let c = r.insertCell(); c.contentEditable = "true"; c.innerText = "..."; c.onclick = () => selectCellIA(c);
        });
        hablar("Columna agregada.");
    };

    window.deleteTable = (id) => {
        document.getElementById(id).remove();
        hablar("Tabla eliminada.");
    };

    // --- RECONOCIMIENTO DE VOZ ---
    function toggleVoiceIA() {
        if(!isListening) { 
            try {
                recognition.start(); 
                isListening = true; 
                document.getElementById('voice-hud').style.display = 'block'; 
                hablar("Dictado iniciado. Hable ahora.");
            } catch(e) { console.error(e); }
        } else { 
            recognition.stop(); 
            isListening = false; 
            document.getElementById('voice-hud').style.display = 'none'; 
            hablar("Dictado finalizado.");
        }
    }

    recognition.onresult = (e) => {
        const text = e.results[e.results.length - 1][0].transcript;
        if(selectedCell) { 
            selectedCell.innerText = text; 
            hablar("Celda actualizada.");
        } else { 
            document.execCommand('insertText', false, text + " "); 
        }
    };

    // --- ARCHIVOS Y EXPORTACIÓN CON VOZ ---
    function saveDoc() {
        const name = "DOC-" + new Date().toLocaleTimeString();
        savedDocs.push({ name: name, content: document.getElementById('canvas').innerHTML });
        updateHub();
        hablar("Documento guardado en el repositorio como " + name);
    }

    async function shareFile() {
        hablar("Generando enlace de compartición remota.");
        const html = getCleanHTML();
        const file = new File(['\ufeff', html], "Myzion_Master.doc", { type: 'application/msword' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try { 
                await navigator.share({ files: [file], title: 'Myzion Master Doc', text: 'Documento generado con IA' }); 
            } catch (e) { hablar("Envío cancelado."); }
        } else { 
            exportWord(); 
        }
    }

    function exportWord() {
        const blob = new Blob(['\ufeff', getCleanHTML()], { type: 'application/msword' });
        saveAs(blob, "Myzion_Export.doc");
        hablar("Exportación a Word completada.");
    }

    function exportPDF() {
        const doc = new jspdf.jsPDF();
        const text = document.getElementById(activePage).innerText.substring(0, 4000);
        doc.text(text, 15, 15);
        doc.save("Myzion_Export.pdf");
        hablar("Exportación a PDF completada.");
    }

    // --- OCR Y PÁGINAS ---
    function newPage() {
        const count = document.querySelectorAll('.page-sheet').length + 1;
        const id = 'p' + count;
        const p = document.createElement('div');
        p.className = 'page-sheet'; p.contentEditable = "true"; p.id = id;
        p.onfocus = () => activePage = id;
        p.innerHTML = `<hr><p style="color:#aaa; font-size:10px;">PÁGINA ${count}</p>`;
        document.getElementById('canvas').appendChild(p);
        p.focus();
        hablar("Nueva página creada. Número " + count);
    }

    async function startOCR() {
        hablar("Cámara activa. Enfoque el texto que desea digitalizar.");
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('camera-stream').srcObject = s;
        document.getElementById('ocr-overlay').style.display = 'block';
    }

    async function snapText() {
        hablar("Capturando y procesando imagen con inteligencia artificial.");
        const v = document.getElementById('camera-stream');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById(activePage).innerHTML += `<p>${res.data.text}</p>`;
        stopOCR(); 
        hablar("Texto extraído con éxito al documento.");
    }

    function stopOCR() {
        document.getElementById('camera-stream').srcObject?.getTracks().forEach(t => t.stop());
        document.getElementById('ocr-overlay').style.display = 'none';
        hablar("Cámara cerrada.");
    }

    function toggleHub() { 
        const isActive = document.getElementById('hub-sidebar').classList.toggle('active'); 
        hablar(isActive ? "Repositorio abierto." : "Repositorio cerrado.");
    }

    function updateHub() {
        const l = document.getElementById('file-list'); l.innerHTML = "";
        savedDocs.forEach((d, idx) => {
            const b = document.createElement('div'); 
            b.className = 't-btn'; 
            b.style="margin-bottom:8px; display:block; text-align:left; width:100%";
            b.innerText = d.name; 
            b.onclick = () => { 
                document.getElementById('canvas').innerHTML = d.content; 
                hablar("Cargando " + d.name);
                toggleHub(); 
            };
            l.appendChild(b);
        });
    }

    function leerTodo() { 
        const texto = document.getElementById(activePage).innerText;
        hablar("Iniciando lectura del documento actual: " + texto); 
    }

    function getCleanHTML() {
        const content = document.getElementById('canvas').innerHTML;
        return `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset='utf-8'><style>table{border-collapse:collapse; width:100%;} td{border:1px solid black; padding:8px; font-family:Arial;}</style></head>
        <body>${content}</body></html>`;
    }
</script>
</body>
</html>
