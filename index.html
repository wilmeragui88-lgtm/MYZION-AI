<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYZION OS | OMNI-EXPANSION v27.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.2.2/build/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --cyan: #00f2ff; --green: #00ff9d; --blue: #0072ff; --purple: #bc13fe;
            --bg: #010206; --panel-bg: rgba(5, 10, 25, 0.98);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; font-family: 'Rajdhani', sans-serif;
            background: var(--bg); color: #fff; height: 100vh;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* HEADER */
        header { 
            padding: 15px; background: #000; border-bottom: 2px solid var(--blue);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .logo { font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 2px; color: var(--cyan); }

        /* PANEL DESPLEGABLE DEL DOCUMENTO (DRAWER) */
        #doc-drawer {
            position: fixed; top: 0; right: -100%; width: 90%; height: 100%;
            background: #fff; color: #000; z-index: 2000; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        #doc-drawer.active { right: 0; }
        .drawer-header { 
            background: #111; color: var(--cyan); padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            font-family: 'Orbitron'; font-size: 0.7rem;
        }

        /* EDITOR WORD-IA */
        #editor-container { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        #document-content { outline: none; font-size: 1.1rem; line-height: 1.7; font-family: 'Arial', sans-serif; min-height: 100%; }

        /* CONTROLES PRINCIPALES (UI LIMPIA) */
        .main-ui { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 50; }
        .stats-box { background: rgba(0,242,255,0.05); border: 1px solid rgba(0,242,255,0.2); padding: 15px; border-radius: 8px; height: 120px; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-futurism {
            background: rgba(0, 114, 255, 0.1); border: 1px solid var(--blue);
            color: #fff; padding: 20px; font-family: 'Orbitron'; font-size: 0.6rem;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-active { background: var(--green) !important; color: #000; border-color: var(--green); box-shadow: 0 0 15px var(--green); }

        /* FOOTER DINÁMICO */
        footer { padding: 15px; background: #000; border-top: 1px solid var(--purple); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* HUD DE VOZ */
        #voice-hud { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 5px 20px; border-radius: 20px; font-weight: bold; font-size: 0.6rem; display: none; z-index: 3000; }

        /* TABLAS PROFESIONALES */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 2px solid #333; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>

<div id="voice-hud">SISTEMA ESCUCHANDO...</div>

<header>
    <div class="logo">MYZION <span style="color:var(--purple)">INFINITY</span> v27</div>
    <button class="btn-futurism" style="padding: 10px 20px; border-color: var(--cyan);" onclick="toggleDoc()">VER DOCUMENTO ▾</button>
</header>

<div id="doc-drawer">
    <div class="drawer-header">
        <span>EDITOR MAESTRO</span>
        <button onclick="toggleDoc()" style="background:none; border:none; color:var(--cyan); font-family:'Orbitron'; cursor:pointer;">CERRAR X</button>
    </div>
    <div id="editor-container">
        <div id="document-content" contenteditable="true">
            <h1 style="text-align:center;">REPORTE OMNI v27</h1>
            <p>Hable para dictar o use los comandos de IA...</p>
        </div>
    </div>
    <div style="background:#f0f0f0; padding:15px; display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
        <button onclick="exportPDF()" style="background:red; color:white; border:none; padding:10px;">PDF</button>
        <button onclick="exportWord()" style="background:blue; color:white; border:none; padding:10px;">WORD</button>
        <button onclick="exportIMG()" style="background:green; color:white; border:none; padding:10px;">PNG</button>
    </div>
</div>

<main class="main-ui">
    <div class="stats-box"><canvas id="mainChart"></canvas></div>

    <div class="action-grid">
        <button class="btn-futurism" style="border-color:var(--purple); color:var(--purple);" onclick="iaTable()">+ TABLA IA</button>
        <button class="btn-futurism" style="border-color:var(--purple); color:var(--purple);" onclick="iaReport()">+ REPORTE IA</button>
        <button class="btn-futurism" onclick="openCam()">OMNI-SCANNER</button>
        <button class="btn-futurism" onclick="iaAudit()">AUDITORÍA VOZ</button>
    </div>
</main>

<footer>
    <button id="v-btn" class="btn-futurism" style="grid-column: span 2; border-color: var(--green); font-weight:bold;" onclick="toggleVoice()">
        INTERFAZ DE VOZ MAESTRA
    </button>
    <button class="btn-futurism" onclick="saveToCloud()">NUBE SINCRO</button>
    <button class="btn-futurism" onclick="clearAll()">LIMPIAR TODO</button>
</footer>

<div id="cam-overlay" style="display:none; position:fixed; inset:0; background:#000; z-index:4000;">
    <video id="v-feed" style="width:100%; height:80%; object-fit:cover;" autoplay playsinline></video>
    <div style="height:20%; display:flex; justify-content:space-around; align-items:center;">
        <button class="btn-futurism" onclick="closeCam()">SALIR</button>
        <button class="btn-futurism" style="background:var(--purple)" onclick="runOCR()">SCAN OCR</button>
    </div>
</div>

<script>
    let isListening = false;
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'es-ES';
    recognition.continuous = true;

    function iaSpeak(msg) {
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        window.speechSynthesis.speak(u);
    }

    // --- MANEJO DEL PANEL DESPLEGABLE ---
    function toggleDoc() {
        const drawer = document.getElementById('doc-drawer');
        drawer.classList.toggle('active');
        if(drawer.classList.contains('active')) iaSpeak("Abriendo documento maestro.");
    }

    // --- IA DE VOZ ---
    function toggleVoice() {
        const btn = document.getElementById('v-btn');
        const hud = document.getElementById('voice-hud');
        if(!isListening) {
            recognition.start();
            isListening = true;
            btn.classList.add('btn-active');
            hud.style.display = 'block';
            iaSpeak("Sistema de voz iniciado. Puede dictar o dar comandos.");
        } else {
            recognition.stop();
            isListening = false;
            btn.classList.remove('btn-active');
            hud.style.display = 'none';
        }
    }

    recognition.onresult = (e) => {
        const cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();
        const doc = document.getElementById('document-content');

        if(cmd.includes("abrir documento")) toggleDoc();
        else if(cmd.includes("crear tabla")) { iaTable(); iaSpeak("Tabla insertada."); }
        else if(cmd.includes("limpiar")) { clearAll(); }
        else if(cmd.includes("leer documento")) { iaAudit(); }
        else {
            doc.innerHTML += " " + cmd;
        }
    };

    // --- FUNCIONES IA ---
    function iaTable() {
        const html = `<table><tr><th>ID</th><th>DETALLE</th><th>ESTADO</th></tr><tr><td>001</td><td>Proceso IA</td><td>OK</td></tr></table><br>`;
        document.getElementById('document-content').innerHTML += html;
    }

    function iaReport() {
        const html = `<div style="border:1px solid #000; padding:10px; background:#f9f9f9;"><h3>REPORTE IA</h3><p>Generado: ${new Date().toLocaleString()}</p></div><br>`;
        document.getElementById('document-content').innerHTML += html;
    }

    function iaAudit() {
        const text = document.getElementById('document-content').innerText;
        iaSpeak("Auditando documento. Contenido: " + text);
    }

    // --- EXPORTACIÓN MULTIFORMATO ---
    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(doc.splitTextToSize(document.getElementById('document-content').innerText, 180), 15, 20);
        doc.save("Zion_Export.pdf");
        iaSpeak("P D F descargado.");
    }

    async function exportIMG() {
        const canvas = await html2canvas(document.getElementById('editor-container'));
        const link = document.createElement('a');
        link.download = 'Myzion_Captura.png';
        link.href = canvas.toDataURL();
        link.click();
        iaSpeak("Imagen PNG guardada.");
    }

    function exportWord() {
        const content = document.getElementById('document-content').innerText;
        const blob = new Blob(['\ufeff' + content], { type: 'application/msword' });
        saveAs(blob, "Myzion_Documento.doc");
        iaSpeak("Documento de Word generado.");
    }

    // --- CÁMARA MANTENIDA ---
    async function openCam() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('v-feed').srcObject = s;
        document.getElementById('cam-overlay').style.display = 'block';
    }
    function closeCam() {
        document.getElementById('v-feed').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('cam-overlay').style.display = 'none';
    }
    async function runOCR() {
        iaSpeak("Escaneando texto.");
        const v = document.getElementById('v-feed');
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const res = await Tesseract.recognize(c.toDataURL(), 'spa');
        document.getElementById('document-content').innerText += "\n" + res.data.text.trim();
        closeCam();
        iaSpeak("Texto integrado.");
    }

    function clearAll() { document.getElementById('document-content').innerHTML = ""; iaSpeak("Memoria limpia."); }
    function saveToCloud() { iaSpeak("Sincronizando con la nube de Firebase."); }

    // Gráfico inicial
    const ctx = document.getElementById('mainChart').getContext('2d');
    new Chart(ctx, { type: 'line', data: { labels: ['A','B','C','D'], datasets: [{ data: [10,40,20,50], borderColor: '#00f2ff' }] }, options: { maintainAspectRatio: false } });
</script>
</body>
</html>
